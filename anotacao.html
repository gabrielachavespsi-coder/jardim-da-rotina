<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anotações Importantes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --fundo:#F6F8F3;
  --fundo-card:#FFFFFF;
  --verde-claro:#EAF3E8;
  --verde-muito-claro:#F2F7F0;
  --verde-salvia:#8DA77D;
  --verde-salvia-escuro:#6F8D62;
  --verde-texto:#3F6F4F;
  --texto:#2F2F2F;
  --texto-suave:#6F756C;
  --borda:#DDE8D8;
  --bege:#F3ECDD;
  --rosa:#F8E8EA;
  --amarelo:#FFF7DC;
  --azul:#EAF2FF;
  --sombra:0 10px 28px rgba(84,110,79,0.12);
  --sombra-suave:0 5px 18px rgba(84,110,79,0.09);
  --fonte:'Poppins',sans-serif;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  font-family:var(--fonte);
  background:
    radial-gradient(circle at top left, rgba(232,243,226,0.95), transparent 34%),
    radial-gradient(circle at top right, rgba(243,236,221,0.65), transparent 32%),
    linear-gradient(180deg, #FAFBF7 0%, var(--fundo) 100%);
  color:var(--texto);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:16px;
}

.appShell{
  width:100%;
  max-width:420px;
  min-height:calc(100vh - 32px);
  margin:0 auto;
  position:relative;
  padding-bottom:88px;
}

.appCard{
  width:100%;
  min-height:calc(100vh - 120px);
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(221,232,216,0.85);
  border-radius:30px;
  box-shadow:var(--sombra-suave);
  padding:20px 16px 18px;
  overflow:hidden;
  position:relative;
}

.appCard::before{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  right:-70px;
  top:-55px;
  background:rgba(232,243,226,0.8);
  border-radius:50%;
  z-index:0;
}

.appCard::after{
  content:"";
  position:absolute;
  width:145px;
  height:145px;
  left:-68px;
  bottom:-58px;
  background:rgba(243,236,221,0.62);
  border-radius:50%;
  z-index:0;
}

.appCard > *{
  position:relative;
  z-index:1;
}

/* TOPO */

.topoApp{
  display:grid;
  grid-template-columns:46px 1fr 46px;
  gap:12px;
  align-items:center;
  margin-bottom:20px;
}

.logoBolinha,
.botaoTopo{
  width:46px;
  height:46px;
  border-radius:50%;
  background:white;
  border:1px solid rgba(221,232,216,0.8);
  box-shadow:0 6px 16px rgba(84,110,79,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--verde-texto);
  font-size:22px;
  font-family:var(--fonte);
}

.botaoTopo{
  cursor:pointer;
}

.tituloArea{
  min-width:0;
  text-align:center;
}

.tituloApp{
  font-size:25px;
  font-weight:500;
  color:#435F3E;
  line-height:1.05;
  letter-spacing:-0.5px;
}

.subtituloApp{
  color:var(--texto-suave);
  font-size:12px;
  margin-top:5px;
  line-height:1.35;
}

/* HERO */

.heroAnotacao{
  background:rgba(242,247,240,0.92);
  border:1px solid rgba(221,232,216,0.95);
  border-radius:26px;
  padding:16px 14px;
  display:grid;
  grid-template-columns:54px 1fr;
  gap:12px;
  align-items:center;
  margin-bottom:16px;
}

.heroIcone{
  width:52px;
  height:52px;
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 5px 14px rgba(84,110,79,0.08);
  color:var(--verde-salvia-escuro);
  font-size:25px;
}

.heroTexto h2{
  font-size:16px;
  color:var(--texto);
  font-weight:600;
  margin-bottom:4px;
}

.heroTexto p{
  color:var(--texto-suave);
  font-size:12.5px;
  line-height:1.45;
}

/* AÇÕES */

.acoesTopo{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-bottom:14px;
}

.botaoAdicionar{
  width:100%;
  min-height:50px;
  border:none;
  border-radius:19px;
  background:var(--verde-salvia);
  color:white;
  font-family:var(--fonte);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(111,141,98,0.22);
  transition:0.2s ease;
}

.botaoAdicionar:hover{
  background:var(--verde-salvia-escuro);
  transform:translateY(-1px);
}

.listaTitulo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:8px 2px 10px;
}

.listaTitulo h3{
  color:var(--verde-texto);
  font-size:16px;
  font-weight:600;
}

.contadorNotas{
  font-size:11px;
  color:var(--texto-suave);
  background:#F2F4EF;
  border-radius:999px;
  padding:6px 9px;
}

/* LISTA */

.listaAnotacoes{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.anotacaoCard{
  background:rgba(255,255,255,0.94);
  border:1px solid rgba(221,232,216,0.92);
  border-radius:23px;
  padding:14px 13px;
  box-shadow:0 8px 18px rgba(84,110,79,0.08);
  display:flex;
  flex-direction:column;
  gap:9px;
}

.anotacaoTopo{
  display:grid;
  grid-template-columns:42px 1fr auto;
  gap:10px;
  align-items:center;
}

.anotacaoIcone{
  width:42px;
  height:42px;
  border-radius:50%;
  background:var(--verde-muito-claro);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--verde-salvia-escuro);
  font-size:20px;
}

.anotacaoData{
  font-size:13px;
  font-weight:600;
  color:#3E5140;
  line-height:1.25;
}

.anotacaoHora{
  margin-top:2px;
  font-size:11.5px;
  color:var(--texto-suave);
}

.anotacaoTexto{
  color:#3F463F;
  font-size:13px;
  line-height:1.55;
  white-space:pre-wrap;
  background:#FAFBF7;
  border:1px solid #EDF2EA;
  border-radius:16px;
  padding:11px 12px;
}

.anotacaoBotoes{
  display:flex;
  gap:8px;
  justify-content:flex-end;
}

.botaoMini{
  border:none;
  border-radius:13px;
  padding:8px 10px;
  font-family:var(--fonte);
  font-size:11.5px;
  cursor:pointer;
}

.botaoEditar{
  background:#EAF3E8;
  color:var(--verde-texto);
}

.botaoExcluir{
  background:#F5E6E6;
  color:#8A3030;
}

.estadoVazio{
  background:rgba(255,255,255,0.84);
  border:1px dashed #C9D9C4;
  border-radius:24px;
  padding:24px 16px;
  text-align:center;
  color:var(--texto-suave);
  font-size:13px;
  line-height:1.55;
}

/* BARRA INFERIOR */

.bottomNav{
  position:fixed;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  width:min(420px, calc(100% - 28px));
  background:rgba(255,255,255,0.96);
  border:1px solid rgba(221,232,216,0.9);
  border-radius:26px;
  box-shadow:0 10px 28px rgba(84,110,79,0.14);
  display:grid;
  grid-template-columns:1fr 1fr 68px 1fr 1fr;
  gap:2px;
  align-items:center;
  padding:9px 10px;
  z-index:20;
}

.navItem{
  border:none;
  background:transparent;
  font-family:var(--fonte);
  color:#8C9288;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  font-size:10.5px;
  cursor:pointer;
}

.navItem .navIcon{
  font-size:20px;
  line-height:1;
}

.navItem.ativo{
  color:var(--verde-salvia-escuro);
  font-weight:500;
}

.navPlus{
  width:58px;
  height:58px;
  border-radius:50%;
  border:none;
  background:var(--verde-salvia);
  color:white;
  font-size:35px;
  line-height:1;
  margin:-22px auto 0;
  box-shadow:0 10px 20px rgba(111,141,98,0.25);
  cursor:pointer;
}

/* MODAIS */

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.34);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
  z-index:999;
}

.modalOverlay.show{
  display:flex;
}

.modalCard{
  width:100%;
  max-width:340px;
  background:rgba(255,255,255,0.98);
  border-radius:28px;
  padding:18px;
  box-shadow:0 14px 36px rgba(0,0,0,0.18);
  display:flex;
  flex-direction:column;
  gap:13px;
  border:1px solid rgba(221,232,216,0.9);
}

.modalTopo{
  position:relative;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modalVoltar{
  position:absolute;
  left:0;
  top:0;
  border:none;
  background:#EEF3EC;
  border-radius:14px;
  width:42px;
  height:42px;
  cursor:pointer;
  font-size:16px;
  font-family:var(--fonte);
  color:var(--texto);
}

.modalTituloArea{
  text-align:center;
  padding:0 46px;
}

.modalTitle{
  font-size:20px;
  font-weight:500;
  color:var(--verde-texto);
  line-height:1.15;
}

.modalSub{
  font-size:11.5px;
  color:var(--texto-suave);
  margin-top:3px;
  line-height:1.25;
}

.formAnotacao{
  display:flex;
  flex-direction:column;
  gap:11px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:12.5px;
  color:#314235;
  font-weight:600;
}

.field input,
.field textarea{
  width:100%;
  border:1px solid var(--borda);
  border-radius:16px;
  padding:12px 13px;
  font-family:var(--fonte);
  font-size:13px;
  background:#FFFFFF;
  outline:none;
}

.field textarea{
  min-height:130px;
  resize:none;
  line-height:1.45;
}

.field input:focus,
.field textarea:focus{
  border-color:var(--verde-salvia);
  box-shadow:0 0 0 3px rgba(141,167,125,0.15);
}

.duasColunas{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}

.modalBtns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin-top:2px;
}

.modalBtns button{
  min-height:46px;
  border:none;
  border-radius:17px;
  font-family:var(--fonte);
  font-size:13.5px;
  cursor:pointer;
  font-weight:500;
}

.cancel{
  background:#F0F0F0;
  color:#444;
}

.save{
  background:var(--verde-salvia);
  color:white;
}

/* RESPONSIVO */

@media (max-width:390px){
  body{
    padding:12px;
  }

  .appShell{
    min-height:calc(100vh - 24px);
  }

  .appCard{
    padding:18px 13px 16px;
    border-radius:28px;
  }

  .tituloApp{
    font-size:23px;
  }

  .bottomNav{
    bottom:10px;
    width:calc(100% - 22px);
  }

  .duasColunas{
    grid-template-columns:1fr;
  }
}

.sobreQuemField{
  position:relative;
}

.listaNomesSobreQuem{
  display:none;
  flex-direction:column;
  gap:6px;
  background:#FFFFFF;
  border:1px solid var(--borda);
  border-radius:16px;
  padding:8px;
  box-shadow:0 10px 22px rgba(84,110,79,0.13);
  max-height:155px;
  overflow-y:auto;
}

.listaNomesSobreQuem.show{
  display:flex;
}

.nomeSugestaoBtn{
  border:none;
  border-radius:13px;
  background:#F2F7F0;
  color:var(--verde-texto);
  font-family:var(--fonte);
  font-size:12.5px;
  padding:9px 10px;
  text-align:left;
  cursor:pointer;
}

.nomeSugestaoBtn:hover{
  background:#EAF3E8;
}

.anotacaoPessoa{
  width:max-content;
  max-width:100%;
  background:#EAF3E8;
  color:var(--verde-texto);
  border-radius:999px;
  padding:5px 9px;
  font-size:11.2px;
  font-weight:500;
  margin-bottom:-2px;
}

</style>
</head>

<body>

<div class="appShell">

  <main class="appCard">

    <header class="topoApp">
      <button class="botaoTopo" onclick="irPara('index.html')" title="Voltar">←</button>

      <div class="tituloArea">
        <h1 class="tituloApp">Anotações</h1>
        <div class="subtituloApp">Registre o que é importante lembrar.</div>
      </div>

      <div class="logoBolinha">✎</div>
    </header>

    <section class="heroAnotacao">
      <div class="heroIcone">📝</div>
      <div class="heroTexto">
        <h2>Anotações importantes</h2>
        <p>Guarde lembretes com data, hora e descrição. A lista aparece organizada por data.</p>
      </div>
    </section>

    <div class="acoesTopo">
      <button class="botaoAdicionar" onclick="abrirModalAnotacao()">＋ Adicionar anotação</button>
    </div>

    <div class="listaTitulo">
      <h3>Lista de anotações</h3>
      <div class="contadorNotas" id="contadorNotas">0 registros</div>
    </div>

    <section class="listaAnotacoes" id="listaAnotacoes"></section>

  </main>

</div>

<nav class="bottomNav">
  <button class="navItem" onclick="irPara('index.html')">
    <span class="navIcon">⌂</span>
    <span>Início</span>
  </button>

  <button class="navItem" onclick="abrirModalRotina()">
    <span class="navIcon">🍃</span>
    <span>Rotina</span>
  </button>

  <button class="navPlus" onclick="abrirModalAnotacao()">+</button>

  <button class="navItem ativo" onclick="irPara('anotacao.html')">
    <span class="navIcon">✎</span>
    <span>Anotações</span>
  </button>

  <button class="navItem" onclick="irPara('gabriela-menu.html')">
    <span class="navIcon">♡</span>
    <span>Autocuidado</span>
  </button>
</nav>

<div class="modalOverlay" id="modalAnotacao">
  <div class="modalCard">
    <div class="modalTopo">
      <button class="modalVoltar" onclick="fecharModalAnotacao()">←</button>

      <div class="modalTituloArea">
        <div class="modalTitle" id="tituloModalAnotacao">Nova anotação</div>
        <div class="modalSub">preencha data, hora e descrição</div>
      </div>
    </div>

    <div class="formAnotacao">
      <div class="field sobreQuemField">
        <label for="campoSobreQuem">Sobre quem</label>
        <input
          type="text"
          id="campoSobreQuem"
          placeholder="Digite ou escolha um nome"
          autocomplete="off"
          onclick="mostrarListaNomesSobreQuem()"
          onfocus="mostrarListaNomesSobreQuem()"
          oninput="renderizarListaNomesSobreQuem()"
        >
        <div id="listaNomesSobreQuem" class="listaNomesSobreQuem"></div>
      </div>

      <div class="duasColunas">
        <div class="field">
          <label for="campoData">Data</label>
          <input type="date" id="campoData">
        </div>

        <div class="field">
          <label for="campoHora">Hora</label>
          <input type="time" id="campoHora">
        </div>
      </div>

      <div class="field">
        <label for="campoDescricao">Descrição</label>
        <textarea id="campoDescricao" placeholder="Escreva a anotação aqui..."></textarea>
      </div>

      <div class="modalBtns">
        <button class="cancel" onclick="fecharModalAnotacao()">Cancelar</button>
        <button class="save" onclick="salvarAnotacao()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalRotina">
  <div class="modalCard">
    <div class="modalTopo">
      <button class="modalVoltar" onclick="fecharModalRotina()">←</button>

      <div class="modalTituloArea">
        <div class="modalTitle">Rotina</div>
        <div class="modalSub">escolha qual rotina deseja abrir</div>
      </div>
    </div>

    <div class="formAnotacao">
      <button class="botaoAdicionar" onclick="irPara('maya-menu.html')">🌼 Maya</button>
      <button class="botaoAdicionar" onclick="irPara('gabriela-menu.html')">🌿 Gabriela</button>
      <button class="botaoAdicionar" onclick="irPara('beth-rotina.html')">🌷 Beth</button>
    </div>
  </div>
</div>

<script>
const CHAVE_ANOTACOES = "jardim_anotacoes_importantes";
let anotacaoEditandoId = null;

function irPara(destino){
  location.href = destino;
}

function pad2(n){
  return String(n).padStart(2, "0");
}

function hojeISO(){
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

function horaAtual(){
  const d = new Date();
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function formatarDataBR(dataISO){
  if(!dataISO) return "";
  const [ano, mes, dia] = dataISO.split("-");
  return `${dia}/${mes}/${ano}`;
}

function carregarAnotacoes(){
  try{
    const dados = JSON.parse(localStorage.getItem(CHAVE_ANOTACOES)) || [];
    return Array.isArray(dados) ? dados : [];
  }catch(e){
    return [];
  }
}

function salvarListaAnotacoes(lista){
  localStorage.setItem(CHAVE_ANOTACOES, JSON.stringify(lista));
}

function obterNomesSobreQuem(){
  const nomes = carregarAnotacoes()
    .map(item => (item.sobreQuem || "").trim())
    .filter(Boolean);

  return [...new Set(nomes)].sort((a,b) => a.localeCompare(b, "pt-BR"));
}

function renderizarListaNomesSobreQuem(){
  const input = document.getElementById("campoSobreQuem");
  const box = document.getElementById("listaNomesSobreQuem");
  if(!input || !box) return;

  const filtro = input.value.trim().toLowerCase();
  const nomes = obterNomesSobreQuem().filter(nome => nome.toLowerCase().includes(filtro));

  box.innerHTML = "";

  if(!nomes.length){
    box.innerHTML = `<button type="button" class="nomeSugestaoBtn" onclick="ocultarListaNomesSobreQuem()">Nenhum nome salvo ainda</button>`;
    return;
  }

  nomes.forEach(nome => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "nomeSugestaoBtn";
    btn.textContent = nome;
    btn.onclick = () => escolherNomeSobreQuem(nome);
    box.appendChild(btn);
  });
}

function mostrarListaNomesSobreQuem(){
  renderizarListaNomesSobreQuem();
  const box = document.getElementById("listaNomesSobreQuem");
  if(box) box.classList.add("show");
}

function ocultarListaNomesSobreQuem(){
  const box = document.getElementById("listaNomesSobreQuem");
  if(box) box.classList.remove("show");
}

function escolherNomeSobreQuem(nome){
  const input = document.getElementById("campoSobreQuem");
  if(input) input.value = nome;
  ocultarListaNomesSobreQuem();
}

function ordenarAnotacoes(lista){
  return [...lista].sort((a,b) => {
    const dataA = `${a.data || ""}T${a.hora || "00:00"}`;
    const dataB = `${b.data || ""}T${b.hora || "00:00"}`;
    return dataB.localeCompare(dataA);
  });
}

function renderizarAnotacoes(){
  const listaBox = document.getElementById("listaAnotacoes");
  const contador = document.getElementById("contadorNotas");
  const lista = ordenarAnotacoes(carregarAnotacoes());

  contador.textContent = `${lista.length} ${lista.length === 1 ? "registro" : "registros"}`;
  listaBox.innerHTML = "";

  if(!lista.length){
    listaBox.innerHTML = `
      <div class="estadoVazio">
        🌿 Nenhuma anotação ainda.<br>
        Toque em <strong>Adicionar anotação</strong> para guardar o primeiro lembrete.
      </div>
    `;
    return;
  }

  lista.forEach(item => {
    const card = document.createElement("article");
    card.className = "anotacaoCard";

    card.innerHTML = `
      <div class="anotacaoTopo">
        <div class="anotacaoIcone">✎</div>
        <div>
          <div class="anotacaoData">${formatarDataBR(item.data)}</div>
          <div class="anotacaoHora">${item.hora || ""}</div>
        </div>
        <div class="anotacaoBotoes">
          <button class="botaoMini botaoEditar" onclick="editarAnotacao('${item.id}')">editar</button>
          <button class="botaoMini botaoExcluir" onclick="excluirAnotacao('${item.id}')">excluir</button>
        </div>
      </div>
      ${item.sobreQuem ? `<div class="anotacaoPessoa">Sobre: ${item.sobreQuem}</div>` : ""}
      <div class="anotacaoTexto"></div>
    `;

    card.querySelector(".anotacaoTexto").textContent = item.descricao || "";
    listaBox.appendChild(card);
  });
}

function abrirModalAnotacao(){
  anotacaoEditandoId = null;
  document.getElementById("tituloModalAnotacao").textContent = "Nova anotação";
  document.getElementById("campoSobreQuem").value = "";
  ocultarListaNomesSobreQuem();
  document.getElementById("campoData").value = hojeISO();
  document.getElementById("campoHora").value = horaAtual();
  document.getElementById("campoDescricao").value = "";
  document.getElementById("modalAnotacao").classList.add("show");

  setTimeout(() => document.getElementById("campoDescricao").focus(), 80);
}

function fecharModalAnotacao(){
  document.getElementById("modalAnotacao").classList.remove("show");
  ocultarListaNomesSobreQuem();
  anotacaoEditandoId = null;
}

function salvarAnotacao(){
  const sobreQuem = document.getElementById("campoSobreQuem").value.trim();
  const data = document.getElementById("campoData").value;
  const hora = document.getElementById("campoHora").value;
  const descricao = document.getElementById("campoDescricao").value.trim();

  if(!data){
    alert("Escolha uma data.");
    return;
  }

  if(!hora){
    alert("Escolha uma hora.");
    return;
  }

  if(!descricao){
    alert("Escreva a descrição da anotação.");
    return;
  }

  const lista = carregarAnotacoes();

  if(anotacaoEditandoId){
    const item = lista.find(a => a.id === anotacaoEditandoId);
    if(item){
      item.sobreQuem = sobreQuem;
      item.data = data;
      item.hora = hora;
      item.descricao = descricao;
      item.atualizadoEm = new Date().toISOString();
    }
  }else{
    lista.push({
      id:`anotacao_${Date.now()}`,
      sobreQuem,
      data,
      hora,
      descricao,
      criadoEm:new Date().toISOString()
    });
  }

  salvarListaAnotacoes(lista);
  fecharModalAnotacao();
  renderizarAnotacoes();
}

function editarAnotacao(id){
  const lista = carregarAnotacoes();
  const item = lista.find(a => a.id === id);
  if(!item) return;

  anotacaoEditandoId = id;
  document.getElementById("tituloModalAnotacao").textContent = "Editar anotação";
  document.getElementById("campoSobreQuem").value = item.sobreQuem || "";
  ocultarListaNomesSobreQuem();
  document.getElementById("campoData").value = item.data || hojeISO();
  document.getElementById("campoHora").value = item.hora || horaAtual();
  document.getElementById("campoDescricao").value = item.descricao || "";
  document.getElementById("modalAnotacao").classList.add("show");

  setTimeout(() => document.getElementById("campoDescricao").focus(), 80);
}

function excluirAnotacao(id){
  const confirmar = confirm("Deseja excluir esta anotação?");
  if(!confirmar) return;

  const lista = carregarAnotacoes().filter(a => a.id !== id);
  salvarListaAnotacoes(lista);
  renderizarAnotacoes();
}

function abrirModalRotina(){
  document.getElementById("modalRotina").classList.add("show");
}

function fecharModalRotina(){
  document.getElementById("modalRotina").classList.remove("show");
}

window.addEventListener("click", function(e){
  const sobreQuemField = document.querySelector(".sobreQuemField");
  if(sobreQuemField && !sobreQuemField.contains(e.target)){
    ocultarListaNomesSobreQuem();
  }

  const modalAnotacao = document.getElementById("modalAnotacao");
  const modalRotina = document.getElementById("modalRotina");

  if(e.target === modalAnotacao){
    fecharModalAnotacao();
  }

  if(e.target === modalRotina){
    fecharModalRotina();
  }
});

document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    fecharModalAnotacao();
    fecharModalRotina();
  }
});

window.addEventListener("load", renderizarAnotacoes);
</script>

</body>
</html>
