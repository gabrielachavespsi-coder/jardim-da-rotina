<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anotações Importantes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --fundo:#F6F8F3;
  --fundo-card:#FFFFFF;
  --verde-claro:#EAF3E8;
  --verde-muito-claro:#F2F7F0;
  --verde-salvia:#8DA77D;
  --verde-salvia-escuro:#6F8D62;
  --verde-texto:#3F6F4F;
  --texto:#2F2F2F;
  --texto-suave:#6F756C;
  --borda:#DDE8D8;
  --bege:#F3ECDD;
  --rosa:#F8E8EA;
  --amarelo:#FFF7DC;
  --azul:#EAF2FF;
  --sombra:0 10px 28px rgba(84,110,79,0.12);
  --sombra-suave:0 5px 18px rgba(84,110,79,0.09);
  --fonte:'Poppins',sans-serif;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  font-family:var(--fonte);
  background:
    radial-gradient(circle at top left, rgba(232,243,226,0.95), transparent 34%),
    radial-gradient(circle at top right, rgba(243,236,221,0.65), transparent 32%),
    linear-gradient(180deg, #FAFBF7 0%, var(--fundo) 100%);
  color:var(--texto);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:16px;
}

.appShell{
  width:100%;
  max-width:420px;
  min-height:calc(100vh - 32px);
  margin:0 auto;
  position:relative;
  padding-bottom:88px;
}

.appCard{
  width:100%;
  min-height:calc(100vh - 120px);
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(221,232,216,0.85);
  border-radius:30px;
  box-shadow:var(--sombra-suave);
  padding:20px 16px 18px;
  overflow:hidden;
  position:relative;
}

.appCard::before{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  right:-70px;
  top:-55px;
  background:rgba(232,243,226,0.8);
  border-radius:50%;
  z-index:0;
}

.appCard::after{
  content:"";
  position:absolute;
  width:145px;
  height:145px;
  left:-68px;
  bottom:-58px;
  background:rgba(243,236,221,0.62);
  border-radius:50%;
  z-index:0;
}

.appCard > *{
  position:relative;
  z-index:1;
}

/* TOPO */

.topoApp{
  display:grid;
  grid-template-columns:46px 1fr 46px;
  gap:12px;
  align-items:center;
  margin-bottom:20px;
}

.logoBolinha,
.botaoTopo{
  width:46px;
  height:46px;
  border-radius:50%;
  background:white;
  border:1px solid rgba(221,232,216,0.8);
  box-shadow:0 6px 16px rgba(84,110,79,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--verde-texto);
  font-size:22px;
  font-family:var(--fonte);
}

.botaoTopo{
  cursor:pointer;
}

.tituloArea{
  min-width:0;
  text-align:center;
}

.tituloApp{
  font-size:25px;
  font-weight:500;
  color:#435F3E;
  line-height:1.05;
  letter-spacing:-0.5px;
}

.subtituloApp{
  color:var(--texto-suave);
  font-size:12px;
  margin-top:5px;
  line-height:1.35;
}

/* HERO */

.heroAnotacao{
  background:rgba(242,247,240,0.92);
  border:1px solid rgba(221,232,216,0.95);
  border-radius:26px;
  padding:16px 14px;
  display:grid;
  grid-template-columns:54px 1fr;
  gap:12px;
  align-items:center;
  margin-bottom:16px;
}

.heroIcone{
  width:52px;
  height:52px;
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 5px 14px rgba(84,110,79,0.08);
  color:var(--verde-salvia-escuro);
  font-size:25px;
}

.heroTexto h2{
  font-size:16px;
  color:var(--texto);
  font-weight:600;
  margin-bottom:4px;
}

.heroTexto p{
  color:var(--texto-suave);
  font-size:12.5px;
  line-height:1.45;
}

/* AÇÕES */

.acoesTopo{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-bottom:14px;
}

.botaoAdicionar{
  width:100%;
  min-height:50px;
  border:none;
  border-radius:19px;
  background:var(--verde-salvia);
  color:white;
  font-family:var(--fonte);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(111,141,98,0.22);
  transition:0.2s ease;
}

.botaoAdicionar:hover{
  background:var(--verde-salvia-escuro);
  transform:translateY(-1px);
}

.listaTitulo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:8px 2px 10px;
}

.listaTitulo h3{
  color:var(--verde-texto);
  font-size:16px;
  font-weight:600;
}

.contadorNotas{
  font-size:11px;
  color:var(--texto-suave);
  background:#F2F4EF;
  border-radius:999px;
  padding:6px 9px;
}

/* LISTA */

.listaAnotacoes{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.anotacaoCard{
  background:rgba(255,255,255,0.94);
  border:1px solid rgba(221,232,216,0.92);
  border-radius:23px;
  padding:14px 13px;
  box-shadow:0 8px 18px rgba(84,110,79,0.08);
  display:flex;
  flex-direction:column;
  gap:9px;
}

.anotacaoTopo{
  display:grid;
  grid-template-columns:42px 1fr auto;
  gap:10px;
  align-items:center;
}

.anotacaoIcone{
  width:42px;
  height:42px;
  border-radius:50%;
  background:var(--verde-muito-claro);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--verde-salvia-escuro);
  font-size:20px;
}

.anotacaoData{
  font-size:13px;
  font-weight:600;
  color:#3E5140;
  line-height:1.25;
}

.anotacaoHora{
  margin-top:2px;
  font-size:11.5px;
  color:var(--texto-suave);
}

.anotacaoTexto{
  color:#3F463F;
  font-size:13px;
  line-height:1.55;
  white-space:pre-wrap;
  background:#FAFBF7;
  border:1px solid #EDF2EA;
  border-radius:16px;
  padding:11px 12px;
}

.anotacaoBotoes{
  display:flex;
  gap:8px;
  justify-content:flex-end;
}

.botaoMini{
  border:none;
  border-radius:13px;
  padding:8px 10px;
  font-family:var(--fonte);
  font-size:11.5px;
  cursor:pointer;
}

.botaoEditar{
  background:#EAF3E8;
  color:var(--verde-texto);
}

.botaoExcluir{
  background:#F5E6E6;
  color:#8A3030;
}

.estadoVazio{
  background:rgba(255,255,255,0.84);
  border:1px dashed #C9D9C4;
  border-radius:24px;
  padding:24px 16px;
  text-align:center;
  color:var(--texto-suave);
  font-size:13px;
  line-height:1.55;
}

/* BARRA INFERIOR */

.bottomNav{
  position:fixed;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  width:min(420px, calc(100% - 28px));
  background:rgba(255,255,255,0.96);
  border:1px solid rgba(221,232,216,0.9);
  border-radius:26px;
  box-shadow:0 10px 28px rgba(84,110,79,0.14);
  display:grid;
  grid-template-columns:1fr 1fr 68px 1fr 1fr;
  gap:2px;
  align-items:center;
  padding:9px 10px;
  z-index:20;
}

.navItem{
  border:none;
  background:transparent;
  font-family:var(--fonte);
  color:#8C9288;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  font-size:10.5px;
  cursor:pointer;
}

.navItem .navIcon{
  font-size:20px;
  line-height:1;
}

.navItem.ativo{
  color:var(--verde-salvia-escuro);
  font-weight:500;
}

.navPlus{
  width:58px;
  height:58px;
  border-radius:50%;
  border:none;
  background:var(--verde-salvia);
  color:white;
  font-size:35px;
  line-height:1;
  margin:-22px auto 0;
  box-shadow:0 10px 20px rgba(111,141,98,0.25);
  cursor:pointer;
}

/* MODAIS */

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.34);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
  z-index:999;
}

.modalOverlay.show{
  display:flex;
}

.modalCard{
  width:100%;
  max-width:340px;
  background:rgba(255,255,255,0.98);
  border-radius:28px;
  padding:18px;
  box-shadow:0 14px 36px rgba(0,0,0,0.18);
  display:flex;
  flex-direction:column;
  gap:13px;
  border:1px solid rgba(221,232,216,0.9);
}

.modalTopo{
  position:relative;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modalVoltar{
  position:absolute;
  left:0;
  top:0;
  border:none;
  background:#EEF3EC;
  border-radius:14px;
  width:42px;
  height:42px;
  cursor:pointer;
  font-size:16px;
  font-family:var(--fonte);
  color:var(--texto);
}

.modalTituloArea{
  text-align:center;
  padding:0 46px;
}

.modalTitle{
  font-size:20px;
  font-weight:500;
  color:var(--verde-texto);
  line-height:1.15;
}

.modalSub{
  font-size:11.5px;
  color:var(--texto-suave);
  margin-top:3px;
  line-height:1.25;
}

.formAnotacao{
  display:flex;
  flex-direction:column;
  gap:11px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:12.5px;
  color:#314235;
  font-weight:600;
}

.field input,
.field textarea{
  width:100%;
  border:1px solid var(--borda);
  border-radius:16px;
  padding:12px 13px;
  font-family:var(--fonte);
  font-size:13px;
  background:#FFFFFF;
  outline:none;
}

.field textarea{
  min-height:130px;
  resize:none;
  line-height:1.45;
}

.field input:focus,
.field textarea:focus{
  border-color:var(--verde-salvia);
  box-shadow:0 0 0 3px rgba(141,167,125,0.15);
}

.duasColunas{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}

.modalBtns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin-top:2px;
}

.modalBtns button{
  min-height:46px;
  border:none;
  border-radius:17px;
  font-family:var(--fonte);
  font-size:13.5px;
  cursor:pointer;
  font-weight:500;
}

.cancel{
  background:#F0F0F0;
  color:#444;
}

.save{
  background:var(--verde-salvia);
  color:white;
}

/* RESPONSIVO */

@media (max-width:390px){
  body{
    padding:12px;
  }

  .appShell{
    min-height:calc(100vh - 24px);
  }

  .appCard{
    padding:18px 13px 16px;
    border-radius:28px;
  }

  .tituloApp{
    font-size:23px;
  }

  .bottomNav{
    bottom:10px;
    width:calc(100% - 22px);
  }

  .duasColunas{
    grid-template-columns:1fr;
  }
}

.sobreQuemField{
  position:relative;
}

.listaNomesSobreQuem{
  display:none;
  flex-direction:column;
  gap:6px;
  background:#FFFFFF;
  border:1px solid var(--borda);
  border-radius:16px;
  padding:8px;
  box-shadow:0 10px 22px rgba(84,110,79,0.13);
  max-height:155px;
  overflow-y:auto;
}

.listaNomesSobreQuem.show{
  display:flex;
}

.nomeSugestaoBtn{
  border:none;
  border-radius:13px;
  background:#F2F7F0;
  color:var(--verde-texto);
  font-family:var(--fonte);
  font-size:12.5px;
  padding:9px 10px;
  text-align:left;
  cursor:pointer;
}

.nomeSugestaoBtn:hover{
  background:#EAF3E8;
}

.anotacaoPessoa{
  width:max-content;
  max-width:100%;
  background:#EAF3E8;
  color:var(--verde-texto);
  border-radius:999px;
  padding:5px 9px;
  font-size:11.2px;
  font-weight:500;
  margin-bottom:-2px;
}


/* BACKUP DAS ANOTAÇÕES */
.acoesBackup{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin-top:-2px;
}

.botaoBackup{
  width:100%;
  min-height:44px;
  border:none;
  border-radius:17px;
  background:#F2F7F0;
  color:var(--verde-texto);
  font-family:var(--fonte);
  font-size:12.5px;
  font-weight:500;
  cursor:pointer;
  border:1px solid rgba(221,232,216,0.95);
  box-shadow:0 5px 14px rgba(84,110,79,0.07);
}

.botaoBackup:hover{
  background:#EAF3E8;
}

.inputBackupOculto{
  display:none;
}

@media (max-width:390px){
  .acoesBackup{
    grid-template-columns:1fr;
  }
}
/* FIM BACKUP DAS ANOTAÇÕES */


/* AJUSTE — MENU DE BACKUP NO TOPO */
.botaoBackupTopo{
  cursor:pointer;
  border:none;
  color:var(--verde-salvia-escuro);
  font-size:22px;
}

.botaoBackupTopo:hover{
  background:#F2F7F0;
  transform:translateY(-1px);
}

.botaoBackupOpcao{
  box-shadow:0 8px 18px rgba(111,141,98,0.16);
}

.botaoBackupOpcao.secundario{
  background:#F2F7F0;
  color:var(--verde-texto);
  border:1px solid rgba(221,232,216,0.95);
  box-shadow:0 5px 14px rgba(84,110,79,0.07);
}

.botaoBackupOpcao.secundario:hover{
  background:#EAF3E8;
}
/* FIM AJUSTE — MENU DE BACKUP NO TOPO */


/* NUVEM SUPABASE */
.statusNuvem{
  width:100%;
  min-height:34px;
  border-radius:15px;
  background:#F2F7F0;
  border:1px solid rgba(221,232,216,0.95);
  color:var(--verde-texto);
  font-size:11.8px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:8px 10px;
}

.statusNuvem.ok,
.statusNuvemModal.ok{
  background:#EAF3E8;
  color:var(--verde-salvia-escuro);
}

.statusNuvem.erro,
.statusNuvemModal.erro{
  background:#F8E8EA;
  color:#8A3030;
}

.statusNuvemModal{
  width:100%;
  min-height:38px;
  border-radius:16px;
  background:#F2F7F0;
  border:1px solid rgba(221,232,216,0.95);
  color:var(--verde-texto);
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:9px 10px;
}

.botoesNuvemDuasColunas{
  margin-top:0;
}

.linhaDivisoriaBackup{
  height:1px;
  background:rgba(221,232,216,0.95);
  margin:4px 0;
}
/* FIM NUVEM SUPABASE */

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="appShell">

  <main class="appCard">

    <header class="topoApp">
      <button class="botaoTopo" onclick="irPara('index.html')" title="Voltar">←</button>

      <div class="tituloArea">
        <h1 class="tituloApp">Anotações</h1>
        <div class="subtituloApp">Registre o que é importante lembrar.</div>
      </div>

      <button class="logoBolinha botaoBackupTopo" onclick="abrirModalBackup()" title="Nuvem e backup">☁</button>
    </header>
    <div class="acoesTopo">
      <button class="botaoAdicionar" onclick="abrirModalAnotacao()">＋ Adicionar anotação</button>
      <div class="statusNuvem" id="statusNuvem">Nuvem: desconectada</div>


    </div>

    <div class="listaTitulo">
      <h3>Lista de anotações</h3>
      <div class="contadorNotas" id="contadorNotas">0 registros</div>
    </div>

    <section class="listaAnotacoes" id="listaAnotacoes"></section>

  </main>

</div>

<input
  type="file"
  id="inputImportarAnotacoes"
  class="inputBackupOculto"
  accept=".json,application/json"
  onchange="importarAnotacoesArquivo(event)"
>

<nav class="bottomNav">
  <button class="navItem" onclick="irPara('index.html')">
    <span class="navIcon">⌂</span>
    <span>Início</span>
  </button>

  <button class="navItem" onclick="abrirModalRotina()">
    <span class="navIcon">🍃</span>
    <span>Rotina</span>
  </button>

  <button class="navPlus" onclick="abrirModalAnotacao()">+</button>

  <button class="navItem ativo" onclick="irPara('anotacao.html')">
    <span class="navIcon">✎</span>
    <span>Anotações</span>
  </button>

  <button class="navItem" onclick="irPara('gabriela-menu.html')">
    <span class="navIcon">♡</span>
    <span>Autocuidado</span>
  </button>
</nav>

<div class="modalOverlay" id="modalAnotacao">
  <div class="modalCard">
    <div class="modalTopo">
      <button class="modalVoltar" onclick="fecharModalAnotacao()">←</button>

      <div class="modalTituloArea">
        <div class="modalTitle" id="tituloModalAnotacao">Nova anotação</div>
        <div class="modalSub">preencha data, hora e descrição</div>
      </div>
    </div>

    <div class="formAnotacao">
      <div class="field sobreQuemField">
        <label for="campoSobreQuem">Sobre quem</label>
        <input
          type="text"
          id="campoSobreQuem"
          placeholder="Digite ou escolha um nome"
          autocomplete="off"
          onclick="mostrarListaNomesSobreQuem()"
          onfocus="mostrarListaNomesSobreQuem()"
          oninput="renderizarListaNomesSobreQuem()"
        >
        <div id="listaNomesSobreQuem" class="listaNomesSobreQuem"></div>
      </div>

      <div class="duasColunas">
        <div class="field">
          <label for="campoData">Data</label>
          <input type="date" id="campoData">
        </div>

        <div class="field">
          <label for="campoHora">Hora</label>
          <input type="time" id="campoHora">
        </div>
      </div>

      <div class="field">
        <label for="campoDescricao">Descrição</label>
        <textarea id="campoDescricao" placeholder="Escreva a anotação aqui..."></textarea>
      </div>

      <div class="modalBtns">
        <button class="cancel" onclick="fecharModalAnotacao()">Cancelar</button>
        <button class="save" onclick="salvarAnotacao()">Salvar</button>
      </div>
    </div>
  </div>
</div>



<div class="modalOverlay" id="modalBackup">
  <div class="modalCard">
    <div class="modalTopo">
      <button class="modalVoltar" onclick="fecharModalBackup()">←</button>

      <div class="modalTituloArea">
        <div class="modalTitle">Nuvem e backup</div>
        <div class="modalSub">entre, sincronize ou restaure suas anotações</div>
      </div>
    </div>

    <div class="formAnotacao">
      <div class="statusNuvemModal" id="statusNuvemModal">Nuvem: desconectada</div>

      <div class="field">
        <label for="campoEmailNuvem">E-mail</label>
        <input type="email" id="campoEmailNuvem" placeholder="seu e-mail">
      </div>

      <div class="field">
        <label for="campoSenhaNuvem">Senha</label>
        <input type="password" id="campoSenhaNuvem" placeholder="sua senha">
      </div>

      <div class="modalBtns botoesNuvemDuasColunas">
        <button class="save" onclick="entrarNuvem()">Entrar</button>
        <button class="cancel" onclick="criarContaNuvem()">Criar conta</button>
      </div>

      <button class="botaoAdicionar botaoBackupOpcao" onclick="sincronizarAnotacoesNuvem()">↕ Sincronizar nuvem</button>
      <button class="botaoAdicionar botaoBackupOpcao secundario" onclick="baixarAnotacoesDaNuvemComConfirmacao()">↓ Baixar da nuvem</button>
      <button class="botaoAdicionar botaoBackupOpcao secundario" onclick="enviarAnotacoesParaNuvem()">↑ Enviar para nuvem</button>
      <button class="botaoAdicionar botaoBackupOpcao secundario" onclick="sairNuvem()">Sair da nuvem</button>

      <div class="linhaDivisoriaBackup"></div>

      <button class="botaoAdicionar botaoBackupOpcao" onclick="exportarAnotacoes()">↑ Exportar backup</button>

<script>

function irPara(destino){

function pad2(n){
  return String(n).padStart(2, "0");
}

function hojeISO(){
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

function horaAtual(){
  const d = new Date();
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function formatarDataBR(dataISO){
  if(!dataISO) return "";
  const [ano, mes, dia] = dataISO.split("-");
  return `${dia}/${mes}/${ano}`;
}

function carregarAnotacoes(){
  try{
    const dados = JSON.parse(localStorage.getItem(CHAVE_ANOTACOES)) || [];
    return Array.isArray(dados) ? dados : [];
  }catch(e){
    return [];
  }
}

function salvarListaAnotacoes(lista){
  localStorage.setItem(CHAVE_ANOTACOES, JSON.stringify(lista));
}

function obterNomesSobreQuem(){
  const nomes = carregarAnotacoes()
    .map(item => (item.sobreQuem || "").trim())
    .filter(Boolean);

  return [...new Set(nomes)].sort((a,b) => a.localeCompare(b, "pt-BR"));
}

function renderizarListaNomesSobreQuem(){
  const input = document.getElementById("campoSobreQuem");
  const box = document.getElementById("listaNomesSobreQuem");
  if(!input || !box) return;

  const filtro = input.value.trim().toLowerCase();
  const nomes = obterNomesSobreQuem().filter(nome => nome.toLowerCase().includes(filtro));

  box.innerHTML = "";

  if(!nomes.length){
    box.innerHTML = `<button type="button" class="nomeSugestaoBtn" onclick="ocultarListaNomesSobreQuem()">Nenhum nome salvo ainda</button>`;
    return;
  }

  nomes.forEach(nome => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "nomeSugestaoBtn";

    btn.onclick = () => escolherNomeSobreQuem(nome);

}

function mostrarListaNomesSobreQuem(){

function ocultarListaNomesSobreQuem(){

function escolherNomeSobreQuem(nome){

function ordenarAnotacoes(lista){
  return [...lista].sort((a,b) => {
    const dataA = `${a.data || ""}T${a.hora || "00:00"}`;
    const dataB = `${b.data || ""}T${b.hora || "00:00"}`;
    return dataB.localeCompare(dataA);
  });
}

function renderizarAnotacoes(){

    listaBox.innerHTML = `

          <button class="botaoMini botaoExcluir" onclick="excluirAnotacao('${item.id}')">excluir</button>

      </div>
      ${item.sobreQuem ? `<div class="anotacaoPessoa">Sobre: ${item.sobreQuem}</div>` : ""}

    card.querySelector(".anotacaoTexto").textContent = item.descricao || "";

function abrirModalAnotacao(){

function fecharModalAnotacao(){

function salvarAnotacao(){
  const sobreQuem = document.getElementById("campoSobreQuem").value.trim();
  const data = document.getElementById("campoData").value;
  const hora = document.getElementById("campoHora").value;
  const descricao = document.getElementById("campoDescricao").value.trim();

  if(!data){
    alert("Escolha uma data.");
    return;
  }

  if(!hora){
    alert("Escolha uma hora.");
    return;
  }

  if(!descricao){
    alert("Escreva a descrição da anotação.");
    return;
  }

  const lista = carregarAnotacoes();

  if(anotacaoEditandoId){
    const item = lista.find(a => a.id === anotacaoEditandoId);
    if(item){
      item.sobreQuem = sobreQuem;
      item.data = data;
      item.hora = hora;
      item.descricao = descricao;
      item.atualizadoEm = new Date().toISOString();
    }
  }else{
    lista.push({
      id:`anotacao_${Date.now()}`,
      sobreQuem,
      data,
      hora,
      descricao,
      criadoEm:new Date().toISOString()
    });
  }

  salvarListaAnotacoes(lista);

  const itemSalvo = anotacaoEditandoId
    ? lista.find(a => a.id === anotacaoEditandoId)
    : lista[lista.length - 1];

  salvarAnotacaoNaNuvem(itemSalvo);

  fecharModalAnotacao();
  renderizarAnotacoes();

function editarAnotacao(id){

  anotacaoEditandoId = id;
  document.getElementById("tituloModalAnotacao").textContent = "Editar anotação";

  setTimeout(() => document.getElementById("campoDescricao").focus(), 80);
}

function excluirAnotacao(id){

function baixarArquivoJSON(nomeArquivo, dados){
  const blob = new Blob([JSON.stringify(dados, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = nomeArquivo;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

    total:Array.isArray(anotacoes) ? anotacoes.length : 0,

  };

function normalizarBackupAnotacoes(dados){
  if(Array.isArray(dados)){
    return dados;
  }

  if(dados && Array.isArray(dados.anotacoes)){
    return dados.anotacoes;
  }

  if(dados && typeof dados === "object"){
    if(typeof dados[CHAVE_ANOTACOES] === "string"){
      try{
        const lista = JSON.parse(dados[CHAVE_ANOTACOES]);
        if(Array.isArray(lista)) return lista;
      }catch(e){}
    }

    for(const chave of Object.keys(dados)){
      if(chave.toLowerCase().includes("anot") && typeof dados[chave] === "string"){
        try{
          const lista = JSON.parse(dados[chave]);
          if(Array.isArray(lista)) return lista;
        }catch(e){}
      }
    }
  }

  return null;
}

function importarAnotacoesArquivo(event){
  const arquivo = event.target.files && event.target.files[0];
  if(!arquivo) return;

  const leitor = new FileReader();

  leitor.onload = function(){
    try{
      const dados = JSON.parse(leitor.result);
      const anotacoesImportadas = normalizarBackupAnotacoes(dados);

      if(!Array.isArray(anotacoesImportadas)){
        alert("Não consegui encontrar uma lista de anotações válida neste arquivo.");
        return;
      }

      const atuais = carregarAnotacoes();

      const escolha = confirm(
        "Foram encontradas " + anotacoesImportadas.length + " anotações no backup.\n\n" +
        "OK = juntar com as anotações atuais\n" +
        "Cancelar = substituir tudo pelo backup"
      );

      let novaLista;

      if(escolha){
        const mapa = new Map();

        atuais.forEach(item => {
          if(item && item.id) mapa.set(item.id, item);
        });

        anotacoesImportadas.forEach(item => {
          if(!item || typeof item !== "object") return;

          const id = item.id || `anotacao_importada_${Date.now()}_${Math.random().toString(16).slice(2)}`;
          mapa.set(id, {...item, id});
        });

        novaLista = Array.from(mapa.values());
      }else{
        const confirmarSubstituir = confirm(
          "Tem certeza que deseja substituir as anotações atuais pelo backup?"
        );

        if(!confirmarSubstituir) return;

        novaLista = anotacoesImportadas
          .filter(item => item && typeof item === "object")
          .map((item, index) => ({
            ...item,
            id:item.id || `anotacao_importada_${Date.now()}_${index}`
          }));
      }

      salvarListaAnotacoes(novaLista);
      renderizarAnotacoes();

      alert("Anotações importadas com sucesso. Total atual: " + novaLista.length);
    }catch(e){
      alert("Não consegui ler este arquivo. Verifique se ele é um backup JSON válido.");
    }
  };

  leitor.readAsText(arquivo);
}



function iniciarSupabase(){
  try{
    if(window.supabase && !supabaseClient){
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }
  }catch(e){
    supabaseClient = null;
  }
}

function atualizarStatusNuvem(texto, tipo){
  const status = document.getElementById("statusNuvem");
  const statusModal = document.getElementById("statusNuvemModal");

  const mensagem = texto || (usuarioNuvem ? `Nuvem: conectada em ${usuarioNuvem.email}` : "Nuvem: desconectada");

  [status, statusModal].forEach(el => {
    if(!el) return;
    el.textContent = mensagem;
    el.classList.remove("ok", "erro");
    if(tipo) el.classList.add(tipo);
    else if(usuarioNuvem) el.classList.add("ok");
  });
}

async function carregarSessaoNuvem(){
  iniciarSupabase();

  if(!supabaseClient){
    atualizarStatusNuvem("Nuvem indisponível. Verifique a internet.", "erro");
    return;
  }

  const { data } = await supabaseClient.auth.getSession();
  usuarioNuvem = data && data.session ? data.session.user : null;

  atualizarStatusNuvem();

  if(usuarioNuvem){
    const email = document.getElementById("campoEmailNuvem");
    if(email && !email.value) email.value = usuarioNuvem.email || "";
  }
}

function obterEmailSenhaNuvem(){
  const email = (document.getElementById("campoEmailNuvem")?.value || "").trim();
  const senha = document.getElementById("campoSenhaNuvem")?.value || "";

  if(!email){
    alert("Digite seu e-mail.");
    return null;
  }

  if(!senha || senha.length < 6){
    alert("Digite uma senha com pelo menos 6 caracteres.");
    return null;
  }

  return {email, senha};
}

async function criarContaNuvem(){
  iniciarSupabase();
  if(!supabaseClient){
    alert("Não consegui iniciar a nuvem. Verifique sua internet.");
    return;
  }

  const credenciais = obterEmailSenhaNuvem();
  if(!credenciais) return;

  atualizarStatusNuvem("Criando conta...", "");

  const { data, error } = await supabaseClient.auth.signUp({
    email: credenciais.email,
    password: credenciais.senha
  });

  if(error){
    atualizarStatusNuvem("Erro ao criar conta.", "erro");
    alert("Erro ao criar conta: " + error.message);
    return;
  }

  usuarioNuvem = data && data.user ? data.user : null;
  atualizarStatusNuvem(usuarioNuvem ? `Nuvem: conectada em ${usuarioNuvem.email}` : "Conta criada. Verifique seu e-mail, se necessário.", "ok");
  alert("Conta criada. Se o Supabase pedir confirmação de e-mail, confirme antes de entrar.");
}

async function entrarNuvem(){
  iniciarSupabase();
  if(!supabaseClient){
    alert("Não consegui iniciar a nuvem. Verifique sua internet.");
    return;
  }

  const credenciais = obterEmailSenhaNuvem();
  if(!credenciais) return;

  atualizarStatusNuvem("Entrando na nuvem...", "");

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: credenciais.email,
    password: credenciais.senha
  });

  if(error){
    atualizarStatusNuvem("Erro ao entrar na nuvem.", "erro");
    alert("Erro ao entrar: " + error.message);
    return;
  }

  usuarioNuvem = data.user;
  atualizarStatusNuvem();
  alert("Entrada realizada com sucesso.");
}

async function sairNuvem(){
  iniciarSupabase();
  if(supabaseClient){
    await supabaseClient.auth.signOut();
  }

  usuarioNuvem = null;
  atualizarStatusNuvem("Nuvem: desconectada", "");
  alert("Você saiu da nuvem.");
}

function anotacaoParaLinhaNuvem(item){
  return {
    id:item.id,
    user_id:usuarioNuvem.id,
    sobre_quem:item.sobreQuem || null,
    data:item.data || null,
    hora:item.hora || null,
    descricao:item.descricao || "",
    criado_em:item.criadoEm || null,
    atualizado_em:item.atualizadoEm || null
  };
}

function linhaNuvemParaAnotacao(linha){
  return {
    id:linha.id,
    sobreQuem:linha.sobre_quem || "",
    data:linha.data || "",
    hora:linha.hora || "",
    descricao:linha.descricao || "",
    criadoEm:linha.criado_em || linha.created_at || new Date().toISOString(),
    atualizadoEm:linha.atualizado_em || ""
  };
}

async function garantirLoginNuvem(){
  iniciarSupabase();

  if(!supabaseClient){
    alert("Nuvem indisponível. Verifique a internet.");
    return false;
  }

  if(!usuarioNuvem){
    const { data } = await supabaseClient.auth.getSession();
    usuarioNuvem = data && data.session ? data.session.user : null;
  }

  if(!usuarioNuvem){
    atualizarStatusNuvem("Entre na nuvem primeiro.", "erro");
    alert("Entre na nuvem primeiro com e-mail e senha.");
    return false;
  }

  atualizarStatusNuvem();
  return true;
}

async function enviarAnotacoesParaNuvem(){
  if(!(await garantirLoginNuvem())) return;

  const lista = carregarAnotacoes();

  if(!lista.length){
    alert("Não há anotações locais para enviar.");
    return;
  }

  atualizarStatusNuvem("Enviando anotações para a nuvem...", "");

  const linhas = lista
    .filter(item => item && item.id)
    .map(anotacaoParaLinhaNuvem);

  const { error } = await supabaseClient
    .from("anotacoes")
    .upsert(linhas, { onConflict:"id" });

  if(error){
    atualizarStatusNuvem("Erro ao enviar para a nuvem.", "erro");
    alert("Erro ao enviar para a nuvem: " + error.message);
    return;
  }

  atualizarStatusNuvem("Anotações enviadas para a nuvem.", "ok");
  alert("Anotações enviadas para a nuvem com sucesso.");
}

async function baixarAnotacoesDaNuvemComConfirmacao(){
  if(!(await garantirLoginNuvem())) return;

  const escolha = confirm(
    "Como deseja baixar da nuvem?\n\n" +
    "OK = juntar com as anotações atuais\n" +
    "Cancelar = substituir as anotações locais pelas da nuvem"
  );

  await baixarAnotacoesDaNuvem({ juntar: escolha, pedirConfirmacaoSubstituir: !escolha });
}

async function baixarAnotacoesDaNuvem(opcoes = {juntar:true, pedirConfirmacaoSubstituir:false}){
  if(!(await garantirLoginNuvem())) return;

  atualizarStatusNuvem("Baixando anotações da nuvem...", "");

  const { data, error } = await supabaseClient
    .from("anotacoes")
    .select("*")
    .eq("user_id", usuarioNuvem.id)
    .order("data", { ascending:false });

  if(error){
    atualizarStatusNuvem("Erro ao baixar da nuvem.", "erro");
    alert("Erro ao baixar da nuvem: " + error.message);
    return;
  }

  const anotacoesNuvem = (data || []).map(linhaNuvemParaAnotacao);

  let novaLista;

  if(opcoes.juntar){
    const mapa = new Map();

    carregarAnotacoes().forEach(item => {
      if(item && item.id) mapa.set(item.id, item);
    });

    anotacoesNuvem.forEach(item => {
      if(item && item.id) mapa.set(item.id, item);
    });

    novaLista = Array.from(mapa.values());
  }else{
    if(opcoes.pedirConfirmacaoSubstituir){
      const confirmar = confirm("Tem certeza que deseja substituir as anotações locais pelas anotações da nuvem?");
      if(!confirmar) return;
    }

    novaLista = anotacoesNuvem;
  }

  salvarListaAnotacoes(novaLista);
  renderizarAnotacoes();
  atualizarStatusNuvem("Anotações baixadas da nuvem.", "ok");
  alert("Anotações baixadas. Total local: " + novaLista.length);
}

async function sincronizarAnotacoesNuvem(){
  if(!(await garantirLoginNuvem())) return;

  await enviarAnotacoesParaNuvem();
  await baixarAnotacoesDaNuvem({juntar:true, pedirConfirmacaoSubstituir:false});
}

async function salvarAnotacaoNaNuvem(item){
  if(!usuarioNuvem || !supabaseClient || !item || !item.id) return;

  await supabaseClient
    .from("anotacoes")
    .upsert([anotacaoParaLinhaNuvem(item)], { onConflict:"id" });
}

async function excluirAnotacaoDaNuvem(id){
  if(!usuarioNuvem || !supabaseClient || !id) return;

  await supabaseClient
    .from("anotacoes")
    .delete()
    .eq("id", id)
    .eq("user_id", usuarioNuvem.id);
}
