<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif;background:#F6F7F5;margin:0;display:flex;justify-content:center;padding:18px;box-sizing:border-box;color:#5f5f5f}.card{width:min(420px,100%);background:#fff;border-radius:22px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.2);display:flex;flex-direction:column;gap:16px;box-sizing:border-box}.topbar{display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:10px}.topCenter{display:flex;align-items:center;justify-content:center;gap:8px;min-width:0}.backBtn,.addBtn,.summaryBtn,.futureBtn,.chipBtn,.miniBtn{border:none;background:rgba(61,111,76,.12);color:#3d6f4c;cursor:pointer;font-family:'Poppins',sans-serif}.backBtn,.addBtn{width:34px;height:34px;border-radius:12px;font-size:18px;line-height:1}.addBtn{font-size:20px}.summaryBtn{border-radius:12px;padding:9px 12px;font-size:12px;white-space:nowrap}.titleIcon{font-size:18px;line-height:1;flex:0 0 auto}.title{font-size:18px;color:#3d6f4c;margin:0;font-weight:400;line-height:1.1;white-space:nowrap}.topActions{display:flex;align-items:center;gap:8px;justify-self:end}.listBox{background:rgba(255,255,255,.72);border-radius:16px;padding:12px;box-sizing:border-box}.filtrosTopoLista{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}select,input,textarea{padding:11px 12px;border-radius:12px;border:1px solid #d5d5d5;font-size:13px;font-family:'Poppins',sans-serif;box-sizing:border-box;width:100%;outline:none;background:#fff;color:#5f5f5f}textarea{resize:vertical;min-height:110px}.filtroSelect,.periodoSelect{border:1px solid #b8d8bf;background:#dff1df;color:#3d6f4c;border-radius:14px;font-weight:500}.item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:12px;margin-top:10px;cursor:pointer;box-sizing:border-box}.itemTexto{display:flex;flex-direction:column;min-width:0;flex:1}.nome{font-size:13px;font-weight:600;color:#5f5f5f;line-height:1.4;word-break:break-word}.detalhe{font-size:12.5px;color:#5f5f5f;margin-top:2px;line-height:1.4;word-break:break-word}.empty{text-align:center;color:#666;font-size:13px;padding:10px 0 4px}.footerMiniAction{display:flex;justify-content:center;margin-top:2px}.futureBtn{border-radius:999px;padding:7px 12px;font-size:11px}.modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;justify-content:center;align-items:center;padding:16px;box-sizing:border-box;z-index:999}.modalOverlay.show{display:flex}.modal{background:#fff;padding:18px;border-radius:20px;width:min(360px,100%);max-height:calc(100vh - 32px);overflow:auto;display:flex;flex-direction:column;gap:10px;box-sizing:border-box;box-shadow:0 10px 30px rgba(0,0,0,.22)}.modalHeader{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}.modalTitle{font-size:18px;color:#3d6f4c;margin:0;font-weight:500;line-height:1.3}.dataHoraTopo{font-size:11px;color:#777;text-align:right;line-height:1.35}.field{display:flex;flex-direction:column;gap:6px}.field label,.col label{font-size:13px;color:#444;font-weight:400;line-height:1.2}.row{display:flex;gap:8px;width:100%}.col{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}.modalBtns{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}.modalBtns button{flex:1;min-width:0;padding:9px 10px;border:none;border-radius:12px;cursor:pointer;font-family:'Poppins',sans-serif;font-size:12.5px;min-height:44px}.cancel{background:#efefef;color:#333}.save{background:#3d6f4c;color:#fff}.danger{background:#f5d7d7;color:#8a3030}.saveMore{background:rgba(61,111,76,.15);color:#2f5d3d}.ingredientesBox,.preparoBox{background:#f8f8f8;border-radius:12px;padding:10px 12px;font-size:12.5px;line-height:1.5;color:#5f5f5f;white-space:pre-wrap}.secaoLista+.secaoLista{margin-top:14px}.secaoTitulo{text-align:center;color:#3d6f4c;font-size:14px;font-weight:500;margin-bottom:2px}.secaoSubtitulo{text-align:center;color:#8aa08f;font-size:11.5px;margin:0 0 8px;line-height:1.3}.refeicaoTitulo{font-size:12px;color:#3d6f4c;margin:10px 0 4px;font-weight:500}.checkboxBox{background:#fff;border:1px solid #d5d5d5;border-radius:12px;padding:9px 10px;display:grid;grid-template-columns:1fr 1fr;gap:7px 10px;box-sizing:border-box}.checkboxBox.oneCol{grid-template-columns:1fr}.checkOption{display:flex;align-items:center;gap:6px;font-size:12px;color:#5f5f5f;line-height:1.25}.checkOption input{width:auto;margin:0;accent-color:#3d6f4c}.campoAjuda{font-size:10.5px;color:#777;margin-top:-2px;line-height:1.35}.miniBtn{border-radius:10px;padding:7px 10px;font-size:11.5px}.resumoLista{max-height:330px;overflow:auto;display:flex;flex-direction:column;gap:8px}.resumoItem{background:#f8f8f8;border-radius:12px;padding:10px 12px}.resumoLinha{display:flex;gap:8px;flex-wrap:wrap}.resumoNome{font-size:13px;font-weight:600;color:#5f5f5f}.resumoDetalheInline{font-size:12.5px;color:#5f5f5f}@media(max-width:390px){.title{font-size:17px}.summaryBtn{padding:8px 9px}.row{flex-direction:column}.checkboxBox{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="card">
  <div class="topbar">
    <button class="backBtn" onclick="location.href='alimentacao.html'">←</button>
    <div class="topCenter"><span class="titleIcon">🗓️</span><h1 class="title">Cardápio</h1></div>
    <div class="topActions"><button class="summaryBtn" onclick="abrirResumoCardapio()">Resumo</button><button class="addBtn" onclick="abrirModalNovo()">+</button></div>
  </div>
  <div class="listBox">
    <div class="filtrosTopoLista">
      <select class="periodoSelect" id="semanaSelect" onchange="render()"></select>
      <select class="filtroSelect" id="diaFiltro" onchange="render()">
        <option value="todos">Dia da Semana</option><option value="segunda">Segunda</option><option value="terca">Terça</option><option value="quarta">Quarta</option><option value="quinta">Quinta</option><option value="sexta">Sexta</option><option value="sabado">Sábado</option><option value="domingo">Domingo</option>
      </select>
    </div>
    <div id="listaCardapio"></div>
  </div>
  <div class="footerMiniAction"><button class="futureBtn" onclick="abrirModalFuturasEdicoes()">futuras edições</button></div>
</div>

<div class="modalOverlay" id="modalCadastro"><div class="modal">
  <div class="modalHeader"><h2 class="modalTitle" id="tituloCadastro">Nova refeição</h2><div class="dataHoraTopo" id="dataHoraCadastro"></div></div>
  <div class="field"><label>Dias da semana</label><div id="diasBox" class="checkboxBox"></div></div>
  <div class="field"><label>Refeição</label><div id="refeicoesBox" class="checkboxBox"></div></div>
  <div class="field"><label>Prato / alimento</label><div id="pratosBox" class="checkboxBox oneCol"></div><input id="pratoExtraInput" placeholder="Ou escreva outra opção, separando por vírgula"><div class="campoAjuda">Você pode selecionar mais de uma opção e também escrever outras.</div></div>
  <div class="field"><label>Observações</label><textarea id="obsInput" placeholder="Ex.: sem tela, pouca bebida, levar lanche..."></textarea></div>
  <div class="modalBtns"><button class="cancel" onclick="fecharModalCadastro()">Cancelar</button><button class="danger" id="btnExcluir" onclick="excluirItemEditando()" style="display:none;">Excluir</button><button class="saveMore" onclick="salvarCadastroEMaisNovo()">Concluir + Novo</button><button class="save" onclick="salvarCadastro()">Concluir</button></div>
</div></div>

<div class="modalOverlay" id="modalResumo"><div class="modal"><h2 class="modalTitle">Resumo do Cardápio</h2><div id="resumoLista" class="resumoLista"></div><div class="modalBtns"><button class="cancel" onclick="fecharResumoCardapio()">Fechar</button></div></div></div>
<div class="modalOverlay" id="modalFuturasEdicoes"><div class="modal"><h2 class="modalTitle">Futuras edições</h2><div class="field"><label>Ideias de melhorias futuras</label><textarea id="futurasEdicoesTexto" placeholder="Escreva aqui suas ideias para melhorar essa tela..."></textarea></div><div class="modalBtns"><button class="cancel" onclick="fecharModalFuturasEdicoes()">Cancelar</button><button class="save" onclick="salvarFuturasEdicoes()">Concluir</button></div></div></div>
<script>
const CHAVE="cardapio_semanal"; const CHAVE_FUTURAS="futuras_edicoes_cardapio"; const CHAVE_RECEITAS="receitas_cadastradas"; let editandoId=null;
const DIAS=[['segunda','Segunda'],['terca','Terça'],['quarta','Quarta'],['quinta','Quinta'],['sexta','Sexta'],['sabado','Sábado'],['domingo','Domingo']];
const REFEICOES=['Café da manhã','Lanche da manhã','Almoço','Lanche da tarde','Jantar','Ceia'];
function getDados(){try{return JSON.parse(localStorage.getItem(CHAVE))||[]}catch{return[]}} function salvarDados(d){localStorage.setItem(CHAVE,JSON.stringify(d))}
function dataHora(){const a=new Date();return `${a.toLocaleDateString('pt-BR')} • ${a.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`}
function getInicioSemana(d=new Date()){const x=new Date(d); const day=x.getDay()||7; x.setDate(x.getDate()-day+1); x.setHours(0,0,0,0); return x}
function addDias(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x} function iso(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function labelSemana(start){const fim=addDias(start,6);return `${start.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})} a ${fim.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}`}
function escapeHtml(t){return String(t??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function normalizarArray(v){if(Array.isArray(v))return v.filter(Boolean); if(v)return [v]; return []}
function mesAtualBase(){const a=new Date(); return new Date(a.getFullYear(), a.getMonth(), 1)}
function semanasDoMesComBordas(){const base=mesAtualBase(); const ano=base.getFullYear(); const mes=base.getMonth(); const inicioMes=new Date(ano,mes,1); const fimMes=new Date(ano,mes+1,0); const ultDiaMesAnterior=new Date(ano,mes,0); const primDiaMesSeguinte=new Date(ano,mes+1,1); const starts=[]; function addStart(d){const s=getInicioSemana(d); if(!starts.some(x=>iso(x)===iso(s)))starts.push(s)} addStart(ultDiaMesAnterior); let cursor=getInicioSemana(inicioMes); while(cursor<=fimMes){addStart(cursor); cursor=addDias(cursor,7)} addStart(primDiaMesSeguinte); starts.sort((a,b)=>a-b); return starts}
function montarSemanas(){const sel=document.getElementById('semanaSelect'); const semanas=semanasDoMesComBordas(); sel.innerHTML='<option value="" selected disabled>Períodos por Semana</option>'+semanas.map(d=>`<option value="${iso(d)}">${labelSemana(d)}</option>`).join(''); sel.value='';}
function montarCheckboxes(containerId, opcoes, classe){document.getElementById(containerId).innerHTML=opcoes.map(([valor,label])=>`<label class="checkOption"><input type="checkbox" class="${classe}" value="${escapeHtml(valor)}"> ${escapeHtml(label)}</label>`).join('')}
function getMarcados(classe){return [...document.querySelectorAll('.'+classe+':checked')].map(i=>i.value)}
function marcar(classe,valores){const set=new Set(normalizarArray(valores)); document.querySelectorAll('.'+classe).forEach(i=>i.checked=set.has(i.value))}
function getReceitasNomes(){try{return (JSON.parse(localStorage.getItem(CHAVE_RECEITAS))||[]).map(r=>r.nome).filter(Boolean).sort((a,b)=>a.localeCompare(b,'pt-BR',{sensitivity:'base'}))}catch{return[]}}
function preencherPratosBox(valores=[]){const receitas=getReceitasNomes(); const box=document.getElementById('pratosBox'); if(!receitas.length){box.innerHTML='<div class="empty" style="padding:0;">Nenhuma receita cadastrada ainda.</div>';return} box.innerHTML=receitas.map(nome=>`<label class="checkOption"><input type="checkbox" class="pratoCheck" value="${escapeHtml(nome)}"> ${escapeHtml(nome)}</label>`).join(''); marcar('pratoCheck',valores)}
function abrirModalNovo(){editandoId=null;document.getElementById('tituloCadastro').textContent='Nova refeição';document.getElementById('dataHoraCadastro').textContent=dataHora();marcar('diaCheck',['segunda']);marcar('refeicaoCheck',['Café da manhã']);preencherPratosBox([]);document.getElementById('pratoExtraInput').value='';document.getElementById('obsInput').value='';document.getElementById('btnExcluir').style.display='none';document.getElementById('modalCadastro').classList.add('show')}
function abrirModalEditar(id){const item=getDados().find(i=>i.id===id); if(!item)return; editandoId=id;document.getElementById('tituloCadastro').textContent='Editar refeição';document.getElementById('dataHoraCadastro').textContent=dataHora();marcar('diaCheck',[item.dia]);marcar('refeicaoCheck',[item.refeicao]);preencherPratosBox([item.prato]);document.getElementById('pratoExtraInput').value='';document.getElementById('obsInput').value=item.obs||'';document.getElementById('btnExcluir').style.display='block';document.getElementById('modalCadastro').classList.add('show')}
function fecharModalCadastro(){document.getElementById('modalCadastro').classList.remove('show')}
function getPratosSelecionados(){const marcados=getMarcados('pratoCheck'); const extras=document.getElementById('pratoExtraInput').value.split(',').map(t=>t.trim()).filter(Boolean); return [...new Set([...marcados,...extras])]}
function coletar(){return{dias:getMarcados('diaCheck'),refeicoes:getMarcados('refeicaoCheck'),pratos:getPratosSelecionados(),obs:document.getElementById('obsInput').value.trim(),semana:document.getElementById('semanaSelect').value}}
function validar(d){if(!d.semana){alert('Selecione um período por semana.');return false} if(!d.dias.length){alert('Selecione pelo menos um dia da semana.');return false} if(!d.refeicoes.length){alert('Selecione pelo menos uma refeição.');return false} if(!d.pratos.length){alert('Selecione ou escreva pelo menos um prato / alimento.');return false} return true}
function expandirItens(f){const itens=[]; f.dias.forEach(dia=>f.refeicoes.forEach(refeicao=>f.pratos.forEach(prato=>itens.push({dia,refeicao,prato,obs:f.obs,semana:f.semana})))); return itens}
function salvarCadastro(){const f=coletar(); if(!validar(f))return; let dados=getDados(); if(editandoId!==null){const idx=dados.findIndex(i=>i.id===editandoId); const primeiro=expandirItens(f)[0]; if(idx>=0&&primeiro)dados[idx]={...dados[idx],...primeiro}}else{expandirItens(f).forEach((item,idx)=>dados.push({id:Date.now()+idx,...item,criadoEm:new Date().toISOString()}))} salvarDados(dados); fecharModalCadastro(); render()}
function salvarCadastroEMaisNovo(){const f=coletar(); if(!validar(f))return; let dados=getDados(); if(editandoId!==null){const idx=dados.findIndex(i=>i.id===editandoId); const primeiro=expandirItens(f)[0]; if(idx>=0&&primeiro)dados[idx]={...dados[idx],...primeiro}; editandoId=null}else{expandirItens(f).forEach((item,idx)=>dados.push({id:Date.now()+idx,...item,criadoEm:new Date().toISOString()}))} salvarDados(dados); document.getElementById('pratoExtraInput').value='';document.getElementById('obsInput').value='';preencherPratosBox([]);render()}
function excluirItemEditando(){if(editandoId===null)return; if(!confirm('Deseja excluir esta refeição?'))return; salvarDados(getDados().filter(i=>i.id!==editandoId)); fecharModalCadastro(); render()}
function render(){const semana=document.getElementById('semanaSelect').value; const filtro=document.getElementById('diaFiltro').value; const wrap=document.getElementById('listaCardapio'); if(!semana){wrap.innerHTML='<div class="empty">Selecione um período por semana para ver o cardápio.</div>'; return} const dados=getDados().filter(i=>i.semana===semana); wrap.innerHTML=''; const dias=DIAS.filter(([k])=>filtro==='todos'||filtro===k); let total=0; dias.forEach(([dia,label])=>{const doDia=dados.filter(i=>i.dia===dia); if(filtro==='todos'||doDia.length){let html=`<div class="secaoLista"><div class="secaoTitulo">${label}</div><div class="secaoSubtitulo">cardápio do dia</div>`; REFEICOES.forEach(ref=>{const itens=doDia.filter(i=>i.refeicao===ref); if(itens.length){html+=`<div class="refeicaoTitulo">${ref}</div>`; itens.forEach(item=>{total++; html+=`<div class="item" onclick="abrirModalEditar(${item.id})"><div class="itemTexto"><div class="nome">${escapeHtml(item.prato)}</div>${item.obs?`<div class="detalhe">${escapeHtml(item.obs)}</div>`:''}</div></div>`})}}); html+='</div>'; wrap.innerHTML+=html}}); if(!total)wrap.innerHTML='<div class="empty">Nenhuma refeição cadastrada ainda.</div>'}
function abrirResumoCardapio(){const semana=document.getElementById('semanaSelect').value; const c=document.getElementById('resumoLista'); if(!semana){c.innerHTML='<div class="empty">Selecione um período por semana para ver o resumo.</div>'; document.getElementById('modalResumo').classList.add('show'); return} const dados=getDados().filter(i=>i.semana===semana); if(!dados.length)c.innerHTML='<div class="empty">Nenhuma refeição cadastrada ainda.</div>'; else c.innerHTML=DIAS.map(([dia,label])=>{const itens=dados.filter(i=>i.dia===dia); if(!itens.length)return ''; return `<div class="resumoItem"><div class="resumoNome">${label}</div>${itens.map(i=>`<div class="resumoLinha"><span class="resumoDetalheInline">${escapeHtml(i.refeicao)}:</span><span class="resumoDetalheInline">${escapeHtml(i.prato)}</span></div>`).join('')}</div>`}).join(''); document.getElementById('modalResumo').classList.add('show')}
function fecharResumoCardapio(){document.getElementById('modalResumo').classList.remove('show')}
function abrirModalFuturasEdicoes(){document.getElementById('futurasEdicoesTexto').value=localStorage.getItem(CHAVE_FUTURAS)||'';document.getElementById('modalFuturasEdicoes').classList.add('show')} function fecharModalFuturasEdicoes(){document.getElementById('modalFuturasEdicoes').classList.remove('show')} function salvarFuturasEdicoes(){localStorage.setItem(CHAVE_FUTURAS,document.getElementById('futurasEdicoesTexto').value);fecharModalFuturasEdicoes()}
montarCheckboxes('diasBox',DIAS,'diaCheck'); montarCheckboxes('refeicoesBox',REFEICOES.map(r=>[r,r]),'refeicaoCheck'); montarSemanas(); render();
</script>
</body>
</html>
