<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criação artística, projetos e sonhos</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;}

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:'Poppins',sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:18px;
      background:
        radial-gradient(circle at 20% 14%, rgba(255,255,255,0.55) 0 7%, transparent 8%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.45) 0 6%, transparent 7%),
        radial-gradient(circle at 50% 35%, rgba(255,250,232,0.50) 0 18%, transparent 19%),
        linear-gradient(180deg, #dfe9c3 0%, #d7e3b7 40%, #cfe0ae 68%, #dbeabf 100%);
      color:#425538;
    }

    .app{
      width:min(430px,100%);
      min-height:calc(100vh - 36px);
      border-radius:34px;
      padding:18px;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 25% 18%, rgba(255,255,255,0.45) 0 4px, transparent 5px),
        radial-gradient(circle at 78% 16%, rgba(255,255,255,0.38) 0 5px, transparent 6px),
        radial-gradient(circle at 18% 28%, rgba(255,255,255,0.20) 0 130px, transparent 131px),
        radial-gradient(circle at 83% 44%, rgba(255,255,255,0.18) 0 110px, transparent 111px),
        linear-gradient(180deg, rgba(243,248,226,0.94), rgba(216,231,183,0.90));
      box-shadow:0 18px 34px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.25);
    }

    .app::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:120px;
      background:
        radial-gradient(circle at 10% 80%, #fff 0 7px, transparent 8px),
        radial-gradient(circle at 14% 80%, #f3c949 0 3px, transparent 4px),
        radial-gradient(circle at 20% 70%, #fff 0 8px, transparent 9px),
        radial-gradient(circle at 24% 70%, #f3c949 0 3px, transparent 4px),
        radial-gradient(circle at 78% 84%, #fff 0 8px, transparent 9px),
        radial-gradient(circle at 82% 84%, #f3c949 0 3px, transparent 4px),
        radial-gradient(circle at 90% 72%, #fff 0 7px, transparent 8px),
        radial-gradient(circle at 94% 72%, #f3c949 0 3px, transparent 4px),
        linear-gradient(180deg, transparent 0%, rgba(189,214,146,0.18) 30%, rgba(164,197,112,0.30) 100%);
      pointer-events:none;
      opacity:0.9;
    }

    .topo{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
      position:relative;
      z-index:1;
    }

    .voltar{
      border:none;
      background:rgba(255,250,240,0.96);
      color:#6f6540;
      padding:12px 18px;
      border-radius:22px;
      font-size:16px;
      font-family:'Poppins',sans-serif;
      cursor:pointer;
      box-shadow:0 5px 14px rgba(124,116,82,0.14);
    }

    .titulo{
      position:relative;
      z-index:1;
      margin:12px 0 6px;
      font-size:22px;
      font-weight:600;
      line-height:1.3;
      color:#465738;
    }

    .subtitulo{
      position:relative;
      z-index:1;
      font-size:13px;
      color:#6c775f;
      margin-bottom:16px;
      line-height:1.6;
    }

    .lista{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .botao{
      width:100%;
      border:none;
      cursor:pointer;
      padding:18px;
      border-radius:26px;
      background:rgba(255,252,244,0.94);
      box-shadow:0 10px 24px rgba(91,102,64,0.14);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      font-family:'Poppins',sans-serif;
      text-align:left;
    }

    .esquerda{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .emoji-box{
      width:58px;
      height:58px;
      display:grid;
      place-items:center;
      border-radius:16px;
      background:linear-gradient(180deg, #fff6e8, #f3e4c6);
      box-shadow:inset 0 0 0 1px rgba(191,165,114,0.18);
      flex:0 0 auto;
    }

    .emoji{
      font-size:33px;
      line-height:1;
    }

    .texto{
      font-size:17px;
      color:#425538;
      line-height:1.3;
    }

    .seta{
      font-size:30px;
      color:#b5a580;
      flex:0 0 auto;
      line-height:1;
    }

    .rodape{
      position:relative;
      z-index:1;
      margin-top:18px;
      background:rgba(255,252,244,0.80);
      border-radius:24px;
      padding:18px 16px;
      text-align:center;
      color:#6b775f;
      font-size:13px;
      line-height:1.7;
      box-shadow:0 10px 24px rgba(91,102,64,0.10);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topo">
      <button class="voltar" onclick="voltarPagina()">← Voltar</button>
    </div>

    <div class="titulo">🎨 Criação artística, projetos e sonhos</div>
    <div class="subtitulo">Escolha qual projeto deseja abrir hoje.</div>

    <div class="lista">
      <button class="botao" onclick="location.href='gabriela-projeto-app-jardim-da-rotina.html'">
        <div class="esquerda">
          <div class="emoji-box"><div class="emoji">👩‍👧</div></div>
          <div class="texto">Projeto App Jardim da Rotina</div>
        </div>
        <div class="seta">›</div>
      </button>

      <button class="botao" onclick="location.href='gabriela-projeto-livro-gaia.html'">
        <div class="esquerda">
          <div class="emoji-box"><div class="emoji">📗</div></div>
          <div class="texto">Projeto Livro de Gaia</div>
        </div>
        <div class="seta">›</div>
      </button>

      <button class="botao" onclick="location.href='gabriela-projeto-yoga.html'">
        <div class="esquerda">
          <div class="emoji-box"><div class="emoji">🪷</div></div>
          <div class="texto">Projeto Yoga</div>
        </div>
        <div class="seta">›</div>
      </button>

      <button class="botao" onclick="location.href='gabriela-projeto-who-am-i.html'">
        <div class="esquerda">
          <div class="emoji-box"><div class="emoji">💡</div></div>
          <div class="texto">Projeto Who Am I</div>
        </div>
        <div class="seta">›</div>
      </button>
    </div>

    <div class="rodape">
      Um espaço suave para reunir seus projetos criativos, seus sonhos e suas construções em andamento 🌼
    </div>
  </div>

  <script>
    function voltarPagina(){
      const params = new URLSearchParams(window.location.search);
      const from = params.get("from");

      if(from === "index"){
        location.href = "index.html";
      } else if(from === "pre-menu"){
        location.href = "gabriela-pre-menu.html";
      } else {
        location.href = "gabriela-manifestacao-criatividade.html";
      }
    }
  </script>
</body>
</html>
