<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criação artística, projetos e sonhos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --verde-principal:#E6F2E5;
  --verde-hover:#D6EAD4;
  --verde-texto:#3F6F4F;
  --verde-escuro:#5C9D5C;

  --fundo:#F6F7F5;
  --card:#FFFFFF;

  --texto-principal:#2F2F2F;
  --texto-secundario:#6B6B6B;
  --borda:#E3E5E1;

  --fonte:'Poppins',sans-serif;

  --titulo:20px;
  --botao:15px;

  --sombra-suave:0 4px 12px rgba(0,0,0,0.05);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  font-family:var(--fonte);
  background:var(--fundo);
  color:var(--texto-principal);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.pagina{
  width:100%;
  max-width:420px;
}

.card{
  width:100%;
  background:var(--card);
  border-radius:24px;
  padding:22px 16px 18px;
  box-shadow:var(--sombra-suave);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.topo{
  display:grid;
  grid-template-columns:40px 1fr 58px;
  align-items:start;
  gap:8px;
  margin-bottom:6px;
}

.botao-voltar{
  border:none;
  background:#E9ECE7;
  color:var(--texto-principal);
  border-radius:12px;
  width:40px;
  height:40px;
  cursor:pointer;
  font-size:18px;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  padding:0;
  transition:0.2s ease;
}

.botao-voltar:hover{
  background:#dde3d9;
}

.botao-voltar span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  transform:translateY(-1px);
}

.topCenter{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:0;
  padding-top:2px;
}

.titleIndex{
  color:var(--texto-principal);
  font-weight:500;
  font-size:var(--titulo);
  margin:0;
  line-height:1.2;
  text-align:center;
}

.subtitulo{
  font-size:11px;
  color:var(--texto-secundario);
  margin-top:2px;
  text-align:center;
  white-space:nowrap;
}

.dataTopo{
  min-height:40px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
  text-align:right;
  color:var(--texto-secundario);
  line-height:1.1;
  padding-top:1px;
}

.horaTopo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  white-space:nowrap;
  margin-bottom:2px;
}

.dataTopoLinha{
  font-size:11px;
  white-space:nowrap;
}

.botoes-lista{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.botao{
  width:100%;
  border:none;
  background:var(--verde-principal);
  color:var(--verde-texto);
  border-radius:16px;
  padding:0 16px;
  font-size:var(--botao);
  font-family:var(--fonte);
  cursor:pointer;
  transition:0.2s ease;
  min-height:84px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.botao:hover{
  background:var(--verde-hover);
}

.conteudo-botao{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  transform:translateY(1px);
}

.nome-botao{
  font-size:14px;
  color:var(--verde-texto);
  text-align:center;
  line-height:1.35;
  font-weight:500;
  margin:0;
}

.proxima-tarefa{
  margin-top:4px;
  font-size:11px;
  color:rgba(63,111,79,0.72);
  text-align:center;
  line-height:1.3;
  margin-bottom:0;
}

.horario-proxima{
  display:none;
}

.footerMiniAction{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:4px;
  flex-wrap:wrap;
}

.futureBtn{
  border:none;
  background:#E9ECE7;
  color:var(--texto-secundario);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
  transition:0.2s ease;
}

.futureBtn:hover{
  background:#dde3d9;
  color:var(--texto-principal);
}

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  justify-content:center;
  align-items:flex-start;
  padding:24px 16px;
  z-index:999;
  overflow-y:auto;
}

.modalOverlay.show{
  display:flex;
}

.modal{
  background:#fff;
  padding:18px;
  border-radius:20px;
  width:min(360px, 100%);
  max-height:calc(100vh - 48px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
}

.modalTitle{
  font-size:18px;
  color:var(--texto-principal);
  text-align:center;
  font-weight:500;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:13px;
  color:var(--texto-principal);
  font-family:var(--fonte);
  font-weight:500;
}

textarea{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  height:260px;
  resize:none;
}

textarea:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
  outline:none;
}

.modalBtns{
  display:flex;
  gap:8px;
}

.modalBtns button{
  flex:1;
  padding:11px 12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:12.5px;
  transition:0.2s ease;
}

.cancel{
  background:#efefef;
  color:#333;
}

.cancel:hover{
  background:#e7e7e7;
}

.save{
  background:var(--verde-escuro);
  color:white;
}

.save:hover{
  background:#4f8a4f;
}



.configActionsBtn{
  border:none;
  border-radius:10px;
  padding:8px 9px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:11px;
  transition:0.2s ease;
  background:#efefef;
  color:#333;
}

.configActionsBtn:hover{
  background:#e7e7e7;
}

.configActionsBtn.move{
  background:#E9ECE7;
  color:var(--verde-texto);
  min-width:32px;
}

.configActionsBtn.danger{
  background:#f5d7d7;
  color:#8a3030;
}

.configLinha{
  display:grid;
  grid-template-columns:1fr auto auto auto auto;
  gap:6px;
  align-items:center;
  background:#F8FAF7;
  border:1px solid var(--borda);
  border-radius:12px;
  padding:9px 10px;
}

.configTextoProjeto{
  min-width:0;
  line-height:1.35;
}

.configNomeProjeto{
  display:block;
  font-size:12px;
  color:var(--texto-principal);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.configDescricaoProjeto{
  display:block;
  font-size:10.5px;
  color:var(--texto-secundario);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-top:2px;
}

.inputModal{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  height:46px;
  outline:none;
}

.inputModal:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
}

.status-edicao{
  font-size:12px;
  color:#A04646;
  text-align:center;
  min-height:16px;
  line-height:1.35;
}

.modalHeader{
  display:flex;
  justify-content:flex-end;
}

.fecharModal{
  background:#E9ECE7;
  border:none;
  width:32px;
  height:32px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  color:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s ease;
}

.fecharModal:hover{
  background:#dde3d9;
}


.labelComEmoji{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.emojiMiniBtn{
  border:none;
  background:#F2F7F1;
  color:var(--verde-texto);
  width:30px;
  height:30px;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s ease;
}

.emojiMiniBtn:hover{
  background:var(--verde-hover);
}

.emojiPalette{
  position:fixed;
  display:none;
  grid-template-columns:repeat(8, 1fr);
  gap:5px;
  width:min(320px, calc(100vw - 32px));
  max-height:210px;
  overflow-y:auto;
  background:#fff;
  border:1px solid var(--borda);
  border-radius:16px;
  padding:10px;
  box-shadow:0 12px 30px rgba(0,0,0,0.18);
  z-index:2000;
}

.emojiPalette.show{
  display:grid;
}

.emojiOpcao{
  border:none;
  background:#F8FAF7;
  border-radius:9px;
  height:30px;
  font-size:16px;
  cursor:pointer;
}

.emojiOpcao:hover{
  background:var(--verde-principal);
}

@media (max-width: 390px){
  body{
    padding:14px;
  }

  .card{
    padding:20px 14px 16px;
  }

  .titleIndex{
    font-size:19px;
  }

  .topo{
    grid-template-columns:40px 1fr 54px;
  }

  .horaTopo{
    font-size:13px;
  }

  .dataTopoLinha{
    font-size:10.5px;
  }

  .subtitulo{
    font-size:10.5px;
  }
}


/* =========================================================
   VISUAL SYSTEM GABRIELA — inspirado no index, com identidade própria
   ========================================================= */

:root{
  --gabi-fundo:#F8F7F1;
  --gabi-card:#FFFDF8;
  --gabi-card-2:#F4F3EA;
  --gabi-salvia:#7F9271;
  --gabi-salvia-escuro:#516448;
  --gabi-texto:#2F332D;
  --gabi-suave:#77786F;
  --gabi-borda:#E8E1D4;
  --gabi-rosa:#E8C8BF;
  --gabi-sombra:0 10px 24px rgba(76, 82, 62, 0.10);
}

html, body{
  min-height:100%;
}

body{
  align-items:flex-start !important;
  padding:14px 12px 96px !important;
  background:
    radial-gradient(circle at 14% 4%, rgba(232,243,226,0.75), transparent 32%),
    radial-gradient(circle at 95% 16%, rgba(243,236,221,0.80), transparent 30%),
    linear-gradient(180deg, #FEFCF7 0%, var(--gabi-fundo) 100%) !important;
  color:var(--gabi-texto) !important;
  overflow-x:hidden;
}

.pagina{
  max-width:420px !important;
}

.card{
  background:rgba(255,253,248,0.92) !important;
  border:1px solid rgba(232,225,212,0.92) !important;
  border-radius:30px !important;
  padding:18px 14px 20px !important;
  gap:14px !important;
  box-shadow:0 14px 34px rgba(76,82,62,0.11) !important;
  overflow:hidden;
  position:relative;
}

.card::before{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  right:-80px;
  top:-70px;
  border-radius:50%;
  background:rgba(234,243,232,0.72);
  z-index:0;
}

.card::after{
  content:"";
  position:absolute;
  width:170px;
  height:170px;
  left:-95px;
  bottom:-65px;
  border-radius:50%;
  background:rgba(243,236,221,0.62);
  z-index:0;
}

.card > *{
  position:relative;
  z-index:1;
}

.topo{
  grid-template-columns:44px 1fr 82px !important;
  align-items:start !important;
  gap:8px !important;
  margin-bottom:2px !important;
}

.botao-voltar{
  width:42px !important;
  height:42px !important;
  border-radius:50% !important;
  background:rgba(255,255,255,0.86) !important;
  border:1px solid rgba(232,225,212,0.95) !important;
  color:var(--gabi-salvia-escuro) !important;
  box-shadow:0 6px 16px rgba(76,82,62,0.08) !important;
  font-size:20px !important;
}

.topCenter{
  padding-top:0 !important;
}

.titleIndex{
  color:#40513B !important;
  font-size:29px !important;
  font-weight:500 !important;
  line-height:1.05 !important;
  letter-spacing:-0.3px !important;
}

.titleIndex::after{
  content:" 🌿";
  font-size:18px;
  vertical-align:middle;
}

.subtitulo{
  color:var(--gabi-suave) !important;
  font-size:12px !important;
  margin-top:5px !important;
}

.dataTopo{
  color:#6F7469 !important;
  padding-top:0 !important;
}

.horaTopo{
  color:#B8807B !important;
  font-size:15px !important;
  font-weight:500 !important;
}

.dataTopoLinha{
  color:#5D6359 !important;
  font-size:10.5px !important;
}

/* Hero escolhido pela Gabriela */
.heroGabrielaVisual{
  min-height:190px;
  width:100%;
  border-radius:24px;
  background:
    radial-gradient(circle at 68% 38%, rgba(232,243,226,0.95), transparent 34%),
    linear-gradient(135deg, rgba(250,247,239,0.98), rgba(238,242,230,0.96));
  border:1px solid rgba(232,225,212,0.95);
  box-shadow:var(--gabi-sombra);
  overflow:hidden;
  display:grid;
  grid-template-columns:1.06fr 1fr;
  gap:4px;
  padding:20px 18px;
  position:relative;
  margin:4px 0 6px;
}

.heroGabrielaVisual::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.34), transparent 45%),
    radial-gradient(circle at 96% 16%, rgba(255,255,255,0.58), transparent 30%);
  pointer-events:none;
}

.heroTextoGabriela{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}

.heroTituloGabriela{
  color:#5B6F50;
  font-size:24px;
  line-height:1.18;
  font-weight:400;
  letter-spacing:-0.4px;
}

.heroTituloGabriela em{
  font-style:italic;
  font-weight:500;
}

.heroDivisor{
  display:flex;
  align-items:center;
  gap:8px;
  margin:14px 0 12px;
  width:120px;
  color:#A1AB93;
}

.heroDivisor span{
  display:block;
  height:1px;
  flex:1;
  background:#D8CFBF;
}

.heroDivisor small{
  font-size:11px;
}

.heroTextoGabriela p{
  color:#6F7469;
  font-size:11.5px;
  line-height:1.5;
}

.heroIlustraGabriela{
  position:relative;
  min-height:150px;
  z-index:2;
}

.vasoGabriela{
  position:absolute;
  width:54px;
  height:66px;
  right:68px;
  bottom:35px;
  border-radius:24px 24px 18px 18px;
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.8), transparent 22%),
    linear-gradient(180deg, #E7D5BF, #CDB798);
  box-shadow:0 9px 17px rgba(96,83,57,0.14);
}

.folhasGabriela{
  position:absolute;
  right:88px;
  bottom:93px;
  width:92px;
  height:88px;
}

.folhasGabriela::before{
  content:"";
  position:absolute;
  left:47px;
  bottom:0;
  width:2px;
  height:90px;
  background:#7F9271;
  transform:rotate(-10deg);
  opacity:.85;
}

.folhasGabriela i{
  position:absolute;
  width:28px;
  height:15px;
  border-radius:28px 2px 28px 2px;
  background:#8FA281;
  opacity:.72;
}

.folhasGabriela i:nth-child(1){left:24px; bottom:18px; transform:rotate(30deg);}
.folhasGabriela i:nth-child(2){left:50px; bottom:28px; transform:rotate(-24deg);}
.folhasGabriela i:nth-child(3){left:12px; bottom:42px; transform:rotate(18deg);}
.folhasGabriela i:nth-child(4){left:56px; bottom:52px; transform:rotate(-18deg);}
.folhasGabriela i:nth-child(5){left:34px; bottom:67px; transform:rotate(20deg);}
.folhasGabriela i:nth-child(6){left:68px; bottom:75px; transform:rotate(-30deg);}

.velaGabriela{
  position:absolute;
  width:38px;
  height:34px;
  right:122px;
  bottom:22px;
  border-radius:12px 12px 9px 9px;
  background:linear-gradient(180deg, #FFF5DC, #EBD9B7);
  box-shadow:0 8px 13px rgba(96,83,57,0.10);
}

.velaGabriela::before{
  content:"";
  position:absolute;
  left:16px;
  top:-12px;
  width:8px;
  height:14px;
  border-radius:9px 9px 9px 9px;
  background:#E7B56B;
  box-shadow:0 0 10px rgba(231,181,107,.55);
}

.cadernoGabriela{
  position:absolute;
  width:92px;
  height:48px;
  right:6px;
  bottom:16px;
  border-radius:7px;
  background:linear-gradient(180deg, #A5B49A, #839577);
  transform:rotate(-8deg);
  box-shadow:0 10px 17px rgba(76,82,62,0.17);
}

.cadernoGabriela::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-8px;
  height:10px;
  border-radius:0 0 8px 8px;
  background:#E7DEC9;
  border-top:1px solid rgba(93,85,70,.18);
}

.canetaGabriela{
  position:absolute;
  width:76px;
  height:4px;
  right:17px;
  bottom:48px;
  border-radius:99px;
  background:#C59B65;
  transform:rotate(-17deg);
}

.brilhoGabriela{
  position:absolute;
  color:#D7B77B;
  opacity:.75;
  font-size:13px;
}

.brilhoGabriela.b1{right:11px; top:28px;}
.brilhoGabriela.b2{right:38px; top:66px;}

/* Lista de cards */
.botoes-lista{
  gap:9px !important;
}

.botao-wrap{
  border-radius:18px;
}

.check-concluido{
  top:50% !important;
  left:13px !important;
  transform:translateY(-50%);
  font-size:13px !important;
}

.botao{
  min-height:66px !important;
  height:auto !important;
  border-radius:18px !important;
  background:rgba(255,255,255,0.94) !important;
  border:1px solid rgba(232,225,212,0.92) !important;
  color:var(--gabi-texto) !important;
  box-shadow:0 7px 18px rgba(76,82,62,0.08) !important;
  padding:10px 42px 10px 74px !important;
  display:flex !important;
  flex-direction:column !important;
  justify-content:center !important;
  align-items:flex-start !important;
  text-align:left !important;
  position:relative !important;
  overflow:hidden;
}

.botao:hover{
  transform:translateY(-1px);
  background:#FFFDF8 !important;
  box-shadow:0 10px 22px rgba(76,82,62,0.12) !important;
}

.botao::before{
  content:"";
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border-radius:50%;
  background:#F4F0E7;
  border:1px solid rgba(232,225,212,0.78);
  box-shadow:0 5px 12px rgba(76,82,62,0.06);
}

.botao::after{
  content:"›";
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-54%);
  color:#6F7E63;
  font-size:31px;
  line-height:1;
  font-weight:300;
}

#wrap-bloco1 .botao::before{content:"♡"; color:#6D805F; font-size:24px; display:flex; align-items:center; justify-content:center;}
#wrap-bloco2 .botao::before{content:"✧"; color:#6D805F; font-size:26px; display:flex; align-items:center; justify-content:center;}

<script>

const EMOJIS_PROJETOS = [
  "🌿","🌱","🍃","🌸","🌼","🌻","✨","💫",
  "🎨","🖌️","🖍️","✏️","📝","📒","📗","📚",
  "💡","🪷","🧘","🌙","☀️","🌈","🧵","🧶",
  "📷","🎬","🎧","🎵","🛠️","🧩","💻","🪴",
  "🕯️","🔮","🪽","💖","🤍","🧡","💛","💚"
];
let campoEmojiAtual = null;

function montarEmojiPalette(){
  const palette = document.getElementById("emojiPalette");
  if(!palette || palette.dataset.montada === "sim") return;

  palette.innerHTML = EMOJIS_PROJETOS.map(emoji =>
    `<button class="emojiOpcao" type="button" onclick="inserirEmojiNoCampo('${emoji}')">${emoji}</button>`
  ).join("");
  palette.dataset.montada = "sim";
}

function abrirEmojiPalette(campoId, botao){
  montarEmojiPalette();
  campoEmojiAtual = campoId;

  const palette = document.getElementById("emojiPalette");
  const rect = botao.getBoundingClientRect();
  const largura = Math.min(320, window.innerWidth - 32);
  const esquerda = Math.min(Math.max(16, rect.right - largura), window.innerWidth - largura - 16);
  const topo = Math.min(rect.bottom + 8, window.innerHeight - 230);

  palette.style.width = `${largura}px`;
  palette.style.left = `${esquerda}px`;
  palette.style.top = `${Math.max(16, topo)}px`;
  palette.classList.add("show");
}

function inserirEmojiNoCampo(emoji){
  if(!campoEmojiAtual) return;
  const campo = document.getElementById(campoEmojiAtual);
  if(!campo) return;

  const inicio = campo.selectionStart ?? campo.value.length;
  const fim = campo.selectionEnd ?? campo.value.length;
  const antes = campo.value.slice(0, inicio);
  const depois = campo.value.slice(fim);
  const espacoAntes = antes && !antes.endsWith(" ") && !antes.endsWith("\n") ? " " : "";
  const espacoDepois = depois && !depois.startsWith(" ") && !depois.startsWith("\n") ? " " : "";

  campo.value = `${antes}${espacoAntes}${emoji}${espacoDepois}${depois}`;
  campo.focus();
  const pos = (antes + espacoAntes + emoji + espacoDepois).length;
  campo.setSelectionRange(pos, pos);

  document.getElementById("emojiPalette").classList.remove("show");
}

document.addEventListener("click", function(event){
  const palette = document.getElementById("emojiPalette");
  if(!palette) return;
  if(event.target.closest(".emojiMiniBtn") || event.target.closest("#emojiPalette")) return;
  palette.classList.remove("show");
});

function voltarPagina(){
  const params = new URLSearchParams(window.location.search);
  const from = params.get("from");
  const voltar = params.get("voltar");

  if(from === "index"){
    location.href = "index.html";
  }else if(voltar === "manifestacao"){
    location.href = "gabriela-manifestacao-criatividade.html?abrir=criacao";
  }else{
    location.href = "gabriela-manifestacao-criatividade.html";
  }
}

const CHAVE_FUTURAS_EDICOES = "futuras_edicoes_projetos";

const CHAVE_CONFIG_PROJETOS = "config_projetos_criacao_artistica";

const PROJETOS_BASE = [
  {
    id:"base_0",
    nome:"👩‍👧 Projeto App Jardim da Rotina",
    descricao:"organizar ideias do aplicativo",
    url:"gabriela-projeto-app-jardim-da-rotina.html"
  },
  {
    id:"base_1",
    nome:"📗 Projeto Livro de Gaia",
    descricao:"guardar capítulos e inspirações",
    url:"gabriela-projeto-livro-gaia.html"
  },
  {
    id:"base_2",
    nome:"🪷 Projeto Yoga",
    descricao:"acompanhar práticas e estudos",
    url:"gabriela-projeto-yoga.html"
  },
  {
    id:"base_3",
    nome:"💡 Projeto Who Am I",
    descricao:"desenvolver identidade e expressão",
    url:"gabriela-projeto-who-am-i.html"
  }
];

function senhaGabrielaValida(senhaDigitada){
  const senhasPossiveis = [
    localStorage.getItem("senha_gabriela"),
    localStorage.getItem("senhaGabriela"),
    localStorage.getItem("senha_mamae"),
    localStorage.getItem("senha_mamae_gabriela"),
    "1234"
  ].filter(Boolean);

  return senhasPossiveis.includes(String(senhaDigitada || "").trim());
}

function getConfigProjetos(){
  try{
    const raw = localStorage.getItem(CHAVE_CONFIG_PROJETOS);
    const cfg = raw ? JSON.parse(raw) : {};

    if(!Array.isArray(cfg.custom)) cfg.custom = [];
    if(!cfg.editadas) cfg.editadas = {};
    if(!cfg.hidden) cfg.hidden = {};
    if(!Array.isArray(cfg.ordem)) cfg.ordem = [];

    return cfg;
  }catch(e){
    return { custom:[], editadas:{}, hidden:{}, ordem:[] };
  }
}

function salvarConfigProjetos(cfg){
  localStorage.setItem(CHAVE_CONFIG_PROJETOS, JSON.stringify(cfg));
}

function getProjetosConfigurados(){
  const cfg = getConfigProjetos();

  const base = PROJETOS_BASE
    .filter(projeto => !cfg.hidden[projeto.id])
    .map(projeto => ({
      ...projeto,
      ...(cfg.editadas && cfg.editadas[projeto.id] ? cfg.editadas[projeto.id] : {}),
      base:true
    }));

  const custom = (cfg.custom || [])
    .filter(projeto => !cfg.hidden[projeto.id])
    .map(projeto => ({
      id:projeto.id,
      nome:projeto.nome || "Novo projeto",
      descricao:projeto.descricao || "",
      url:projeto.url || "",
      custom:true
    }));

  const todos = [...base, ...custom];
  const idsAtuais = todos.map(projeto => projeto.id);
  const ordemLimpa = (cfg.ordem || []).filter(id => idsAtuais.includes(id));
  const idsNovos = idsAtuais.filter(id => !ordemLimpa.includes(id));
  const ordemFinal = [...ordemLimpa, ...idsNovos];

  if(JSON.stringify(ordemFinal) !== JSON.stringify(cfg.ordem || [])){
    cfg.ordem = ordemFinal;
    salvarConfigProjetos(cfg);
  }

  return todos.sort((a,b) => ordemFinal.indexOf(a.id) - ordemFinal.indexOf(b.id));
}

function renderizarProjetos(){
  const lista = document.getElementById("listaProjetos");
  if(!lista) return;

  const projetos = getProjetosConfigurados();

  lista.innerHTML = projetos.map(projeto => `
    <button class="botao" onclick="abrirProjeto('${escapeHtml(projeto.id)}')">
      <div class="conteudo-botao">
        <div class="nome-botao">${escapeHtml(projeto.nome || "Novo projeto")}</div>
        ${projeto.descricao ? `<div class="proxima-tarefa">${escapeHtml(projeto.descricao)}</div>` : ""}
        <div class="horario-proxima"></div>
      </div>
    </button>
  `).join("");
}

function abrirProjeto(id){
  const projeto = getProjetosConfigurados().find(item => item.id === id);
  if(!projeto) return;

  if(projeto.url){
    location.href = projeto.url;
    return;
  }

  alert("Esse projeto ainda não tem uma página vinculada. Você pode editar e preencher a página na configuração.");
}

function abrirModalConfiguracao(){
  document.getElementById("novoProjetoNome").value = "";
  document.getElementById("novoProjetoDescricao").value = "";
  document.getElementById("novoProjetoUrl").value = "";
  renderizarListaConfiguracaoProjetos();
  document.getElementById("modalConfiguracao").classList.add("show");
}

function fecharModalConfiguracao(){
  document.getElementById("modalConfiguracao").classList.remove("show");
}

function adicionarProjetoConfiguracao(){
  const nome = document.getElementById("novoProjetoNome").value.trim();
  const descricao = document.getElementById("novoProjetoDescricao").value.trim();
  const url = document.getElementById("novoProjetoUrl").value.trim();

  if(!nome){
    alert("Escreva o nome do projeto.");
    return;
  }

  const cfg = getConfigProjetos();
  const id = `custom_projeto_${Date.now()}`;

  cfg.custom.push({ id, nome, descricao, url, custom:true });
  cfg.ordem.push(id);

  salvarConfigProjetos(cfg);

  document.getElementById("novoProjetoNome").value = "";
  document.getElementById("novoProjetoDescricao").value = "";
  document.getElementById("novoProjetoUrl").value = "";

  renderizarListaConfiguracaoProjetos();
  renderizarProjetos();
}

function renderizarListaConfiguracaoProjetos(){
  const lista = document.getElementById("listaConfigProjetos");
  if(!lista) return;

  const projetos = getProjetosConfigurados();
  lista.innerHTML = "";

  projetos.forEach((projeto, index) => {
    const linha = document.createElement("div");
    linha.className = "configLinha";

    const texto = document.createElement("div");
    texto.className = "configTextoProjeto";

    const nome = document.createElement("span");
    nome.className = "configNomeProjeto";
    nome.textContent = projeto.nome || "Novo projeto";

    const descricao = document.createElement("span");
    descricao.className = "configDescricaoProjeto";
    descricao.textContent = projeto.descricao || "Sem descrição";

    texto.appendChild(nome);
    texto.appendChild(descricao);

    const btnSubir = document.createElement("button");
    btnSubir.textContent = "↑";
    btnSubir.className = "configActionsBtn move";
    btnSubir.disabled = index === 0;
    btnSubir.style.opacity = index === 0 ? "0.45" : "1";
    btnSubir.onclick = () => moverProjetoConfiguracao(projeto.id, -1);

    const btnDescer = document.createElement("button");
    btnDescer.textContent = "↓";
    btnDescer.className = "configActionsBtn move";
    btnDescer.disabled = index === projetos.length - 1;
    btnDescer.style.opacity = index === projetos.length - 1 ? "0.45" : "1";
    btnDescer.onclick = () => moverProjetoConfiguracao(projeto.id, 1);

    const btnEditar = document.createElement("button");
    btnEditar.textContent = "editar";
    btnEditar.className = "configActionsBtn";
    btnEditar.onclick = () => editarProjetoConfiguracao(projeto.id);

    const btnRetirar = document.createElement("button");
    btnRetirar.textContent = "retirar";
    btnRetirar.className = "configActionsBtn danger";
    btnRetirar.onclick = () => removerProjetoConfiguracao(projeto.id);

    linha.appendChild(texto);
    linha.appendChild(btnSubir);
    linha.appendChild(btnDescer);
    linha.appendChild(btnEditar);
    linha.appendChild(btnRetirar);
    lista.appendChild(linha);
  });
}

function moverProjetoConfiguracao(id, direcao){
  const cfg = getConfigProjetos();
  const projetos = getProjetosConfigurados();
  const ids = projetos.map(projeto => projeto.id);
  const index = ids.indexOf(id);
  const novoIndex = index + direcao;

  if(index < 0 || novoIndex < 0 || novoIndex >= ids.length) return;

  const itemMovido = ids.splice(index, 1)[0];
  ids.splice(novoIndex, 0, itemMovido);
  cfg.ordem = ids;

  salvarConfigProjetos(cfg);
  renderizarListaConfiguracaoProjetos();
  renderizarProjetos();
}

let projetoEdicaoAtualId = null;

function editarProjetoConfiguracao(id){
  const projeto = getProjetosConfigurados().find(item => item.id === id);
  if(!projeto){
    alert("Projeto não encontrado.");
    return;
  }

  projetoEdicaoAtualId = id;
  document.getElementById("editarProjetoNome").value = projeto.nome || "";
  document.getElementById("editarProjetoDescricao").value = projeto.descricao || "";
  document.getElementById("editarProjetoUrl").value = projeto.url || "";
  document.getElementById("statusEditarProjeto").textContent = "";
  document.getElementById("modalEditarProjeto").classList.add("show");
}

function fecharModalEditarProjeto(){
  projetoEdicaoAtualId = null;
  document.getElementById("modalEditarProjeto").classList.remove("show");
}

function salvarEdicaoProjetoConfiguracao(){
  if(!projetoEdicaoAtualId) return;

  const nome = document.getElementById("editarProjetoNome").value.trim();
  const descricao = document.getElementById("editarProjetoDescricao").value.trim();
  const url = document.getElementById("editarProjetoUrl").value.trim();
  const status = document.getElementById("statusEditarProjeto");

  if(!nome){
    status.textContent = "Escreva o nome do projeto.";
    return;
  }

  const cfg = getConfigProjetos();
  const custom = cfg.custom.find(item => item.id === projetoEdicaoAtualId);

  if(custom){
    custom.nome = nome;
    custom.descricao = descricao;
    custom.url = url;
  }else{
    cfg.editadas[projetoEdicaoAtualId] = { nome, descricao, url };
  }

  salvarConfigProjetos(cfg);
  fecharModalEditarProjeto();
  renderizarListaConfiguracaoProjetos();
  renderizarProjetos();
}

let projetoParaExcluirConfiguracao = null;

function removerProjetoConfiguracao(id){
  projetoParaExcluirConfiguracao = id;
  document.getElementById("senhaExcluirProjeto").value = "";
  document.getElementById("modalSenhaExcluirProjeto").classList.add("show");
  setTimeout(() => document.getElementById("senhaExcluirProjeto").focus(), 80);
}

function fecharModalSenhaExcluirProjeto(){
  projetoParaExcluirConfiguracao = null;
  document.getElementById("modalSenhaExcluirProjeto").classList.remove("show");
}

function confirmarExcluirProjetoConfiguracao(){
  const senha = document.getElementById("senhaExcluirProjeto").value;

  if(!senhaGabrielaValida(senha)){
    alert("Senha incorreta.");
    return;
  }

  const id = projetoParaExcluirConfiguracao;
  if(!id) return;

  const cfg = getConfigProjetos();
  cfg.custom = cfg.custom.filter(item => item.id !== id);
  cfg.hidden[id] = true;
  cfg.ordem = (cfg.ordem || []).filter(itemId => itemId !== id);

  salvarConfigProjetos(cfg);
  fecharModalSenhaExcluirProjeto();
  renderizarListaConfiguracaoProjetos();
  renderizarProjetos();
}

function escapeHtml(texto){
  return String(texto ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}


function abrirModalFuturasEdicoes(){
  document.getElementById("futurasEdicoesTexto").value =
    localStorage.getItem(CHAVE_FUTURAS_EDICOES) || "";
  document.getElementById("modalFuturasEdicoes").classList.add("show");
}

function fecharModalFuturasEdicoes(){
  document.getElementById("modalFuturasEdicoes").classList.remove("show");
}

function salvarFuturasEdicoes(){
  localStorage.setItem(
    CHAVE_FUTURAS_EDICOES,
    document.getElementById("futurasEdicoesTexto").value
  );
  fecharModalFuturasEdicoes();
}

function pad2(numero){
  return String(numero).padStart(2, "0");
}

function atualizarLinhaTempo(){
  const agora = new Date();
  const diasCurtos = ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"];
  const hora = document.getElementById("linhaTempoHora");
  const dia = document.getElementById("linhaTempoDia");
  const data = document.getElementById("linhaTempoData");
  if(hora) hora.textContent = `${pad2(agora.getHours())}:${pad2(agora.getMinutes())}`;
  if(dia) dia.textContent = `• ${diasCurtos[agora.getDay()]}`;
  if(data) data.textContent = `• ${pad2(agora.getDate())}/${pad2(agora.getMonth()+1)}`;
}

window.addEventListener("load", () => {
  atualizarLinhaTempo();
  setInterval(atualizarLinhaTempo, 1000);
  renderizarProjetos();
});
</script>
