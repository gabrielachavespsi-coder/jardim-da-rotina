<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desacelerar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --verde-principal:#F2F7F1;
  --verde-hover:#E8F1E6;
  --verde-texto:#3F6F4F;
  --verde-escuro:#5C9D5C;

  --fundo:#F6F7F5;
  --card:#FFFFFF;

  --texto-principal:#2F2F2F;
  --texto-secundario:#6B6B6B;
  --borda:#E3E5E1;

  --fonte:'Poppins',sans-serif;

  --titulo:20px;
  --botao:15px;

  --sombra-suave:0 4px 12px rgba(0,0,0,0.05);
}

.modalHeader{
  display:flex;
  justify-content:flex-end;
}

.fecharModal{
  background:#E9ECE7;
  border:none;
  width:32px;
  height:32px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.configItem{
  display:grid;
  grid-template-columns:1fr 110px;
  gap:8px;
  align-items:center;
  background:#F8FAF7;
  border:1px solid var(--borda);
  border-radius:14px;
  padding:10px;
}

.configBotoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.configBotoes button{
  border:none;
  border-radius:10px;
  padding:8px;
  font-size:11px;
  font-family:var(--fonte);
  cursor:pointer;
  background:#efefef;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  font-family:var(--fonte);
  background:var(--fundo);
  color:var(--texto-principal);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:16px;
}

.pagina{
  width:100%;
  max-width:420px;
}

.card{
  width:100%;
  background:var(--card);
  border-radius:24px;
  padding:22px 16px 18px;
  box-shadow:var(--sombra-suave);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.topo{
  display:grid;
  grid-template-columns:40px 1fr 58px;
  align-items:start;
  gap:8px;
  margin-bottom:6px;
}

.botao-voltar{
  border:none;
  background:#E9ECE7;
  color:var(--texto-principal);
  border-radius:12px;
  width:40px;
  height:40px;
  cursor:pointer;
  font-size:18px;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  padding:0;
  transition:0.2s ease;
}

.botao-voltar:hover{
  background:#dde3d9;
}

.botao-voltar span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  transform:translateY(-1px);
}

.topCenter{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:0;
  padding-top:2px;
}

.titleIndex{
  color:var(--texto-principal);
  font-weight:500;
  font-size:var(--titulo);
  margin:0;
  line-height:1.2;
  text-align:center;
}

.subtitulo{
  font-size:12px;
  color:var(--texto-secundario);
  margin-top:2px;
  text-align:center;
}

.dataTopo{
  min-height:40px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
  text-align:right;
  color:var(--texto-secundario);
  line-height:1.1;
  padding-top:1px;
}

.horaTopo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  white-space:nowrap;
  margin-bottom:2px;
}

.dataTopoLinha{
  font-size:11px;
  white-space:nowrap;
}

.caixa-grande{
  background:#F7F8F6;
  border:1px solid var(--borda);
  border-radius:20px;
  padding:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);
}

.lista{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.tarefa{
  width:100%;
  background:var(--verde-principal);
  border:none;
  border-radius:18px;        /* ← igual autocuidado */

  padding:12px 14px;         /* ← PRINCIPAL ajuste */
  display:grid;
  grid-template-columns:22px 1fr auto;  /* ← mais espaço */
  align-items:flex-start;
  gap:10px;                  /* ← mais respiro */

  cursor:pointer;
  font-family:var(--fonte);
  transition:0.2s ease;
}

.tarefa:hover{
  background:var(--verde-hover);
}

.tarefa.feita{
  opacity:0.68;
}

.check{
  font-size:13px;
  line-height:1;
  visibility:hidden;
  align-self:start;
  margin-top:4px;
}

.tarefa.feita .check{
  visibility:visible;
}

.nome{
  text-align:left;
  font-size:14px;
  color:var(--verde-texto);
  line-height:1.6;
  font-weight:400;
  white-space:normal;
}

.grupo-titulo{
  display:block;
  margin-bottom:2px;
  font-size:14px;
  font-weight:400;
  color:var(--verde-texto);
  line-height:1.4;
}

.sublista-tarefa{
  display:block;
  margin-top:2px;
  margin-left:12px;
  font-size:12.5px;
  line-height:1.45;
  color:rgba(63,111,79,0.88);
}

.descricao-tarefa{
  display:block;
  margin-top:2px;
  font-size:12px;
  color:rgba(63,111,79,0.7);
}

.hora{
  text-align:right;
  font-size:12px;
  color:rgba(63,111,79,0.72);
  white-space:nowrap;
  align-self:start;
  margin-top:4px;
}

.footerMiniAction{
  display:flex;
  justify-content:center;
  margin-top:4px;
}

.futureBtn{
  border:none;
  background:#E9ECE7;
  color:var(--texto-secundario);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
  transition:0.2s ease;
}

.futureBtn:hover{
  background:#dde3d9;
  color:var(--texto-principal);
}

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  justify-content:center;
  align-items:flex-start; /* ← AQUI */
  padding:24px 16px;       /* ← AQUI */
  z-index:999;
  overflow-y:auto;         /* ← AQUI */
}

.modalOverlay.show{
  display:flex;
}

.modal{
  background:#fff;
  padding:18px;
  border-radius:20px;
  width:min(360px, 100%);
  max-height:85vh;      /* ← IMPORTANTE */
  overflow-y:auto;      /* ← IMPORTANTE */
  display:flex;
  flex-direction:column;
  gap:10px;
}

.modalTitle{
  font-size:18px;
  color:var(--texto-principal);
  text-align:center;
  font-weight:500;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:13px;
  color:var(--texto-principal);
  font-family:var(--fonte);
  font-weight:500;
}

textarea{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  height:260px;
  resize:none;
}

textarea:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
}

.modalBtns{
  display:flex;
  gap:8px;
}

.modalBtns button{
  flex:1;
  padding:11px 12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:12.5px;
  transition:0.2s ease;
}

.cancel{
  background:#efefef;
  color:#333;
}

.cancel:hover{
  background:#e7e7e7;
}

.save{
  background:var(--verde-escuro);
  color:white;
}

.save:hover{
  background:#4f8a4f;
}



.inputModal{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  height:46px;
  outline:none;
}

.inputModal:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
}

.labelComEmoji{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.emojiMiniBtn{
  border:none;
  background:#F2F7F1;
  color:var(--verde-texto);
  width:30px;
  height:30px;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s ease;
}

.emojiMiniBtn:hover{
  background:var(--verde-hover);
}

.emojiPalette{
  position:fixed;
  display:none;
  grid-template-columns:repeat(8, 1fr);
  gap:5px;
  width:min(320px, calc(100vw - 32px));
  max-height:210px;
  overflow-y:auto;
  background:#fff;
  border:1px solid var(--borda);
  border-radius:16px;
  padding:10px;
  box-shadow:0 12px 30px rgba(0,0,0,0.18);
  z-index:2000;
}

.emojiPalette.show{
  display:grid;
}

.emojiOpcao{
  border:none;
  background:#F8FAF7;
  border-radius:9px;
  height:30px;
  font-size:16px;
  cursor:pointer;
}

.emojiOpcao:hover{
  background:var(--verde-principal);
}

.campo-ajuda-pequena{
  font-size:10.5px;
  color:var(--texto-secundario);
  line-height:1.35;
  margin-top:2px;
}

.configLista{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:4px;
}

.configItem{
  display:grid;
  grid-template-columns:1fr 110px;
  gap:8px;
  align-items:center;
  background:#F8FAF7;
  border:1px solid var(--borda);
  border-radius:14px;
  padding:10px;
}

.configTexto{
  min-width:0;
  font-size:12px;
  color:var(--texto-principal);
  line-height:1.35;
  overflow:hidden;
  text-overflow:ellipsis;
}

.configBotoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.configBotoes button{
  border:none;
  border-radius:10px;
  padding:8px;
  font-size:11px;
  font-family:var(--fonte);
  cursor:pointer;
  background:#efefef;
}

.configBotoes button:hover{
  background:#e7e7e7;
}

.ordem-config-box{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:2px;
}

.ordem-topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.ordem-ajuda{
  font-size:10.5px;
  color:var(--texto-secundario);
  line-height:1.35;
}

.ordem-auto-btn{
  border:none;
  background:#E9ECE7;
  color:var(--texto-secundario);
  border-radius:10px;
  padding:8px 10px;
  font-size:10.5px;
  cursor:pointer;
  font-family:var(--fonte);
  white-space:nowrap;
}

.ordem-auto-btn:hover{
  background:#dde3d9;
  color:var(--texto-principal);
}

.ordem-lista{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.ordem-item{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  background:#F8FAF7;
  border:1px solid var(--borda);
  border-radius:12px;
  padding:8px 9px;
}

.ordem-info{
  min-width:0;
  line-height:1.3;
}

.ordem-hora{
  display:block;
  font-size:10.5px;
  color:rgba(63,111,79,0.74);
  margin-bottom:2px;
}

.ordem-nome{
  display:block;
  font-size:11.5px;
  color:var(--texto-principal);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.ordem-botoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
}

.ordem-botoes button{
  width:30px;
  height:30px;
  border:none;
  border-radius:9px;
  background:#E9ECE7;
  color:var(--texto-principal);
  font-size:14px;
  cursor:pointer;
  font-family:var(--fonte);
}

.ordem-botoes button:disabled{
  opacity:0.35;
  cursor:not-allowed;
}

#modalEditarTarefa{
  z-index:1005;
  background:rgba(0,0,0,0.22);
}

#modalEditarTarefa .modal{
  width:min(340px, 100%);
}

.status-edicao{
  font-size:12px;
  color:#A04646;
  text-align:center;
  min-height:16px;
  line-height:1.35;
}



.configActionsBtn{
  border:none;
  border-radius:10px;
  padding:8px 9px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:11px;
  transition:0.2s ease;
  background:#efefef;
  color:#333;
}
.configActionsBtn:hover{
  background:#e7e7e7;
}
.configActionsBtn.move{
  background:#E9ECE7;
  color:var(--verde-texto);
  min-width:32px;
}
.configActionsBtn.danger{
  background:#f5d7d7;
  color:#8a3030;
}

@media (max-width: 390px){
  body{
    padding:14px;
  }

  .card{
    padding:20px 14px 16px;
  }

  .titleIndex{
    font-size:19px;
  }

  .topo{
    grid-template-columns:40px 1fr 54px;
  }

  .horaTopo{
    font-size:13px;
  }

  .dataTopoLinha{
    font-size:10.5px;
  }

  .tarefa{
    grid-template-columns:20px 1fr auto;
    padding:12px 12px;
    gap:8px;
  }

  .nome{
    font-size:13.5px;
  }

  .grupo-titulo{
    font-size:13.5px;
  }

  .sublista-tarefa{
    font-size:12px;
    margin-left:10px;
  }

  .hora{
    font-size:11.5px;
  }
}


/* =========================================================
   VISUAL SYSTEM GABRIELA — ajuste aplicado sem card/hero no topo
   ========================================================= */
:root{
  --gabi-fundo:#F8F7F1;
  --gabi-card:#FFFDF8;
  --gabi-card-2:#F4F3EA;
  --gabi-salvia:#7F9271;
  --gabi-salvia-escuro:#516448;
  --gabi-texto:#2F332D;
  --gabi-suave:#77786F;
  --gabi-borda:#E8E1D4;
  --gabi-rosa:#E8C8BF;
  --gabi-sombra:0 10px 24px rgba(76, 82, 62, 0.10);
}

html, body{ min-height:100%; }

body.gabi-rotina{
  align-items:flex-start !important;
  padding:14px 12px 96px !important;
  background:
    radial-gradient(circle at 14% 4%, rgba(232,243,226,0.75), transparent 32%),
    radial-gradient(circle at 95% 16%, rgba(243,236,221,0.80), transparent 30%),
    linear-gradient(180deg, #FEFCF7 0%, var(--gabi-fundo) 100%) !important;
  color:var(--gabi-texto) !important;
  overflow-x:hidden;
}

body.gabi-rotina .pagina{ max-width:420px !important; }

body.gabi-rotina .card{
  background:rgba(255,253,248,0.92) !important;
  border:1px solid rgba(232,225,212,0.92) !important;
  border-radius:30px !important;
  padding:18px 14px 20px !important;
  gap:14px !important;
  box-shadow:0 14px 34px rgba(76,82,62,0.11) !important;
  overflow:hidden;
  position:relative;
}

body.gabi-rotina .card::before{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  right:-80px;
  top:-70px;
  border-radius:50%;
  background:rgba(234,243,232,0.72);
  z-index:0;
}

body.gabi-rotina .card::after{
  content:"";
  position:absolute;
  width:170px;
  height:170px;
  left:-95px;
  bottom:-65px;
  border-radius:50%;
  background:rgba(243,236,221,0.62);
  z-index:0;
}

body.gabi-rotina .card > *{
  position:relative;
  z-index:1;
}

body.gabi-rotina .topo{
  grid-template-columns:44px 1fr 82px !important;
  align-items:start !important;
  gap:8px !important;
  margin-bottom:2px !important;
}

body.gabi-rotina .botao-voltar{
  width:42px !important;
  height:42px !important;
  border-radius:50% !important;
  background:rgba(255,255,255,0.86) !important;
  border:1px solid rgba(232,225,212,0.95) !important;
  color:var(--gabi-salvia-escuro) !important;
  box-shadow:0 6px 16px rgba(76,82,62,0.08) !important;
  font-size:20px !important;
}

body.gabi-rotina .topCenter{ padding-top:0 !important; }

body.gabi-rotina .titleIndex{
  color:#40513B !important;
  font-size:27px !important;
  font-weight:500 !important;
  line-height:1.05 !important;
  letter-spacing:-0.3px !important;
  text-align:center !important;
}

body.gabi-rotina .titleIndex::after{
  content:" 🌿";
  font-size:18px;
  vertical-align:middle;
}

body.gabi-rotina .subtitulo{
  color:var(--gabi-suave) !important;
  font-size:12px !important;
  margin-top:5px !important;
}

body.gabi-rotina .dataTopo{ color:#6F7469 !important; padding-top:0 !important; }
body.gabi-rotina .horaTopo{ color:#B8807B !important; font-size:15px !important; font-weight:500 !important; }
body.gabi-rotina .dataTopoLinha{ color:#5D6359 !important; font-size:10.5px !important; }

body.gabi-rotina .caixa-grande{
  background:transparent !important;
  border:none !important;
  box-shadow:none !important;
  padding:0 !important;
  border-radius:0 !important;
}

body.gabi-rotina .lista{ gap:9px !important; }

body.gabi-rotina .tarefa{
  min-height:66px !important;
  height:auto !important;
  border-radius:18px !important;
  background:rgba(255,255,255,0.94) !important;
  border:1px solid rgba(232,225,212,0.92) !important;
  color:var(--gabi-texto) !important;
  box-shadow:0 7px 18px rgba(76,82,62,0.08) !important;
  padding:10px 42px 10px 74px !important;
  display:grid !important;
  grid-template-columns:1fr auto !important;
  gap:8px !important;
  align-items:center !important;
  text-align:left !important;
  position:relative !important;
  overflow:hidden;
}

body.gabi-rotina .tarefa:hover{
  transform:translateY(-1px);
  background:#FFFDF8 !important;
  box-shadow:0 10px 22px rgba(76,82,62,0.12) !important;
}

body.gabi-rotina .tarefa::before{
  content:"";
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border-radius:50%;
  background:#F4F0E7;
  border:1px solid rgba(232,225,212,0.78);
  box-shadow:0 5px 12px rgba(76,82,62,0.06);
}

body.gabi-rotina .tarefa::after{
  content:"›";
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-54%);
  color:#6F7E63;
  font-size:31px;
  line-height:1;
  font-weight:300;
}

body.gabi-rotina .check{
  position:absolute !important;
  left:30px !important;
  top:50% !important;
  transform:translateY(-50%) !important;
  margin:0 !important;
  font-size:13px !important;
  z-index:2;
}

body.gabi-rotina .nome{
  color:#2F332D !important;
  text-align:left !important;
  font-size:15.5px !important;
  line-height:1.3 !important;
  font-weight:500 !important;
  letter-spacing:-0.2px;
  grid-column:1 / 2 !important;
}

body.gabi-rotina .grupo-titulo{
  color:#2F332D !important;
  font-size:15.5px !important;
  line-height:1.3 !important;
  font-weight:500 !important;
}

body.gabi-rotina .sublista-tarefa,
body.gabi-rotina .descricao-tarefa{
  color:rgba(81,100,72,0.72) !important;
  font-size:11.5px !important;
  line-height:1.35 !important;
}

body.gabi-rotina .hora{
  color:rgba(81,100,72,0.72) !important;
  font-size:11px !important;
  line-height:1.25 !important;
  align-self:center !important;
  margin-top:0 !important;
  grid-column:2 / 3 !important;
}

body.gabi-rotina .tarefa.feita{ opacity:.72; }
body.gabi-rotina .tarefa.desabilitada{ opacity:.42; }

<script>
const tarefasBloco = [
  {
    nome:`<span class="grupo-titulo">🌙 Ritual para desacelerar</span><span class="sublista-tarefa">🎶 Música relaxante<br>🕯️ Desligar luzes brancas<br>🦶 Massagem com óleo de gergelim</span>`,
    hora:"20h"
  },
  { nome:"💧 Beber água", hora:"20h" },
  { nome:"🚿 Tomar banho morno", hora:"20h" },
  {
    nome:`<span class="grupo-titulo">🪥 Higiene noturna</span><span class="sublista-tarefa">🪥 Escovar os dentes<br>👅 Raspar a língua</span>`,
    hora:"20h"
  },
  { nome:"📱 Desligar celular, TV e tablet", hora:"20h" },
  { nome:"🍲 Ceia da noite", hora:"20h" }
];

const chaveBase = "gabriela_desacelerar_autocuidado";
const CHAVE_CONFIG_TAREFAS = "config_tarefas_desacelerar";
const CHAVE_ORDEM_TAREFAS = "ordem_tarefas_desacelerar";
const CHAVE_FUTURAS_EDICOES = "futuras_edicoes_gabriela_desacelerar_autocuidado";

let tarefaEdicaoAtualId = null;
let emojiCampoAtual = null;

const EMOJIS_CONFIG = [
  "🌿","✨","💫","🌙","☀️","🧘","🤸‍♀️","🚶","💪","🙏","🚿","🧼","🚽","👅","🪥","🥛","🍋","💊","🫧","🌸","🍃","🕯️","📿","📝","📚","🏠","🍴","🃏","💚","🤍","✅","⭐"
];

function pad2(numero){
  return String(numero).padStart(2, "0");
}

function atualizarLinhaTempo(){
  const agora = new Date();
  const diasCurtos = ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"];
  document.getElementById("linhaTempoHora").textContent = `${pad2(agora.getHours())}:${pad2(agora.getMinutes())}`;
  document.getElementById("linhaTempoDia").textContent = `• ${diasCurtos[agora.getDay()]}`;
  document.getElementById("linhaTempoData").textContent = `• ${pad2(agora.getDate())}/${pad2(agora.getMonth()+1)}`;
}

function diaSemanaHoje(){
  return String(new Date().getDay());
}

function limparHtml(texto){
  const div = document.createElement("div");
  div.innerHTML = String(texto || "")
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/<\/span>/gi, "\n");
  return div.textContent.replace(/\n{2,}/g, "\n").trim();
}

function primeiraLetraEhEmoji(texto){
  const primeiro = Array.from(String(texto || "").trim())[0] || "";
  return /\p{Extended_Pictographic}/u.test(primeiro);
}

function montarNomeComEmoji(emoji, nome){
  const e = String(emoji || "").trim();
  const n = String(nome || "").trim();
  if(!e) return n;
  if(primeiraLetraEhEmoji(n)) return n;
  return `${e} ${n}`;
}

function formatarSubtituloBotao(texto){
  return String(texto || "").replace(/\s+e\s+/gi, " • ");
}

function formatarDescricao(texto){
  return String(texto || "")
    .split("\n")
    .map(linha => linha.trim())
    .filter(Boolean)
    .map(linha => formatarSubtituloBotao(linha))
    .join("<br>");
}

function formatarHorarioRotina(valor){
  const textoOriginal = String(valor || "").toLowerCase().trim();
  if(!textoOriginal) return "";

  let horas = "00";
  let minutos = "00";

  if(textoOriginal.includes("h")){
    const partes = textoOriginal.split("h");
    horas = String(partes[0] || "0").replace(/\D/g, "").padStart(2, "0").slice(-2);
    minutos = String(partes[1] || "").replace(/\D/g, "").padEnd(2, "0").slice(0, 2) || "00";
    return `${horas}h${minutos}m`;
  }

  if(textoOriginal.includes(":")){
    const partes = textoOriginal.split(":");
    horas = String(partes[0] || "0").replace(/\D/g, "").padStart(2, "0").slice(-2);
    minutos = String(partes[1] || "0").replace(/\D/g, "").padEnd(2, "0").slice(0, 2);
    return `${horas}h${minutos}m`;
  }

  const numeros = textoOriginal.replace(/\D/g, "").slice(0, 4);
  if(!numeros) return "";

  if(numeros.length <= 2){
    horas = numeros.padStart(2, "0");
    minutos = "00";
  }else if(numeros.length === 3){
    horas = numeros.slice(0, 1).padStart(2, "0");
    minutos = numeros.slice(1, 3);
  }else{
    horas = numeros.slice(0, 2);
    minutos = numeros.slice(2, 4);
  }

  return `${horas}h${minutos}m`;
}

function horaParaMinutos(hora){
  const texto = String(hora || "").toLowerCase().trim();
  if(!texto) return 99999;
  const limpo = texto.replace("h", ":").replace("m", "").replace(" ", "");
  const partes = limpo.split(":");
  const h = Number(partes[0] || 0);
  const m = Number(partes[1] || 0);
  return (h * 60) + m;
}

function getConfigTarefas(){
  try{
    const cfg = JSON.parse(localStorage.getItem(CHAVE_CONFIG_TAREFAS) || "{}");
    if(!Array.isArray(cfg.custom)) cfg.custom = [];
    if(!Array.isArray(cfg.removidas)) cfg.removidas = [];
    if(!cfg.editadas) cfg.editadas = {};
    return cfg;
  }catch(e){
    return { custom:[], removidas:[], editadas:{} };
  }
}

function salvarConfigTarefas(cfg){
  localStorage.setItem(CHAVE_CONFIG_TAREFAS, JSON.stringify(cfg));
}

function getOrdemTarefas(){
  try{
    const ordem = JSON.parse(localStorage.getItem(CHAVE_ORDEM_TAREFAS) || "[]");
    return Array.isArray(ordem) ? ordem : [];
  }catch(e){
    return [];
  }
}

function salvarOrdemTarefas(ordem){
  localStorage.setItem(CHAVE_ORDEM_TAREFAS, JSON.stringify(ordem));
}

function aplicarOrdem(tarefas){
  const ordem = getOrdemTarefas();
  if(!ordem.length) return tarefas;
  const posicao = new Map(ordem.map((id, index) => [id, index]));
  return [...tarefas].sort((a,b) => {
    const pa = posicao.has(a.id) ? posicao.get(a.id) : 9999;
    const pb = posicao.has(b.id) ? posicao.get(b.id) : 9999;
    if(pa !== pb) return pa - pb;
    return horaParaMinutos(a.hora) - horaParaMinutos(b.hora);
  });
}

function todasAsTarefas(){
  const cfg = getConfigTarefas();

  const base = tarefasBloco
    .map((tarefa, index) => {
      const id = `base_${index}`;
      const editada = cfg.editadas[id] || {};
      return {
        ...tarefa,
        id,
        base:true,
        nome: editada.nome !== undefined ? editada.nome : tarefa.nome,
        descricao: editada.descricao !== undefined ? editada.descricao : (tarefa.descricao || ""),
        hora: editada.hora !== undefined ? editada.hora : (tarefa.hora || "")
      };
    })
    .filter(tarefa => !cfg.removidas.includes(tarefa.id));

  const custom = (cfg.custom || [])
    .filter(tarefa => !cfg.removidas.includes(tarefa.id))
    .map(tarefa => ({ ...tarefa, custom:true }));

  return aplicarOrdem([...base, ...custom]);
}

function tarefasVisiveis(){
  const hoje = diaSemanaHoje();
  return todasAsTarefas().filter(t => !t.dias || t.dias.includes(hoje));
}

function chaveDoDia(){
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mes = String(hoje.getMonth() + 1).padStart(2,"0");
  const dia = String(hoje.getDate()).padStart(2,"0");
  return `${chaveBase}_${ano}-${mes}-${dia}`;
}

function obterEstado(){
  const visiveis = tarefasVisiveis();
  const salvo = localStorage.getItem(chaveDoDia());

  if(salvo){
    try{
      const estado = JSON.parse(salvo);
      if(!Array.isArray(estado) && estado && typeof estado === "object") return estado;
      if(Array.isArray(estado)){
        const convertido = {};
        visiveis.forEach((tarefa, indice) => {
          convertido[tarefa.id] = Boolean(estado[indice]);
        });
        localStorage.setItem(chaveDoDia(), JSON.stringify(convertido));
        return convertido;
      }
    }catch(e){}
  }

  const estadoInicial = {};
  visiveis.forEach(tarefa => estadoInicial[tarefa.id] = false);
  localStorage.setItem(chaveDoDia(), JSON.stringify(estadoInicial));
  return estadoInicial;
}

function salvarEstado(estado){
  localStorage.setItem(chaveDoDia(), JSON.stringify(estado));
}

function alternarTarefa(id){
  const estado = obterEstado();
  estado[id] = !estado[id];
  salvarEstado(estado);
  renderizarTarefas();
}

function renderizarTarefas(){
  const lista = document.getElementById("lista-tarefas");
  const visiveis = tarefasVisiveis();
  const estado = obterEstado();
  const visiveisOrdenadas = [...visiveis].sort((a, b) => {
    return Number(Boolean(estado[a.id])) - Number(Boolean(estado[b.id]));
  });

  lista.innerHTML = "";

  visiveisOrdenadas.forEach((tarefa) => {
    const botao = document.createElement("button");
    botao.className = "tarefa" + (estado[tarefa.id] ? " feita" : "");
    botao.onclick = () => alternarTarefa(tarefa.id);
    botao.innerHTML = `
      <span class="check">✅</span>
      <span class="nome">
        ${formatarSubtituloBotao(tarefa.nome)}
        ${tarefa.descricao ? `<span class="descricao-tarefa">${formatarDescricao(tarefa.descricao)}</span>` : ""}
      </span>
      <span class="hora">${tarefa.hora || ""}</span>
    `;
    lista.appendChild(botao);
  });
}

function aplicarMascaraHorarioCampo(campo){
  if(!campo) return;
  const numeros = String(campo.value || "").replace(/\D/g, "").slice(0, 4);
  if(!numeros){
    campo.value = "";
    return;
  }

  let horas = "00";
  let minutos = "00";

  if(numeros.length <= 2){
    horas = numeros.padStart(2, "0");
    minutos = "00";
  }else if(numeros.length === 3){
    horas = numeros.slice(0, 1).padStart(2, "0");
    minutos = numeros.slice(1, 3);
  }else{
    horas = numeros.slice(0, 2);
    minutos = numeros.slice(2, 4);
  }

  campo.value = `${horas}h${minutos}m`;
}

function prepararCamposHorarioAutomatico(){
  ["novaTarefaHora", "editarTarefaHora"].forEach(id => {
    const campo = document.getElementById(id);
    if(!campo || campo.dataset.mascaraHorario === "ok") return;
    campo.dataset.mascaraHorario = "ok";
    campo.addEventListener("input", () => aplicarMascaraHorarioCampo(campo));
  });
}

function editarTarefaConfiguracao(id){
  const tarefa = todasAsTarefas().find(t => t.id === id);
  if(!tarefa){
    alert("Tarefa não encontrada.");
    return;
  }

  tarefaEdicaoAtualId = id;
  document.getElementById("editarTarefaNome").value = limparHtml(tarefa.nome || "");
  document.getElementById("editarTarefaEmoji").value = "";
  document.getElementById("editarTarefaDescricao").value = String(tarefa.descricao || "").replace(/<br\s*\/?>/gi, "\n");
  document.getElementById("editarTarefaHora").value = tarefa.hora || "";
  document.getElementById("statusEditarTarefa").textContent = "";
  prepararCamposHorarioAutomatico();
  document.getElementById("modalEditarTarefa").classList.add("show");
}

function fecharModalEditarTarefa(){
  document.getElementById("modalEditarTarefa").classList.remove("show");
  tarefaEdicaoAtualId = null;
  fecharEmojiPalette();
}

function salvarEdicaoTarefaConfiguracao(){
  if(!tarefaEdicaoAtualId) return;

  const nomeCampo = document.getElementById("editarTarefaNome").value.trim();
  const emoji = document.getElementById("editarTarefaEmoji").value.trim();
  const descricao = document.getElementById("editarTarefaDescricao").value.trim();
  const hora = formatarHorarioRotina(document.getElementById("editarTarefaHora").value);

  if(!nomeCampo){
    document.getElementById("statusEditarTarefa").textContent = "Escreva o nome da tarefa.";
    return;
  }

  const cfg = getConfigTarefas();
  const novoNome = montarNomeComEmoji(emoji, nomeCampo);

  if(tarefaEdicaoAtualId.startsWith("custom_")){
    const item = cfg.custom.find(t => t.id === tarefaEdicaoAtualId);
    if(item){
      item.nome = novoNome;
      item.descricao = descricao;
      item.hora = hora;
    }
  }else{
    if(!cfg.editadas) cfg.editadas = {};
    cfg.editadas[tarefaEdicaoAtualId] = {
      nome: novoNome,
      descricao,
      hora
    };
  }

  salvarConfigTarefas(cfg);
  fecharModalEditarTarefa();
  renderizarTarefas();
  renderizarListaConfiguracao();
}

function retirarTarefaConfiguracao(id){
  const cfg = getConfigTarefas();

  if(id.startsWith("custom_")){
    cfg.custom = cfg.custom.filter(t => t.id !== id);
  }else{
    if(!Array.isArray(cfg.removidas)) cfg.removidas = [];
    if(!cfg.removidas.includes(id)) cfg.removidas.push(id);
  }

  salvarConfigTarefas(cfg);
  salvarOrdemTarefas(getOrdemTarefas().filter(tarefaId => tarefaId !== id));
  renderizarTarefas();
  renderizarListaConfiguracao();
}

function idsTarefasAtuais(){
  return todasAsTarefas().map(tarefa => tarefa.id);
}

function renderizarListaOrdemTarefas(){
  const lista = document.getElementById("listaOrdemTarefas");
  if(!lista) return;

  const tarefas = todasAsTarefas();
  const ids = tarefas.map(tarefa => tarefa.id);
  salvarOrdemTarefas(ids);

  lista.innerHTML = "";

  tarefas.forEach((tarefa, indice) => {
    const item = document.createElement("div");
    item.className = "ordem-item";

    const info = document.createElement("div");
    info.className = "ordem-info";

    const hora = document.createElement("span");
    hora.className = "ordem-hora";
    hora.textContent = tarefa.hora || "sem horário";

    const nome = document.createElement("span");
    nome.className = "ordem-nome";
    nome.textContent = limparHtml(tarefa.nome);

    info.appendChild(hora);
    info.appendChild(nome);

    const botoes = document.createElement("div");
    botoes.className = "ordem-botoes";

    const subir = document.createElement("button");
    subir.type = "button";
    subir.textContent = "↑";
    subir.disabled = indice === 0;
    subir.onclick = () => moverTarefaOrdem(tarefa.id, -1);

    const descer = document.createElement("button");
    descer.type = "button";
    descer.textContent = "↓";
    descer.disabled = indice === tarefas.length - 1;
    descer.onclick = () => moverTarefaOrdem(tarefa.id, 1);

    botoes.appendChild(subir);
    botoes.appendChild(descer);

    item.appendChild(info);
    item.appendChild(botoes);
    lista.appendChild(item);
  });
}

function moverTarefaOrdem(id, direcao){
  const ordem = idsTarefasAtuais();
  const atual = ordem.indexOf(id);
  const novo = atual + direcao;
  if(atual < 0 || novo < 0 || novo >= ordem.length) return;

  const [removido] = ordem.splice(atual, 1);
  ordem.splice(novo, 0, removido);
  salvarOrdemTarefas(ordem);

  renderizarTarefas();
  renderizarListaConfiguracao();
}

function organizarTarefasPorHorarioAutomatico(){
  const ordenadas = [...todasAsTarefas()].sort((a,b) => {
    const porHora = horaParaMinutos(a.hora) - horaParaMinutos(b.hora);
    if(porHora !== 0) return porHora;
    return limparHtml(a.nome).localeCompare(limparHtml(b.nome), "pt-BR");
  });

  salvarOrdemTarefas(ordenadas.map(tarefa => tarefa.id));
  renderizarTarefas();
  renderizarListaConfiguracao();
}

function abrirEmojiPalette(campoId, botao){
  emojiCampoAtual = campoId;
  const palette = document.getElementById("emojiPalette");
  if(!palette) return;

  palette.innerHTML = "";
  EMOJIS_CONFIG.forEach(emoji => {
    const opcao = document.createElement("button");
    opcao.type = "button";
    opcao.className = "emojiOpcao";
    opcao.textContent = emoji;
    opcao.onclick = () => inserirEmojiNoCampo(emoji);
    palette.appendChild(opcao);
  });

  const rect = botao.getBoundingClientRect();
  palette.style.top = `${Math.min(rect.bottom + 8, window.innerHeight - 230)}px`;
  palette.style.left = `${Math.max(16, Math.min(rect.left - 250, window.innerWidth - 336))}px`;
  palette.classList.add("show");
}

function fecharEmojiPalette(){
  const palette = document.getElementById("emojiPalette");
  if(palette) palette.classList.remove("show");
}

function inserirEmojiNoCampo(emoji){
  if(!emojiCampoAtual) return;
  const campo = document.getElementById(emojiCampoAtual);
  if(!campo) return;

  const inicio = campo.selectionStart ?? campo.value.length;
  const fim = campo.selectionEnd ?? campo.value.length;
  const valor = campo.value || "";
  campo.value = valor.slice(0, inicio) + emoji + valor.slice(fim);
  campo.focus();
  const novaPosicao = inicio + emoji.length;
  if(campo.setSelectionRange) campo.setSelectionRange(novaPosicao, novaPosicao);
  fecharEmojiPalette();
}

window.addEventListener("click", (event) => {
  const palette = document.getElementById("emojiPalette");
  if(!palette || !palette.classList.contains("show")) return;
  if(event.target.closest(".emojiPalette") || event.target.closest(".emojiMiniBtn")) return;
  fecharEmojiPalette();
});

  atualizarLinhaTempo();
});
</script>


<script>
/* Integração direta das refeições do Jejum Intermitente */
(function(){
  const CHAVE_REFEICOES = "jejum_rotina_refeicoes_v1";
  const CHAVE_CONCLUIDAS = "jejum_refeicoes_concluidas";

  function hojeISO(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  function chaveConcluidas(){
    return `${CHAVE_CONCLUIDAS}_${hojeISO()}`;
  }

  function lerRefeicoes(){
    try{
      const dados = JSON.parse(localStorage.getItem(CHAVE_REFEICOES) || "{}");
      return Array.isArray(dados.itens) ? dados.itens : [];
    }catch(e){
      return [];
    }
  }

  function lerConcluidas(){
    try{
      const valor = JSON.parse(localStorage.getItem(chaveConcluidas()) || "[]");
      return Array.isArray(valor) ? valor : [];
    }catch(e){
      return [];
    }
  }

  function estaConcluida(indice){
    return !!lerConcluidas()[indice];
  }

  function definirConcluida(indice, valor){
    const estado = lerConcluidas();
    while(estado.length < 3) estado.push(false);
    estado[indice] = !!valor;
    localStorage.setItem(chaveConcluidas(), JSON.stringify(estado));
  }

  function minutos(hora){
    const m = String(hora || "").match(/(\d{1,2})\D?(\d{2})?/);
    return m ? Number(m[1]) * 60 + Number(m[2] || 0) : 9999;
  }

  window.JejumIntegracao = {
    lerRefeicoes, lerConcluidas, estaConcluida, definirConcluida, minutos
  };
})();
</script>

<script>
(function(){
  const PAGINA_DESTINO = "gabriela-desacelerar-autocuidado.html";

  function integrarRefeicoes(){
    const lista = document.getElementById("lista-tarefas");
    if(!lista || !window.JejumIntegracao) return;

    lista.querySelectorAll("[data-refeicao-jejum='1']").forEach(el => el.remove());

    const refeicoes = JejumIntegracao.lerRefeicoes()
      .map((item, indice) => ({...item, indice}))
      .filter(item => item.destino === PAGINA_DESTINO);

    refeicoes.forEach(item => {
      const botao = document.createElement("button");
      botao.type = "button";
      botao.className = "tarefa" + (JejumIntegracao.estaConcluida(item.indice) ? " feita" : "");
      botao.dataset.refeicaoJejum = "1";
      botao.dataset.minutos = String(JejumIntegracao.minutos(item.hora));
      botao.innerHTML = `
        <span class="check">✅</span>
        <span class="nome"><span class="grupo-titulo">${item.nome}</span><span class="descricao-tarefa">${item.metodo || "Jejum Intermitente"}</span></span>
        <span class="hora">${item.hora}</span>
      `;
      botao.onclick = () => {
        const novoEstado = !JejumIntegracao.estaConcluida(item.indice);
        JejumIntegracao.definirConcluida(item.indice, novoEstado);
        integrarRefeicoes();
      };
      lista.appendChild(botao);
    });

    const tarefas = Array.from(lista.children);
    tarefas.sort((a,b) => {
      const feitaA = a.classList.contains("feita") ? 1 : 0;
      const feitaB = b.classList.contains("feita") ? 1 : 0;
      if(feitaA !== feitaB) return feitaA - feitaB;

      function obterMinutos(el){
        if(el.dataset.minutos) return Number(el.dataset.minutos);
        const h = el.querySelector(".hora")?.textContent || "";
        return JejumIntegracao.minutos(h);
      }
      return obterMinutos(a) - obterMinutos(b);
    }).forEach(el => lista.appendChild(el));
  }

  if(typeof window.renderizarTarefas === "function"){
    const original = window.renderizarTarefas;
    window.renderizarTarefas = function(){
      original.apply(this, arguments);
      integrarRefeicoes();
    };
  }

  window.addEventListener("load", integrarRefeicoes);
  window.addEventListener("focus", integrarRefeicoes);
  window.addEventListener("storage", integrarRefeicoes);
})();
</script>

<script>
(function(){
  const PAGINA_DESTINO="gabriela-desacelerar-autocuidado.html";
  function integrarAgua(){
    const lista=document.getElementById("lista-tarefas");
    if(!lista||!window.AguaJejumIntegracao)return;
    lista.querySelectorAll("[data-agua-jejum='1']").forEach(el=>el.remove());
    const itens=AguaJejumIntegracao.lerItens().map((item,indice)=>({...item,indice})).filter(item=>item.destino===PAGINA_DESTINO);
    itens.forEach(item=>{
      const botao=document.createElement("button");
      botao.type="button";
      botao.className="tarefa"+(AguaJejumIntegracao.estaConcluida(item.indice)?" feita":"");
      botao.dataset.aguaJejum="1";
      botao.dataset.minutos=String(AguaJejumIntegracao.minutos(item.hora));
      botao.innerHTML=`<span class="check">✅</span><span class="nome"><span class="grupo-titulo">${item.nome}</span><span class="descricao-tarefa">${item.descricao||item.metodo||"Hidratação"}</span></span><span class="hora">${item.hora}</span>`;
      botao.onclick=()=>{const novo=!AguaJejumIntegracao.estaConcluida(item.indice);AguaJejumIntegracao.definirConcluida(item.indice,novo);integrarAgua()};
      lista.appendChild(botao);
    });
    Array.from(lista.children).sort((a,b)=>{
      const fa=a.classList.contains("feita")?1:0,fb=b.classList.contains("feita")?1:0;
      if(fa!==fb)return fa-fb;
      const ma=a.dataset.minutos?Number(a.dataset.minutos):AguaJejumIntegracao.minutos(a.querySelector(".hora")?.textContent||"");
      const mb=b.dataset.minutos?Number(b.dataset.minutos):AguaJejumIntegracao.minutos(b.querySelector(".hora")?.textContent||"");
      return ma-mb;
    }).forEach(el=>lista.appendChild(el));
  }
  if(typeof window.renderizarTarefas==="function"){const original=window.renderizarTarefas;window.renderizarTarefas=function(){original.apply(this,arguments);integrarAgua()}}
  window.addEventListener("load",integrarAgua);window.addEventListener("focus",integrarAgua);window.addEventListener("storage",integrarAgua);
})();
</script>

      <button class="fecharModal" type="button" onclick="fecharModalConclusaoSubtarefas()">×</button>
    </div>
    <div class="modalTitle" id="tituloModalConclusaoSubtarefas">Concluir atividades</div>
    <div class="modalSubtarefasAjuda">Marque cada atividade realizada. O card continuará na lista até que todas sejam concluídas.</div>
    <div class="modalSubtarefasLista" id="listaModalConclusaoSubtarefas"></div>
    <div class="modalBtns">
      <button class="cancel" type="button" onclick="fecharModalConclusaoSubtarefas()">fechar</button>
    </div>
  </div>
</div>


<script>
/* =========================================================
   SUBTAREFAS CONCLUÍDAS INDIVIDUALMENTE
   ========================================================= */
(function(){
  let tarefaSubtarefasAtual = null;

  function chaveSubtarefasDia(){
    return `${chaveDoDia()}_atividades`;
  }

  function obterEstadoSubtarefas(){
    try{
      const salvo = JSON.parse(localStorage.getItem(chaveSubtarefasDia()) || "{}");
      return salvo && typeof salvo === "object" ? salvo : {};
    }catch(e){
      return {};
    }
  }

  function salvarEstadoSubtarefas(estado){
    localStorage.setItem(chaveSubtarefasDia(), JSON.stringify(estado));
  }

  function textoSemHtml(valor){
    const div = document.createElement("div");
    div.innerHTML = String(valor || "")
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<\/span>/gi, "\n");
    return (div.textContent || "")
      .split("\n")
      .map(v => v.trim())
      .filter(Boolean);
  }

  function obterAtividadesDaTarefa(tarefa){
    if(!tarefa) return [];

    if(Array.isArray(tarefa.subtarefas)){
      return tarefa.subtarefas
        .map(v => typeof v === "string" ? v : (v.nome || v.titulo || ""))
        .map(v => String(v).trim())
        .filter(Boolean);
    }

    const temp = document.createElement("div");
    temp.innerHTML = String(tarefa.nome || "");

    const sublista = temp.querySelector(".sublista-tarefa");
    if(sublista){
      const linhas = [];
      sublista.querySelectorAll(".linha-sub").forEach(el => {
        const t = (el.textContent || "").trim();
        if(t) linhas.push(t);
      });

      if(linhas.length > 1) return linhas;

      const porBr = sublista.innerHTML
        .split(/<br\s*\/?>/i)
        .map(parte => {
          const d = document.createElement("div");
          d.innerHTML = parte;
          return (d.textContent || "").trim();
        })
        .filter(Boolean);

      if(porBr.length > 1) return porBr;

      const spans = Array.from(sublista.querySelectorAll(":scope > span"))
        .map(el => (el.textContent || "").trim())
        .filter(Boolean);

      if(spans.length > 1) return spans;
    }

    return [];
  }

  function tituloPrincipal(tarefa){
    const temp = document.createElement("div");
    temp.innerHTML = String(tarefa?.nome || "");
    const grupo = temp.querySelector(".grupo-titulo");
    return (grupo?.textContent || textoSemHtml(tarefa?.nome)[0] || "Atividades").trim();
  }

  function idAtividade(tarefa, indice){
    return `${tarefa.id}__${indice}`;
  }

  function todasConcluidas(tarefa){
    const atividades = obterAtividadesDaTarefa(tarefa);
    if(atividades.length <= 1) return null;
    const estado = obterEstadoSubtarefas();
    return atividades.every((_, indice) => Boolean(estado[idAtividade(tarefa, indice)]));
  }

  function progresso(tarefa){
    const atividades = obterAtividadesDaTarefa(tarefa);
    const estado = obterEstadoSubtarefas();
    const feitas = atividades.filter((_, indice) => Boolean(estado[idAtividade(tarefa, indice)])).length;
    return {feitas, total:atividades.length};
  }

  window.fecharModalConclusaoSubtarefas = function(){
    tarefaSubtarefasAtual = null;
    document.getElementById("modalConclusaoSubtarefas")?.classList.remove("show");
  };

  window.alternarSubtarefaRotina = function(indice){
    if(!tarefaSubtarefasAtual) return;

    const estadoSub = obterEstadoSubtarefas();
    const chave = idAtividade(tarefaSubtarefasAtual, indice);
    estadoSub[chave] = !estadoSub[chave];
    salvarEstadoSubtarefas(estadoSub);

    const terminou = todasConcluidas(tarefaSubtarefasAtual);
    const estadoPai = obterEstado();
    estadoPai[tarefaSubtarefasAtual.id] = Boolean(terminou);
    salvarEstado(estadoPai);

    renderizarListaModalSubtarefas();
    renderizarTarefas();

    if(terminou){
      setTimeout(fecharModalConclusaoSubtarefas, 220);
    }
  };

  function renderizarListaModalSubtarefas(){
    if(!tarefaSubtarefasAtual) return;

    const atividades = obterAtividadesDaTarefa(tarefaSubtarefasAtual);
    const estado = obterEstadoSubtarefas();
    const lista = document.getElementById("listaModalConclusaoSubtarefas");
    const titulo = document.getElementById("tituloModalConclusaoSubtarefas");

    titulo.textContent = tituloPrincipal(tarefaSubtarefasAtual);
    lista.innerHTML = atividades.map((atividade, indice) => {
      const concluida = Boolean(estado[idAtividade(tarefaSubtarefasAtual, indice)]);
      return `
        <button type="button"
          class="modalSubtarefaItem ${concluida ? "concluida" : ""}"
          onclick="alternarSubtarefaRotina(${indice})">
          <span class="modalSubtarefaCheck">${concluida ? "✓" : ""}</span>
          <span>${atividade}</span>
        </button>
      `;
    }).join("");
  }

  function abrirModalSubtarefas(tarefa){
    tarefaSubtarefasAtual = tarefa;
    renderizarListaModalSubtarefas();
    document.getElementById("modalConclusaoSubtarefas")?.classList.add("show");
  }

  const alternarOriginal = window.alternarTarefa;

  window.alternarTarefa = function(id){
    const tarefa = tarefasVisiveis().find(t => t.id === id);
    const atividades = obterAtividadesDaTarefa(tarefa);

    if(atividades.length > 1){
      abrirModalSubtarefas(tarefa);
      return;
    }

    if(typeof alternarOriginal === "function"){
      alternarOriginal(id);
    }
  };

  window.renderizarTarefas = function(){
    const lista = document.getElementById("lista-tarefas");
    const visiveis = tarefasVisiveis();
    const estadoPai = obterEstado();

    visiveis.forEach(tarefa => {
      const concluidaPorAtividades = todasConcluidas(tarefa);
      if(concluidaPorAtividades !== null){
        estadoPai[tarefa.id] = concluidaPorAtividades;
      }
    });
    salvarEstado(estadoPai);

    const ordenadas = [...visiveis].sort((a,b) => {
      return Number(Boolean(estadoPai[a.id])) - Number(Boolean(estadoPai[b.id]));
    });

    lista.innerHTML = "";

    ordenadas.forEach(tarefa => {
      const atividades = obterAtividadesDaTarefa(tarefa);
      const temVarias = atividades.length > 1;
      const prog = temVarias ? progresso(tarefa) : null;
      const feita = Boolean(estadoPai[tarefa.id]);

      const botao = document.createElement("button");
      botao.className = "tarefa" + (feita ? " feita" : "");
      botao.onclick = () => alternarTarefa(tarefa.id);

      const progressoHtml = temVarias
        ? `<span class="progressoSubtarefas">${prog.feitas} de ${prog.total} atividades concluídas</span>`
        : "";

      botao.innerHTML = `
        <span class="check">✅</span>
        <span class="nome">
          ${formatarSubtituloBotao(tarefa.nome)}
          ${tarefa.descricao ? `<span class="descricao-tarefa">${formatarDescricao(tarefa.descricao)}</span>` : ""}
          ${progressoHtml}
        </span>
        <span class="hora">${tarefa.hora || ""}</span>
      `;

      lista.appendChild(botao);
    });
  };

  document.getElementById("modalConclusaoSubtarefas")?.addEventListener("click", e => {
    if(e.target.id === "modalConclusaoSubtarefas") fecharModalConclusaoSubtarefas();
  });

  document.addEventListener("keydown", e => {
    if(e.key === "Escape") fecharModalConclusaoSubtarefas();
  });

  renderizarTarefas();
})();
</script>

</body>
</html>
