<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manifestação e Criatividade</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --verde-principal:#F2F7F1;
  --verde-hover:#E8F1E6;
  --verde-texto:#3F6F4F;
  --verde-escuro:#5C9D5C;

  --fundo:#F6F7F5;
  --card:#FFFFFF;

  --texto-principal:#2F2F2F;
  --texto-secundario:#6B6B6B;
  --borda:#E3E5E1;

  --fonte:'Poppins',sans-serif;

  --titulo:20px;
  --botao:15px;

  --sombra-suave:0 4px 12px rgba(0,0,0,0.05);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  font-family:var(--fonte);
  background:var(--fundo);
  color:var(--texto-principal);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:16px;
}

.pagina{
  width:100%;
  max-width:420px;
}

.card{
  width:100%;
  background:var(--card);
  border-radius:24px;
  padding:22px 16px 18px;
  box-shadow:var(--sombra-suave);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.topo{
  display:grid;
  grid-template-columns:40px 1fr 58px;
  align-items:start;
  gap:8px;
  margin-bottom:6px;
}

.botao-voltar{
  border:none;
  background:#E9ECE7;
  color:var(--texto-principal);
  border-radius:12px;
  width:40px;
  height:40px;
  cursor:pointer;
  font-size:18px;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  padding:0;
  transition:0.2s ease;
}

.botao-voltar:hover{
  background:#dde3d9;
}

.botao-voltar span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  transform:translateY(-1px);
}

.topCenter{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:0;
  padding-top:2px;
}

.titleIndex{
  color:var(--texto-principal);
  font-weight:500;
  font-size:var(--titulo);
  margin:0;
  line-height:1.2;
  text-align:center;
}

.subtitulo{
  font-size:12px;
  color:var(--texto-secundario);
  margin-top:2px;
  text-align:center;
}

.dataTopo{
  min-height:40px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
  text-align:right;
  color:var(--texto-secundario);
  line-height:1.1;
  padding-top:1px;
}

.horaTopo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  white-space:nowrap;
  margin-bottom:2px;
}

.dataTopoLinha{
  font-size:11px;
  white-space:nowrap;
}

.caixa-grande{
  background:#F7F8F6;
  border:1px solid var(--borda);
  border-radius:18px;
  padding:6px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);
}

.lista{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.tarefa{
  width:100%;
  background:var(--verde-principal);
  border:none;
  border-radius:18px;

  padding:12px 14px;
  min-height:72px;           /* ← AQUI resolve de verdade */

  display:grid;
  grid-template-columns:22px 1fr auto;
  align-items:center;
  gap:10px;

  cursor:pointer;
  font-family:var(--fonte);
  transition:0.2s ease;
}

.tarefa:hover{
  background:var(--verde-hover);
}

.tarefa.feita{
  opacity:0.68;
}

.tarefa.desabilitada{
  opacity:0.42;
  cursor:not-allowed;
  pointer-events:none;
}

.check{
  font-size:13px;
  line-height:1;
  visibility:hidden;
  align-self:start;
  margin-top:4px;
}

.tarefa.feita .check{
  visibility:visible;
}

.nome{
  font-size:14px;
  color:var(--verde-texto);
  line-height:1.6;
  font-weight:400;

  display:flex;
  flex-direction:column;
  align-items:flex-start;   /* mantém à esquerda */
}

.grupo-titulo{
  display:block;
  margin-bottom:2px;
  font-size:14px;
  font-weight:400;   /* ← AQUI */
  text-align:left;
  color:var(--verde-texto);
  line-height:1.4;
}

.sublista-tarefa{
  margin-top:4px;
  margin-left:0;
  font-size:12.5px;
  line-height:1.5;

  display:flex;
  flex-direction:column;
  gap:3px;
}

.sublista-tarefa span{
  font-size:12.5px;
  font-weight:400;
  color:rgba(63,111,79,0.88);
  text-align:left;
}

.linha-sub{
  display:grid;
  grid-template-columns:22px auto;
  align-items:center;
  justify-content:start;
  column-gap:6px;
  width:max-content;
}

.hora{
  text-align:right;
  font-size:12px;
  color:rgba(63,111,79,0.72);
  white-space:nowrap;
  align-self:start;
  margin-top:4px;
}

.footerMiniAction{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:4px;
  flex-wrap:wrap;
}

.descricao-tarefa{
  margin-top:1px;
  font-size:11px;
  line-height:1.15;
}

.modalHeader{
  display:flex;
  justify-content:flex-end;
}

.fecharModal{
  background:#E9ECE7;
  border:none;
  width:32px;
  height:32px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  color:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}

.configItem{
  display:grid;
  grid-template-columns:1fr 110px;
  gap:8px;
  align-items:center;
  background:#F8FAF7;
  border:1px solid var(--borda);
  border-radius:14px;
  padding:10px;
  margin-top:6px;
}

.configTexto{
  font-size:12px;
  color:var(--texto-principal);
  line-height:1.35;
}

.configBotoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.configBotoes button{
  border:none;
  border-radius:10px;
  text-align: center;
  padding:8px;
  font-size:11px;
  font-family:var(--fonte);
  cursor:pointer;
  background:#efefef;
  color:#333;
}

.futureBtn{
  border:none;
  background:#E9ECE7;
  color:var(--texto-secundario);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
  transition:0.2s ease;
}

.futureBtn:hover{
  background:#dde3d9;
  color:var(--texto-principal);
}

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  justify-content:center;
  align-items:flex-start;
  padding:24px 16px;
  z-index:999;
  overflow-y:auto;
}

.modalOverlay.show{
  display:flex;
}

.modal{
  background:#fff;
  padding:18px;
  border-radius:20px;
  width:min(360px, 100%);
  max-height:85vh;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
}

.modalTitle{
  font-size:18px;
  color:var(--texto-principal);
  text-align:center;
  font-weight:500;
}

.modalTexto{
  font-size:13px;
  color:var(--texto-secundario);
  text-align:center;
  line-height:1.5;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:13px;
  color:var(--texto-principal);
  font-family:var(--fonte);
  font-weight:500;
}

textarea{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  height:260px;
  resize:none;
}

textarea:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
}

.modalBtns{
  display:flex;
  gap:8px;
}

.modalBtns button{
  flex:1;
  padding:11px 12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:12.5px;
  transition:0.2s ease;
}

.modalBtns.duas-linhas{
  flex-direction:column;
}

.cancel{
  background:#efefef;
  color:#333;
}

.cancel:hover{
  background:#e7e7e7;
}

.save{
  background:var(--verde-escuro);
  color:white;
}

.save:hover{
  background:#4f8a4f;
}

.secundario{
  background:var(--verde-principal);
  color:var(--verde-texto);
}

.secundario:hover{
  background:var(--verde-hover);
}

@media (max-width: 390px){
  body{
    padding:14px;
  }

  .card{
    padding:20px 14px 16px;
  }

  .titleIndex{
    font-size:19px;
  }

  .topo{
    grid-template-columns:40px 1fr 54px;
  }

  .horaTopo{
    font-size:13px;
  }

  .dataTopoLinha{
    font-size:10.5px;
  }

  .tarefa{
    grid-template-columns:20px 1fr auto;
    min-height:auto;
    padding:14px 14px;
    gap:8px;
  }

  .nome{
    font-size:13.5px;
  }

  .grupo-titulo{
    font-size:13.5px;
  }

  .sublista-tarefa{
    font-size:12px;
    margin-left:10px;
  }

.hora{
  font-size:10.5px;
  margin-top:0;
}

</style>
</head>

<body>

<div class="pagina">
  <div class="card">

    <div class="topo">
      <button class="botao-voltar" onclick="window.location.href='gabriela-menu.html'"><span>←</span></button>

      <div class="topCenter">
        <h1 class="titleIndex">🌿 Gabriela</h1>
        <p class="subtitulo">manifeste com intenção, leveza e fé</p>
      </div>

      <div class="dataTopo" aria-label="Data e hora atuais">
        <div id="linhaTempoHora" class="horaTopo"></div>
        <div id="linhaTempoDia" class="dataTopoLinha"></div>
        <div id="linhaTempoData" class="dataTopoLinha"></div>
      </div>
    </div>

    <div class="caixa-grande">
      <div class="lista" id="lista-tarefas"></div>
    </div>

<div class="footerMiniAction">
  <button class="futureBtn" onclick="abrirModalConfiguracao()">configuração</button>
  <button class="futureBtn" onclick="abrirModalFuturasEdicoes()">futuras edições</button>
</div>

  </div>
</div>

<div class="modalOverlay" id="modalFuturasEdicoes">
  <div class="modal">
    <h2 class="modalTitle">Futuras edições</h2>

    <div class="field">
      <label>Ideias de melhorias futuras</label>
      <textarea id="futurasEdicoesTexto" placeholder="Escreva aqui suas ideias para melhorar essa tela..."></textarea>
    </div>

    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalFuturasEdicoes()">Cancelar</button>
      <button class="save" onclick="salvarFuturasEdicoes()">Concluir</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalAcaoCriacaoArtistica">
  <div class="modal">
    <h2 class="modalTitle">Criação artística de sonhos</h2>
    <p class="modalTexto">Escolha o que deseja fazer agora.</p>

    <div class="modalBtns duas-linhas">
      <button class="secundario" onclick="abrirProjetos()">abrir projetos</button>
      <button class="save" onclick="concluirTarefaCriacaoArtistica()">concluir tarefa</button>
      <button class="secundario" onclick="desfazerSelecaoTarefaCriacaoArtistica()">desfazer seleção da tarefa</button>
      <button class="cancel" onclick="fecharModalAcaoCriacaoArtistica()">cancelar</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalConfiguracao">
  <div class="modal">

    <div class="modalHeader">
      <button class="fecharModal" onclick="fecharModalConfiguracao()">✕</button>
    </div>

    <h2 class="modalTitle">Configuração da rotina</h2>

    <div class="field">
      <label>Nova tarefa</label>
      <textarea id="novaTarefaTexto" style="height:70px;"></textarea>
    </div>

    <div class="field">
      <label>Descrição</label>
      <textarea id="novaTarefaDescricao" style="height:70px;"></textarea>
    </div>

    <div class="field">
      <label>Horário</label>
      <textarea id="novaTarefaHora" style="height:50px;" placeholder="Ex: 0700"></textarea>
    </div>

    <div class="modalBtns">
      <button class="save" onclick="adicionarTarefaConfiguracao()">acrescentar</button>
      <button class="cancel" onclick="fecharModalConfiguracao()">cancelar</button>
    </div>

    <div id="listaConfigTarefas"></div>

  </div>
</div>

<script>
const chaveBase = "gabriela_manifestacao_criatividade";
const CHAVE_FUTURAS_EDICOES = "futuras_edicoes_gabriela_manifestacao_criatividade";
const INDICE_CRIACAO_ARTISTICA = 2;

function pad2(numero){
  return String(numero).padStart(2, "0");
}

function formatarSubtituloBotao(texto){
  return String(texto || "").replace(/\s+e\s+/gi, " • ");
}

function atualizarLinhaTempo(){
  const agora = new Date();
  const diasCurtos = ["dom","seg","ter","qua","qui","sex","sáb"];

  document.getElementById("linhaTempoHora").textContent = `${pad2(agora.getHours())}:${pad2(agora.getMinutes())}`;
  document.getElementById("linhaTempoDia").textContent = `• ${diasCurtos[agora.getDay()]}`;
  document.getElementById("linhaTempoData").textContent = `• ${pad2(agora.getDate())}/${pad2(agora.getMonth()+1)}`;
}

function abrirModalFuturasEdicoes(){
  document.getElementById("futurasEdicoesTexto").value =
    localStorage.getItem(CHAVE_FUTURAS_EDICOES) || "";
  document.getElementById("modalFuturasEdicoes").classList.add("show");
}

function fecharModalFuturasEdicoes(){
  document.getElementById("modalFuturasEdicoes").classList.remove("show");
}

function salvarFuturasEdicoes(){
  localStorage.setItem(
    CHAVE_FUTURAS_EDICOES,
    document.getElementById("futurasEdicoesTexto").value
  );
  fecharModalFuturasEdicoes();
}

function abrirModalAcaoCriacaoArtistica(){
  document.getElementById("modalAcaoCriacaoArtistica").classList.add("show");
}

function fecharModalAcaoCriacaoArtistica(){
  document.getElementById("modalAcaoCriacaoArtistica").classList.remove("show");
}

function abrirProjetos(){
  window.location.href = "gabriela-criacao-artistica-projetos-sonhos.html";
}

function tarefaEscritaOuLeitura(){
  const hoje = new Date();
  const inicio = new Date(2026, 2, 7);
  const diff = Math.floor((hoje - inicio) / (1000 * 60 * 60 * 24));
  return diff % 2 === 0 ? "📝 Escrita criativa" : "📖 Leitura";
}

function tarefasBase(){
  return [
    { 
      id:"base_0", 
      nome:"📝 Escrita criativa", 
      hora:"07h" 
    },
    {
      id:"base_1",
      nome:`<span class="grupo-titulo">🌿 Práticas de manifestação</span>
<span class="sublista-tarefa">
  <span class="linha-sub"><span>📖</span><span>Leitura</span></span>
  <span class="linha-sub"><span>💬</span><span>Afirmações do dia</span></span>
  <span class="linha-sub"><span>🌈</span><span>Visualização</span></span>
</span>`,
      hora:"07h"
    },
    { 
      id:"base_2", 
      nome:"🎨 Criação artística de sonhos", 
      hora:"07h", 
      principal:true 
    }
  ];
}

function tarefasBloco(){
  const cfg = getConfigTarefas();

  const base = tarefasBase()
    .map(tarefa => ({
      ...tarefa,
      ...(cfg.editadas && cfg.editadas[tarefa.id] ? cfg.editadas[tarefa.id] : {})
    }))
    .filter(tarefa => !cfg.removidas.includes(tarefa.id));

  const custom = cfg.custom || [];

  return [...base, ...custom];
}

function getConfigTarefas(){
  try{
    const cfg = JSON.parse(localStorage.getItem("config_tarefas_manifestacao") || "{}");
    if(!Array.isArray(cfg.custom)) cfg.custom = [];
    if(!Array.isArray(cfg.removidas)) cfg.removidas = [];
    if(!cfg.editadas) cfg.editadas = {};
    return cfg;
  }catch(e){
    return { custom:[], removidas:[], editadas:{} };
  }
}

function salvarConfigTarefas(cfg){
  localStorage.setItem("config_tarefas_manifestacao", JSON.stringify(cfg));
}

function formatarHorarioRotina(valor){
  const numeros = String(valor || "").replace(/\D/g,"").slice(0,4);
  if(!numeros) return "";

  const preenchido = numeros.padStart(4,"0");
  return preenchido.slice(0,2)+"h"+preenchido.slice(2)+"m";
}

function chaveDoDia(){
  const hoje = new Date();
  return `${chaveBase}_${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,"0")}-${String(hoje.getDate()).padStart(2,"0")}`;
}

function obterEstado(){
  const tarefas = tarefasBloco();
  const salvo = localStorage.getItem(chaveDoDia());

  if(salvo){
    try{
      const estado = JSON.parse(salvo);
      if(Array.isArray(estado) && estado.length === tarefas.length){
        return estado;
      }
    }catch(e){}
  }

  const estadoInicial = tarefas.map(() => false);
  localStorage.setItem(chaveDoDia(), JSON.stringify(estadoInicial));
  return estadoInicial;
}

function salvarEstado(estado){
  localStorage.setItem(chaveDoDia(), JSON.stringify(estado));
}

function existeAlgumaSelecionada(estado){
  return estado.some(Boolean);
}

function indiceSelecionado(estado){
  return estado.findIndex(Boolean);
}

function concluirSomenteEstaTarefa(indice){
  const estado = tarefasBloco().map((_, i) => i === indice);
  salvarEstado(estado);
  renderizarTarefas();
}

function limparSelecaoDaTarefa(indice){
  const estado = obterEstado();
  estado[indice] = false;
  salvarEstado(estado);
  renderizarTarefas();
}

function concluirTarefaCriacaoArtistica(){
  concluirSomenteEstaTarefa(INDICE_CRIACAO_ARTISTICA);
  fecharModalAcaoCriacaoArtistica();
}

function desfazerSelecaoTarefaCriacaoArtistica(){
  limparSelecaoDaTarefa(INDICE_CRIACAO_ARTISTICA);
  fecharModalAcaoCriacaoArtistica();
}

function alternarTarefa(indice){
  const tarefas = tarefasBloco();
  const estado = obterEstado();
  const selecionado = indiceSelecionado(estado);

  if(tarefas[indice].principal){
    abrirModalAcaoCriacaoArtistica();
    return;
  }

  if(selecionado === indice){
    limparSelecaoDaTarefa(indice);
    return;
  }

  if(selecionado !== -1 && selecionado !== indice){
    return;
  }

  concluirSomenteEstaTarefa(indice);
}

function renderizarTarefas(){
  const lista = document.getElementById("lista-tarefas");
  const tarefas = tarefasBloco();
  const estado = obterEstado();
  const haSelecionada = existeAlgumaSelecionada(estado);
  const selecionado = indiceSelecionado(estado);

  lista.innerHTML = "";

  tarefas.forEach((tarefa, indice) => {
    const botao = document.createElement("button");

    let classes = "tarefa";
    if(estado[indice]) classes += " feita";
    if(haSelecionada && selecionado !== indice) classes += " desabilitada";

    botao.className = classes;
    botao.onclick = () => alternarTarefa(indice);

botao.innerHTML = `
  <span class="check">✅</span>
  <span class="nome">
    ${tarefa.nome}
    ${tarefa.descricao ? `<span class="descricao-tarefa">${formatarSubtituloBotao(tarefa.descricao)}</span>` : ""}
  </span>
  <span class="hora">${tarefa.hora}</span>
`;

    lista.appendChild(botao);
  });
}

function abrirModalConfiguracao(){
  document.getElementById("novaTarefaTexto").value = "";
  document.getElementById("novaTarefaDescricao").value = "";
  document.getElementById("novaTarefaHora").value = "";
  renderizarListaConfiguracao();
  document.getElementById("modalConfiguracao").classList.add("show");
}

function fecharModalConfiguracao(){
  document.getElementById("modalConfiguracao").classList.remove("show");
}

function adicionarTarefaConfiguracao(){
  const nome = document.getElementById("novaTarefaTexto").value.trim();
  const descricao = document.getElementById("novaTarefaDescricao").value.trim();
  const hora = formatarHorarioRotina(document.getElementById("novaTarefaHora").value);

  if(!nome){
    alert("Escreva o nome da opção.");
    return;
  }

  const cfg = getConfigTarefas();

  cfg.custom.push({
    id:`custom_${Date.now()}`,
    nome,
    descricao,
    hora
  });

  salvarConfigTarefas(cfg);
  renderizarListaConfiguracao();
  renderizarTarefas();

  document.getElementById("novaTarefaTexto").value = "";
  document.getElementById("novaTarefaDescricao").value = "";
  document.getElementById("novaTarefaHora").value = "";
}

function renderizarListaConfiguracao(){
  const lista = document.getElementById("listaConfigTarefas");
  lista.innerHTML = "";

  tarefasBloco().forEach(tarefa => {
    const item = document.createElement("div");
    item.className = "configItem";

    const texto = document.createElement("div");
    texto.className = "configTexto";
    const nomeLimpo = String(tarefa.nome || "")
  .replace(/<br>/g, "\n")
  .replace(/<[^>]*>/g, "")
  .replace(/\n+/g, "\n");

texto.textContent = `${nomeLimpo}\n${tarefa.hora || ""}`;

    const botoes = document.createElement("div");
    botoes.className = "configBotoes";

    const editar = document.createElement("button");
    editar.textContent = "editar";
    editar.onclick = () => editarTarefa(tarefa.id);

    const retirar = document.createElement("button");
    retirar.textContent = "retirar";
    retirar.onclick = () => excluirTarefa(tarefa.id);

    botoes.appendChild(editar);
    botoes.appendChild(retirar);

    item.appendChild(texto);
    item.appendChild(botoes);
    lista.appendChild(item);
  });
}

function editarTarefa(id){
  const senha = prompt("Digite a senha:");

  if(senha !== "1234"){
    alert("Senha incorreta");
    return;
  }

  const cfg = getConfigTarefas();
  const tarefa = tarefasBloco().find(t => t.id === id);
  if(!tarefa) return;

  const novoNome = prompt("Novo nome:", String(tarefa.nome || "").replace(/<[^>]*>/g, ""));
  if(novoNome === null) return;

  const novaDescricao = prompt("Nova descrição:", tarefa.descricao || "");
  if(novaDescricao === null) return;

  const novaHora = prompt("Novo horário:", tarefa.hora || "");
  if(novaHora === null) return;

  if(id.startsWith("custom_")){
    const itemCustom = cfg.custom.find(t => t.id === id);
    if(itemCustom){
      itemCustom.nome = novoNome.trim();
      itemCustom.descricao = novaDescricao.trim();
      itemCustom.hora = formatarHorarioRotina(novaHora);
    }
  }else{
    cfg.editadas[id] = {
      nome: novoNome.trim(),
      descricao: novaDescricao.trim(),
      hora: formatarHorarioRotina(novaHora)
    };
  }

  salvarConfigTarefas(cfg);
  renderizarListaConfiguracao();
  renderizarTarefas();
}

function excluirTarefa(id){
  const senha = prompt("Digite a senha:");

  if(senha !== "1234"){
    alert("Senha incorreta");
    return;
  }

  const cfg = getConfigTarefas();

  if(id.startsWith("custom_")){
    cfg.custom = cfg.custom.filter(t => t.id !== id);
  }else{
    if(!cfg.removidas.includes(id)){
      cfg.removidas.push(id);
    }
  }

  salvarConfigTarefas(cfg);
  renderizarListaConfiguracao();
  renderizarTarefas();
}

function iniciarTela(){
  atualizarLinhaTempo();
  renderizarTarefas();
}

window.addEventListener("load", () => {
  iniciarTela();
  setInterval(atualizarLinhaTempo, 1000);
});

window.addEventListener("pageshow", () => {
  atualizarLinhaTempo();
  renderizarTarefas();
});

window.addEventListener("focus", () => {
  atualizarLinhaTempo();
  renderizarTarefas();
});

window.addEventListener("storage", () => {
  renderizarTarefas();
  atualizarLinhaTempo();
});
</script>
