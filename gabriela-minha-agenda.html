<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agenda Gabriela</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<style>
:root{
  --verde-principal:#E6F2E5;
  --verde-hover:#D6EAD4;
  --verde-texto:#3F6F4F;
  --verde-escuro:#5C9D5C;
  --fundo:#F6F7F5;
  --card:#FFFFFF;
  --texto-principal:#2F2F2F;
  --texto-secundario:#7A8178;
  --borda:#E3E5E1;
  --amarelo:#F6D76B;
  --fonte:'Poppins',sans-serif;
  --titulo:21px;
  --sombra-suave:0 10px 30px rgba(63,111,79,0.08);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:var(--fonte);
  background:var(--fundo);
  color:var(--texto-principal);
  display:flex;
  justify-content:center;
  padding:20px 14px;
}

.pagina{width:100%;max-width:420px;}

.card{
  width:100%;
  background:var(--card);
  border-radius:28px;
  padding:20px 16px 18px;
  box-shadow:var(--sombra-suave);
  border:1px solid rgba(227,229,225,0.8);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.topo{
  display:grid;
  grid-template-columns:42px 1fr 64px;
  align-items:start;
  gap:10px;
}

.botao-voltar{
  border:none;
  background:#EEF1EC;
  border-radius:14px;
  width:42px;
  height:42px;
  cursor:pointer;
  font-size:18px;
  font-family:var(--fonte);
  color:var(--texto-principal);
}

.topCenter{text-align:center;padding-top:3px;}

.titleIndex{
  font-size:var(--titulo);
  font-weight:400;
  line-height:1.15;
}

.subtitulo{
  font-size:12px;
  color:var(--texto-secundario);
  margin-top:3px;
}

.dataTopo{
  min-height:42px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  text-align:right;
  color:var(--texto-secundario);
  line-height:1.1;
  padding-top:2px;
}

.horaTopo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  margin-bottom:3px;
}

.dataTopoLinha{font-size:11px;white-space:nowrap;}

.eventosBox{
  background:#F8FAF7;
  border:1px solid var(--borda);
  border-radius:16px;
  padding:14px;
  text-align:center;
}

.eventosTitulo{
  font-size:14px;
  color:var(--verde-texto);
  margin-bottom:6px;
  font-weight:500;
}

.botoesAgenda{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.botoesAgenda .botao{
  min-height:46px;
  padding:10px 8px;
  border-radius:16px;
  font-size:12px;
  font-weight:400;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.25;
}

.botao{
  width:100%;
  border:none;
  border-radius:20px;
  background:var(--verde-principal);
  color:var(--verde-texto);
  padding:15px 14px;
  font-size:14px;
  font-family:var(--fonte);
  cursor:pointer;
  transition:0.2s ease;
  text-align:center;
}

.botao:hover{background:var(--verde-hover);}

.botao.secundario{
  background:#EEF1EC;
  color:var(--texto-secundario);
}

.botao.pequeno{
  padding:11px 12px;
  border-radius:14px;
  font-size:12px;
}

.botoesPeriodo{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.botaoPeriodo{
  border:none;
  background:#EEF1EC;
  color:var(--texto-secundario);
  border-radius:14px;
  padding:10px 8px;
  font-size:12px;
  font-family:var(--fonte);
  cursor:pointer;
}

.botaoPeriodo.ativo{
  background:var(--verde-principal);
  color:var(--verde-texto);
}

.listaEventos{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:8px;
}

.evento{
  background:#FFFFFF;
  border:1px solid var(--borda);
  border-radius:14px;
  padding:10px 12px;
  text-align:left;
}

.evento.proximoDia{
  border-color:#F0CC58;
  background:#FFFDF2;
  box-shadow:inset 0 -5px 0 rgba(246,215,107,0.55);
}

.evento.rotina{
  background:#F9FBF8;
}

.evento.agenda{
  border-left:5px solid var(--verde-escuro);
  background:#FFFFFF;
}

.eventoHora{
  font-size:11px;
  color:var(--verde-texto);
  font-weight:500;
  margin-bottom:4px;
}

.eventoTitulo{
  font-size:13px;
  color:var(--texto-principal);
  line-height:1.35;
}

.eventoLocal{
  font-size:11px;
  color:var(--texto-secundario);
  margin-top:3px;
  line-height:1.35;
}

.rotinaTag{
  display:inline-block;
  margin-top:6px;
  background:var(--verde-principal);
  color:var(--verde-texto);
  border-radius:999px;
  padding:3px 8px;
  font-size:10px;
}

.listaVazia{
  font-size:12px;
  color:var(--texto-secundario);
  line-height:1.5;
  padding:6px 0;
}

.diaMesGrupo{
  background:#FFFFFF;
  border:1px solid var(--borda);
  border-radius:14px;
  padding:9px 10px;
  text-align:left;
}

.diaMesTitulo{
  font-size:11px;
  color:var(--verde-texto);
  font-weight:500;
  margin-bottom:5px;
}

.eventoMesLinha{
  font-size:11px;
  color:var(--texto-principal);
  line-height:1.35;
  margin-top:3px;
}

.eventoMesHora{
  color:var(--verde-texto);
  font-weight:500;
}

.footerMiniAction{
  display:flex;
  justify-content:center;
  margin-top:4px;
}

.futureBtn{
  border:none;
  background:#E9ECE7;
  color:var(--texto-secundario);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
}

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
  z-index:999;
}

.modalOverlay.show{display:flex;}

.modal{
  background:#fff;
  padding:18px;
  border-radius:20px;
  width:min(360px, 100%);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.modalTitle{
  text-align:center;
  font-size:18px;
  color:var(--texto-principal);
  font-weight:500;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:13px;
  color:var(--texto-principal);
}

textarea{
  width:100%;
  height:220px;
  border-radius:12px;
  border:1px solid var(--borda);
  padding:12px;
  font-family:var(--fonte);
  resize:none;
}

.modalBtns{
  display:flex;
  gap:8px;
}

.modalBtns button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  font-family:var(--fonte);
  cursor:pointer;
}

.cancel{background:#efefef;color:#333;}
.save{background:var(--verde-escuro);color:#fff;}

@media print{
  body{background:#fff;padding:0;}
  .topo,.botoesAgenda,.footerMiniAction,.modalOverlay{display:none!important;}
  .pagina{max-width:100%;padding:0;}
  .card{box-shadow:none;border:none;border-radius:0;padding:12px;}
  .eventosBox{border:none;background:#fff;padding:0;}
}

@media (max-width:390px){
  body{padding:16px 12px;}
  .card{padding:18px 14px 16px;}
  .topo{grid-template-columns:40px 1fr 58px;}
  .titleIndex{font-size:20px;}
}

body.agenda-ajustada .eventosBox{

@media(max-width:390px){

</style>
</head>

<body class="agenda-ajustada agenda-gabriela">

<div class="pagina">
  <div class="card">

    <div class="topo">
      <button class="botao-voltar" onclick="location.href='agenda-menu.html'">←</button>

      <div class="topCenter">
        <div class="titleIndex">Agenda Gabriela</div>
        <div class="subtitulo">seus compromissos em um só lugar</div>
      </div>

      <div class="dataTopo">
        <div id="linhaTempoHora" class="horaTopo"></div>
        <div id="linhaTempoDia" class="dataTopoLinha"></div>
        <div id="linhaTempoData" class="dataTopoLinha"></div>
      </div>
    </div>

    <div class="botoesPeriodo">
      <button class="botaoPeriodo ativo" id="btnHoje" onclick="carregarPeriodo('hoje')">Hoje</button>
      <button class="botaoPeriodo" id="btnSemana" onclick="carregarPeriodo('semana')">Semana</button>
      <button class="botaoPeriodo" id="btnMes" onclick="carregarPeriodo('mes')">Mês</button>
    </div>

    <div class="eventosBox">
      <div class="eventosTitulo" id="tituloEventos">Compromissos de hoje</div>
      <div class="listaEventos" id="listaEventos">
        <div class="listaVazia">Carregando compromissos e rotina...</div>
      </div>
    </div>

    <div class="botoesAgenda">
      <button class="botao" onclick="conectarGoogle()">🔐 Conectar agenda</button>
      <button class="botao pequeno" onclick="atualizarEventos()">🔄 Atualizar compromissos</button>
      <button class="botao pequeno" id="btnPdf" onclick="gerarPDF()">📄 Salvar em PDF</button>
      <button class="botao secundario pequeno" onclick="abrirAgendaGeral()">Abrir Google Agenda</button>
    </div>

    <div class="footerMiniAction">
      <button class="futureBtn" onclick="abrirModalFuturasEdicoes()">futuras edições</button>
    </div>

  </div>
</div>

<div class="modalOverlay" id="modalFuturasEdicoes">
  <div class="modal">
    <div class="modalTitle">Futuras edições</div>

    <div class="field">
      <label>Ideias de melhorias futuras</label>
      <textarea id="futurasEdicoesTexto" placeholder="Escreva aqui suas ideias para melhorar essa tela..."></textarea>
    </div>

    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalFuturasEdicoes()">Cancelar</button>
      <button class="save" onclick="salvarFuturasEdicoes()">Concluir</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalGrupoRotina">
  <div class="modal">
    <div class="modalTitle" id="modalGrupoRotinaTitulo">Rotina</div>

    <div id="listaModalGrupoRotina" style="display:flex; flex-direction:column; gap:8px;"></div>

    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalGrupoRotina()">Cancelar</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalCriacaoArtisticaAgenda">
  <div class="modal">
    <div class="modalTitle">Criação artística de sonhos</div>

    <div style="font-size:13px; color:var(--texto-secundario); text-align:center; line-height:1.5;">
      Escolha o que deseja fazer agora.
    </div>

    <div class="modalBtns" style="flex-direction:column;">
      <button class="botao pequeno" onclick="abrirProjetosPelaAgenda()">abrir projetos</button>
      <button class="save" onclick="concluirCriacaoArtisticaPelaAgenda()">concluir tarefa</button>
      <button class="cancel" onclick="fecharModalCriacaoArtisticaAgenda()">cancelar</button>
    </div>
  </div>
</div>

<script>
const CHAVE_FUTURAS_EDICOES_MINHA_AGENDA = "futuras_edicoes_minha_agenda";

const CLIENT_ID = "378836858096-2f5t7cg7qpjvc8jqgo284vv2e0teq5q3.apps.googleusercontent.com";
const API_KEY = "AIzaSyAaIWEklGpnE0Ln7kwTWSWIp36vCEcEDfU";

const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest";
const SCOPES = "https://www.googleapis.com/auth/calendar.readonly";

let tokenClient = null;
let gapiIniciado = false;
let gisIniciado = false;
let periodoAtual = "hoje";
let dataReferenciaAtual = new Date().toDateString();
let eventosAgendaCache = [];

function pad2(numero){
  return String(numero).padStart(2, "0");
}

function atualizarLinhaTempo(){
  const agora = new Date();
  const diasCurtos = ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"];

  document.getElementById("linhaTempoHora").textContent =
    `${pad2(agora.getHours())}:${pad2(agora.getMinutes())}`;

  document.getElementById("linhaTempoDia").textContent =
    `• ${diasCurtos[agora.getDay()]}`;

  document.getElementById("linhaTempoData").textContent =
    `• ${pad2(agora.getDate())}/${pad2(agora.getMonth()+1)}`;

  verificarViradaDoDia();
}

function verificarViradaDoDia(){
  const hoje = new Date().toDateString();

  if(hoje !== dataReferenciaAtual){
    dataReferenciaAtual = hoje;
    carregarPeriodo("hoje");
  }
}

function gapiLoaded(){
  gapi.load("client", async () => {
    await gapi.client.init({
      apiKey:API_KEY,
      discoveryDocs:[DISCOVERY_DOC]
    });

    gapiIniciado = true;
    tentarCarregarAutomaticamente();
  });
}

function gisLoaded(){
tokenClient = google.accounts.oauth2.initTokenClient({
  client_id:CLIENT_ID,
  scope:SCOPES,
  hint:"gabrielachaves.psi@gmail.com",
  callback:""
});

  gisIniciado = true;
  tentarCarregarAutomaticamente();
}

function tentarCarregarAutomaticamente(){
  if(!gapiIniciado || !gisIniciado || !tokenClient) return;

  tokenClient.callback = async (resp) => {
    if(resp && resp.error){
      renderizarEventos([], periodoAtual);
      return;
    }

    await carregarEventos(periodoAtual);
  };

  try{
    tokenClient.requestAccessToken({prompt:""});
  }catch(e){
    renderizarEventos([], periodoAtual);
  }
}

function conectarGoogle(){
  if(!gapiIniciado || !gisIniciado || !tokenClient){
    return;
  }

  tokenClient.callback = async (resp) => {
    if(resp && resp.error){
      renderizarEventos([], periodoAtual);
      return;
    }

    await carregarEventos(periodoAtual);
  };

  tokenClient.requestAccessToken({prompt:"consent"});
}

function inicioFimPeriodo(periodo){
  const agora = new Date();
  let inicio;
  let fim;

  if(periodo === "hoje"){
    inicio = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate(), 0,0,0);
    fim = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate()+1, 0,0,0);
  }

  if(periodo === "semana"){
    const diaSemana = agora.getDay();
    const diferencaSegunda = diaSemana === 0 ? -6 : 1 - diaSemana;
    inicio = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate()+diferencaSegunda, 0,0,0);
    fim = new Date(inicio.getFullYear(), inicio.getMonth(), inicio.getDate()+7, 0,0,0);
  }

  if(periodo === "mes"){
    inicio = new Date(agora.getFullYear(), agora.getMonth(), 1, 0,0,0);
    fim = new Date(agora.getFullYear(), agora.getMonth()+1, 1, 0,0,0);
  }

  return {inicio,fim};
}

function tituloPeriodo(periodo){
  if(periodo === "hoje") return "Compromissos de hoje";
  if(periodo === "semana") return "Compromissos da semana";
  return "Compromissos do mês";
}

function marcarBotaoPeriodo(periodo){
  document.getElementById("btnHoje").classList.toggle("ativo", periodo === "hoje");
  document.getElementById("btnSemana").classList.toggle("ativo", periodo === "semana");
  document.getElementById("btnMes").classList.toggle("ativo", periodo === "mes");
}

async function carregarPeriodo(periodo){
  periodoAtual = periodo;
  marcarBotaoPeriodo(periodo);
  document.getElementById("tituloEventos").textContent = tituloPeriodo(periodo);

  if(!gapi.client.getToken()){
    renderizarEventos([], periodo);
    return;
  }

  await carregarEventos(periodo);
}

async function carregarEventos(periodo){
  if(!gapi.client.getToken()){
    renderizarEventos([], periodo);
    return;
  }

  const {inicio,fim} = inicioFimPeriodo(periodo);

  try{
    const calendariosResponse = await gapi.client.calendar.calendarList.list({
      minAccessRole:"reader",
      showHidden:true
    });

    const calendarios = calendariosResponse.result.items || [];
    let todosEventos = [];

    for(const calendario of calendarios){
      try{
        const resposta = await gapi.client.calendar.events.list({
          calendarId:calendario.id,
          timeMin:inicio.toISOString(),
          timeMax:fim.toISOString(),
          showDeleted:false,
          singleEvents:true,
          maxResults:100,
          orderBy:"startTime"
        });

        const eventos = resposta.result.items || [];
        eventos.forEach(evento => evento.nomeCalendario = calendario.summary || "Agenda");
        todosEventos = todosEventos.concat(eventos);
      }catch(e){}
    }

    todosEventos = todosEventos.filter(evento => {
      const inicioEvento = new Date(evento.start.dateTime || evento.start.date);
      return inicioEvento >= inicio && inicioEvento < fim;
    });

    todosEventos.sort((a,b) => {
      return new Date(a.start.dateTime || a.start.date) - new Date(b.start.dateTime || b.start.date);
    });

    eventosAgendaCache = todosEventos;
    renderizarEventos(todosEventos, periodo);
  }catch(error){
    renderizarEventos([], periodo);
  }
}

function formatarHoraEvento(evento){
  if(evento.start.date && !evento.start.dateTime) return "Dia todo";

  const inicio = new Date(evento.start.dateTime);
  const fim = new Date(evento.end.dateTime);

  return `${pad2(inicio.getHours())}:${pad2(inicio.getMinutes())} - ${pad2(fim.getHours())}:${pad2(fim.getMinutes())}`;
}

function normalizarHora(horaTexto){
  const limpo = String(horaTexto || "").toLowerCase().replace("m", "");
  const partes = limpo.split("h");
  const h = Number(partes[0] || 0);
  const m = Number(partes[1] || 0);
  const hoje = new Date();
  return new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate(), h, m, 0);
}

function chaveDataHoje(chaveBase){
  const h = new Date();
  return `${chaveBase}_${h.getFullYear()}-${pad2(h.getMonth()+1)}-${pad2(h.getDate())}`;
}

function lerEstadoRotina(chaveBase, tamanho){
  try{
    const salvo = localStorage.getItem(chaveDataHoje(chaveBase));
    if(!salvo) return Array(tamanho).fill(false);
    const estado = JSON.parse(salvo);
    return Array.isArray(estado) ? estado : Array(tamanho).fill(false);
  }catch(e){
    return Array(tamanho).fill(false);
  }
}

function marcarProximoCompromissoDoDia(itens, periodo){
  itens.forEach(item => item._proximoDoDia = false);

  if(periodo !== "hoje") return;

  const agora = new Date();

  const proximos = itens
    .filter(item => item.inicio >= agora)
    .sort((a,b) => a.inicio - b.inicio);

  if(proximos.length){
    proximos[0]._proximoDoDia = true;
  }
}

function renderizarEventos(eventosAgenda, periodo){
  const lista = document.getElementById("listaEventos");
  lista.innerHTML = "";

  if(periodo === "hoje"){
const rotina = obterRotinaDoDia();
const agenda = eventosAgenda.map(converterEventoAgenda);
const rotinaAgrupada = agruparRotinaPorHorario(rotina);
const itens = agenda.concat(rotinaAgrupada).sort((a,b) => a.inicio - b.inicio);

    marcarProximoCompromissoDoDia(itens, periodo);

    if(!itens.length){
      lista.innerHTML = `<div class="listaVazia">Nenhum compromisso encontrado.</div>`;
      return;
    }

    itens.forEach(item => {
      const div = document.createElement("div");

let classes = "evento";

if(item.tipo === "agenda") classes += " agenda";
if(item.tipo === "rotinaGrupo") classes += " rotina";
if(item._proximoDoDia) classes += " proximoDia";

      div.className = classes;

if(item.tipo === "rotinaGrupo"){
  div.className = "evento rotina" + (item._proximoDoDia ? " proximoDia" : "");

  div.onclick = () => abrirModalGrupoRotina(item);

  const nomes = item.tarefas.map(t => t.summary).join("<br>");

  div.innerHTML = `
    <div class="eventoHora">${item.horaTexto}</div>
    <div class="eventoTitulo">${nomes}</div>
    <div class="eventoLocal">Rotina • ${item.bloco}</div>
    <span class="rotinaTag" onclick="event.stopPropagation(); location.href='${item.link}'" style="cursor:pointer;">abrir rotina</span>
  `;
}else{
        div.innerHTML = `
          <div class="eventoHora">${item.horaTexto}</div>
          <div class="eventoTitulo">${item.summary}</div>
          ${item.location ? `<div class="eventoLocal">${item.location}</div>` : ""}
        `;
      }

      lista.appendChild(div);
    });

    return;
  }

  if(!eventosAgenda.length){
    lista.innerHTML = `<div class="listaVazia">Nenhum compromisso encontrado.</div>`;
    return;
  }

  const grupos = {};

  eventosAgenda.forEach(evento => {
    const data = new Date(evento.start.dateTime || evento.start.date);
    const chave = `${pad2(data.getDate())}/${pad2(data.getMonth()+1)}`;
    if(!grupos[chave]) grupos[chave] = [];
    grupos[chave].push(evento);
  });

  Object.entries(grupos).forEach(([data, eventosDia]) => {
    const grupo = document.createElement("div");
    grupo.className = "diaMesGrupo";

    let html = `<div class="diaMesTitulo">${data}</div>`;

    eventosDia.forEach(evento => {
      html += `
        <div class="eventoMesLinha">
          <span class="eventoMesHora">${formatarHoraEvento(evento)}</span> • ${evento.summary || "Sem título"}
        </div>
      `;
    });

    grupo.innerHTML = html;
    lista.appendChild(grupo);
  });
}

<script>
/* =========================================================
   LEMBRETE DE SINCRONIZAÇÃO DA NUVEM — A CADA 15 DIAS
   ========================================================= */
(function(){
  const CHAVE_ULTIMA_SINCRONIZACAO_NUVEM = "jardim_anotacoes_ultima_sincronizacao_nuvem";
  const CHAVE_INICIO_LEMBRETE_NUVEM = "jardim_anotacoes_inicio_lembrete_nuvem";

  function diasDesdeDataISO(dataISO){
    if(!dataISO) return null;

    const data = new Date(dataISO);
    if(Number.isNaN(data.getTime())) return null;

    const agora = new Date();
    const diff = agora.getTime() - data.getTime();

    return Math.floor(diff / (1000 * 60 * 60 * 24));
  }

  function verificarLembreteSincronizacaoNuvem(){
    const ultima = localStorage.getItem(CHAVE_ULTIMA_SINCRONIZACAO_NUVEM);
    const inicio = localStorage.getItem(CHAVE_INICIO_LEMBRETE_NUVEM);

    if(!ultima && !inicio){
      localStorage.setItem(CHAVE_INICIO_LEMBRETE_NUVEM, new Date().toISOString());
      return;
    }

    const referencia = ultima || inicio;
    const dias = diasDesdeDataISO(referencia);

    if(dias === null || dias < 15) return;

    setTimeout(function(){
      const abrir = confirm(
        "Lembrete da nuvem 🌿\n\n" +
        "Já faz 15 dias ou mais desde a última sincronização das suas anotações.\n\n" +
        "Quer abrir a página de Anotações para sincronizar agora?"
      );

      localStorage.setItem(CHAVE_INICIO_LEMBRETE_NUVEM, new Date().toISOString());

      if(abrir){
        window.location.href = "anotacao.html";
      }
    }, 900);
  }

  window.addEventListener("load", verificarLembreteSincronizacaoNuvem);
})();
</script>


<script>
/* Integração direta das refeições do Jejum Intermitente */
(function(){
  const CHAVE_REFEICOES = "jejum_rotina_refeicoes_v1";
  const CHAVE_CONCLUIDAS = "jejum_refeicoes_concluidas";

  function hojeISO(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  function chaveConcluidas(){
    return `${CHAVE_CONCLUIDAS}_${hojeISO()}`;
  }

  function lerRefeicoes(){
    try{
      const dados = JSON.parse(localStorage.getItem(CHAVE_REFEICOES) || "{}");
      return Array.isArray(dados.itens) ? dados.itens : [];
    }catch(e){
      return [];
    }
  }

  function lerConcluidas(){
    try{
      const valor = JSON.parse(localStorage.getItem(chaveConcluidas()) || "[]");
      return Array.isArray(valor) ? valor : [];
    }catch(e){
      return [];
    }
  }

  function estaConcluida(indice){
    return !!lerConcluidas()[indice];
  }

  function definirConcluida(indice, valor){
    const estado = lerConcluidas();
    while(estado.length < 3) estado.push(false);
    estado[indice] = !!valor;
    localStorage.setItem(chaveConcluidas(), JSON.stringify(estado));
  }

  function minutos(hora){
    const m = String(hora || "").match(/(\d{1,2})\D?(\d{2})?/);
    return m ? Number(m[1]) * 60 + Number(m[2] || 0) : 9999;
  }

  window.JejumIntegracao = {
    lerRefeicoes, lerConcluidas, estaConcluida, definirConcluida, minutos
  };
})();
</script>

<script>

      );

        bloco:"Jejum Intermitente",

        chave:"jejum_refeicoes_concluidas",
        indice,
        total:3,
        modo:"normal"
      });
    });

    return rotina.sort((a,b) => a.inicio - b.inicio);
  };

  window.addEventListener("focus", () => {
    if(typeof window.renderizarEventos === "function" && typeof window.eventosAgendaCache !== "undefined"){
      window.renderizarEventos(window.eventosAgendaCache, "hoje");
    }
  });
})();
</script>


<script>
/* Integração das metas de água do Jejum Intermitente */
(function(){
  const CHAVE_AGUA="jejum_rotina_agua_v1";
  const CHAVE_CONCLUIDAS="jejum_agua_concluida";
  function hojeISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
  function chaveConcluidas(){return `${CHAVE_CONCLUIDAS}_${hojeISO()}`}
  function lerItens(){try{const d=JSON.parse(localStorage.getItem(CHAVE_AGUA)||"{}");return Array.isArray(d.itens)?d.itens:[]}catch(e){return []}}
  function lerConcluidas(){try{const v=JSON.parse(localStorage.getItem(chaveConcluidas())||"[]");return Array.isArray(v)?v:[]}catch(e){return []}}
  function estaConcluida(i){return !!lerConcluidas()[i]}
  function definirConcluida(i,v){const e=lerConcluidas();while(e.length<3)e.push(false);e[i]=!!v;localStorage.setItem(chaveConcluidas(),JSON.stringify(e))}
  function minutos(h){const m=String(h||"").match(/(\d{1,2})\D?(\d{2})?/);return m?Number(m[1])*60+Number(m[2]||0):9999}
  window.AguaJejumIntegracao={lerItens,lerConcluidas,estaConcluida,definirConcluida,minutos};
})();
</script>

<script>
(function(){
  if(typeof window.obterRotinaDoDia!=="function")return;
  const original=window.obterRotinaDoDia;
  window.obterRotinaDoDia=function(){
    const rotina=original.apply(this,arguments),itens=AguaJejumIntegracao.lerItens(),concluidas=AguaJejumIntegracao.lerConcluidas();
    itens.forEach((item,indice)=>{
      if(concluidas[indice])return;
      const agora=new Date(),mins=AguaJejumIntegracao.minutos(item.hora);
      const inicio=new Date(agora.getFullYear(),agora.getMonth(),agora.getDate(),Math.floor(mins/60),mins%60,0,0);
      rotina.push({tipo:"rotina",summary:item.nome,horaTexto:item.hora,inicio,bloco:"Consumo de água",link:item.destino||"jejum-intermitente.html",chave:"jejum_agua_concluida",indice,total:3,modo:"normal"});
    });
    return rotina.sort((a,b)=>a.inicio-b.inicio);
  };
  window.addEventListener("focus",()=>{if(typeof window.renderizarEventos==="function"&&typeof window.eventosAgendaCache!=="undefined")window.renderizarEventos(window.eventosAgendaCache,"hoje")});
})();
</script>
