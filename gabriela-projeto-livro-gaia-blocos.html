<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blocos • Livro de Gaia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --verde-principal:#E6F2E5;
  --verde-hover:#D6EAD4;
  --verde-texto:#3F6F4F;
  --verde-escuro:#5C9D5C;

  --fundo:#F6F7F5;
  --card:#FFFFFF;

  --texto-principal:#2F2F2F;
  --texto-secundario:#6B6B6B;
  --borda:#E3E5E1;

  --fonte:'Poppins',sans-serif;

  --titulo:20px;
  --botao:15px;

  --sombra-suave:0 4px 12px rgba(0,0,0,0.05);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  font-family:var(--fonte);
  background:var(--fundo);
  color:var(--texto-principal);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:16px;
}

.pagina{
  width:100%;
  max-width:420px;
}

.card{
  width:100%;
  background:var(--card);
  border-radius:24px;
  padding:22px 16px 18px;
  box-shadow:var(--sombra-suave);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.topo{
  display:grid;
  grid-template-columns:40px 1fr 58px;
  align-items:start;
  gap:8px;
  margin-bottom:6px;
}

.botao-voltar{
  border:none;
  background:#E9ECE7;
  color:var(--texto-principal);
  border-radius:12px;
  width:40px;
  height:40px;
  cursor:pointer;
  font-size:18px;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  padding:0;
  transition:0.2s ease;
}

.botao-voltar:hover{
  background:#dde3d9;
}

.botao-voltar span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  transform:translateY(-1px);
}

.topCenter{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:0;
  padding-top:2px;
}

.titleIndex{
  color:var(--texto-principal);
  font-weight:500;
  font-size:var(--titulo);
  margin:0;
  line-height:1.2;
  text-align:center;
}

.subtitulo{
  font-size:11px;
  color:var(--texto-secundario);
  margin-top:2px;
  text-align:center;
  line-height:1.35;
}

.dataTopo{
  min-height:40px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
  text-align:right;
  color:var(--texto-secundario);
  line-height:1.1;
  padding-top:1px;
}

.horaTopo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  white-space:nowrap;
  margin-bottom:2px;
}

.dataTopoLinha{
  font-size:11px;
  white-space:nowrap;
}

.botoes-lista{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.botao{
  width:100%;
  border:none;
  background:var(--verde-principal);
  color:var(--verde-texto);
  border-radius:16px;
  padding:0 16px;
  font-size:var(--botao);
  font-family:var(--fonte);
  cursor:pointer;
  transition:0.2s ease;
  min-height:84px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.botao:hover{
  background:var(--verde-hover);
}

.conteudo-botao{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  transform:translateY(1px);
}

.nome-botao{
  font-size:14px;
  color:var(--verde-texto);
  text-align:center;
  line-height:1.35;
  font-weight:500;
  margin:0;
}

.proxima-tarefa{
  margin-top:4px;
  font-size:11px;
  color:rgba(63,111,79,0.72);
  text-align:center;
  line-height:1.3;
  margin-bottom:0;
}

.horario-proxima{
  display:none;
}

.footerMiniAction{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:4px;
  flex-wrap:wrap;
}

.futureBtn{
  border:none;
  background:#E9ECE7;
  color:var(--texto-secundario);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
  transition:0.2s ease;
}

.futureBtn:hover{
  background:#dde3d9;
  color:var(--texto-principal);
}

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  justify-content:center;
  align-items:flex-start;
  padding:16px;
  z-index:999;
  overflow-y:auto;
}

.modalOverlay.show{
  display:flex;
}

.modal{
  background:#fff;
  padding:18px;
  border-radius:20px;
  width:min(360px, 100%);
  max-height:calc(100vh - 32px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
}

.modalTitle{
  font-size:18px;
  color:var(--texto-principal);
  text-align:center;
  font-weight:500;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:13px;
  color:var(--texto-principal);
  font-family:var(--fonte);
  font-weight:500;
}

textarea{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  height:260px;
  resize:none;
  outline:none;
}

textarea:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
}

.modalBtns{
  display:flex;
  gap:8px;
}

.modalBtns button{
  flex:1;
  padding:11px 12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:12.5px;
  transition:0.2s ease;
}

.cancel{
  background:#efefef;
  color:#333;
}

.cancel:hover{
  background:#e7e7e7;
}

.save{
  background:var(--verde-escuro);
  color:white;
}

.save:hover{
  background:#4f8a4f;
}

@media (max-width: 390px){
  body{
    padding:14px;
  }

  .card{
    padding:20px 14px 16px;
  }

  .titleIndex{
    font-size:19px;
  }

  .topo{
    grid-template-columns:40px 1fr 54px;
  }

  .horaTopo{
    font-size:13px;
  }

  .dataTopoLinha{
    font-size:10.5px;
  }

  .subtitulo{
    font-size:10.5px;
  }
}

/* =========================================================
   VISUAL SYSTEM GABRIELA — inspirado no index, com identidade própria
   ========================================================= */

:root{
  --gabi-fundo:#F8F7F1;
  --gabi-card:#FFFDF8;
  --gabi-card-2:#F4F3EA;
  --gabi-salvia:#7F9271;
  --gabi-salvia-escuro:#516448;
  --gabi-texto:#2F332D;
  --gabi-suave:#77786F;
  --gabi-borda:#E8E1D4;
  --gabi-rosa:#E8C8BF;
  --gabi-sombra:0 10px 24px rgba(76, 82, 62, 0.10);
}

html, body{
  min-height:100%;
}

body{
  align-items:flex-start !important;
  padding:14px 12px 96px !important;
  background:
    radial-gradient(circle at 14% 4%, rgba(232,243,226,0.75), transparent 32%),
    radial-gradient(circle at 95% 16%, rgba(243,236,221,0.80), transparent 30%),
    linear-gradient(180deg, #FEFCF7 0%, var(--gabi-fundo) 100%) !important;
  color:var(--gabi-texto) !important;
  overflow-x:hidden;
}

.pagina{
  max-width:420px !important;
}

.card{
  background:rgba(255,253,248,0.92) !important;
  border:1px solid rgba(232,225,212,0.92) !important;
  border-radius:30px !important;
  padding:18px 14px 20px !important;
  gap:14px !important;
  box-shadow:0 14px 34px rgba(76,82,62,0.11) !important;
  overflow:hidden;
  position:relative;
}

.card::before{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  right:-80px;
  top:-70px;
  border-radius:50%;
  background:rgba(234,243,232,0.72);
  z-index:0;
}

.card::after{
  content:"";
  position:absolute;
  width:170px;
  height:170px;
  left:-95px;
  bottom:-65px;
  border-radius:50%;
  background:rgba(243,236,221,0.62);
  z-index:0;
}

.card > *{
  position:relative;
  z-index:1;
}

.topo{
  grid-template-columns:44px 1fr 82px !important;
  align-items:start !important;
  gap:8px !important;
  margin-bottom:2px !important;
}

.botao-voltar{
  width:42px !important;
  height:42px !important;
  border-radius:50% !important;
  background:rgba(255,255,255,0.86) !important;
  border:1px solid rgba(232,225,212,0.95) !important;
  color:var(--gabi-salvia-escuro) !important;
  box-shadow:0 6px 16px rgba(76,82,62,0.08) !important;
  font-size:20px !important;
}

.topCenter{
  padding-top:0 !important;
}

.titleIndex{
  color:#40513B !important;
  font-size:29px !important;
  font-weight:500 !important;
  line-height:1.05 !important;
  letter-spacing:-0.3px !important;
}

.titleIndex::after{
  content:" 🌿";
  font-size:18px;
  vertical-align:middle;
}

.subtitulo{
  color:var(--gabi-suave) !important;
  font-size:12px !important;
  margin-top:5px !important;
}

.dataTopo{
  color:#6F7469 !important;
  padding-top:0 !important;
}

.horaTopo{
  color:#B8807B !important;
  font-size:15px !important;
  font-weight:500 !important;
}

.dataTopoLinha{
  color:#5D6359 !important;
  font-size:10.5px !important;
}

/* Hero escolhido pela Gabriela */
.heroGabrielaVisual{
  min-height:190px;
  width:100%;
  border-radius:24px;
  background:
    radial-gradient(circle at 68% 38%, rgba(232,243,226,0.95), transparent 34%),
    linear-gradient(135deg, rgba(250,247,239,0.98), rgba(238,242,230,0.96));
  border:1px solid rgba(232,225,212,0.95);
  box-shadow:var(--gabi-sombra);
  overflow:hidden;
  display:grid;
  grid-template-columns:1.06fr 1fr;
  gap:4px;
  padding:20px 18px;
  position:relative;
  margin:4px 0 6px;
}

.heroGabrielaVisual::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg, rgba(255,255,255,0.34), transparent 45%),
    radial-gradient(circle at 96% 16%, rgba(255,255,255,0.58), transparent 30%);
  pointer-events:none;
}

.heroTextoGabriela{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}

.heroTituloGabriela{
  color:#5B6F50;
  font-size:24px;
  line-height:1.18;
  font-weight:400;
  letter-spacing:-0.4px;
}

.heroTituloGabriela em{
  font-style:italic;
  font-weight:500;
}

.heroDivisor{
  display:flex;
  align-items:center;
  gap:8px;
  margin:14px 0 12px;
  width:120px;
  color:#A1AB93;
}

.heroDivisor span{
  display:block;
  height:1px;
  flex:1;
  background:#D8CFBF;
}

.heroDivisor small{
  font-size:11px;
}

.heroTextoGabriela p{
  color:#6F7469;
  font-size:11.5px;
  line-height:1.5;
}

.heroIlustraGabriela{
  position:relative;
  min-height:150px;
  z-index:2;
}

.vasoGabriela{
  position:absolute;
  width:54px;
  height:66px;
  right:68px;
  bottom:35px;
  border-radius:24px 24px 18px 18px;
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.8), transparent 22%),
    linear-gradient(180deg, #E7D5BF, #CDB798);
  box-shadow:0 9px 17px rgba(96,83,57,0.14);
}

.folhasGabriela{
  position:absolute;
  right:88px;
  bottom:93px;
  width:92px;
  height:88px;
}

.folhasGabriela::before{
  content:"";
  position:absolute;
  left:47px;
  bottom:0;
  width:2px;
  height:90px;
  background:#7F9271;
  transform:rotate(-10deg);
  opacity:.85;
}

.folhasGabriela i{
  position:absolute;
  width:28px;
  height:15px;
  border-radius:28px 2px 28px 2px;
  background:#8FA281;
  opacity:.72;
}

.folhasGabriela i:nth-child(1){left:24px; bottom:18px; transform:rotate(30deg);}
.folhasGabriela i:nth-child(2){left:50px; bottom:28px; transform:rotate(-24deg);}
.folhasGabriela i:nth-child(3){left:12px; bottom:42px; transform:rotate(18deg);}
.folhasGabriela i:nth-child(4){left:56px; bottom:52px; transform:rotate(-18deg);}
.folhasGabriela i:nth-child(5){left:34px; bottom:67px; transform:rotate(20deg);}
.folhasGabriela i:nth-child(6){left:68px; bottom:75px; transform:rotate(-30deg);}

.velaGabriela{
  position:absolute;
  width:38px;
  height:34px;
  right:122px;
  bottom:22px;
  border-radius:12px 12px 9px 9px;
  background:linear-gradient(180deg, #FFF5DC, #EBD9B7);
  box-shadow:0 8px 13px rgba(96,83,57,0.10);
}

.velaGabriela::before{
  content:"";
  position:absolute;
  left:16px;
  top:-12px;
  width:8px;
  height:14px;
  border-radius:9px 9px 9px 9px;
  background:#E7B56B;
  box-shadow:0 0 10px rgba(231,181,107,.55);
}

.cadernoGabriela{
  position:absolute;
  width:92px;
  height:48px;
  right:6px;
  bottom:16px;
  border-radius:7px;
  background:linear-gradient(180deg, #A5B49A, #839577);
  transform:rotate(-8deg);
  box-shadow:0 10px 17px rgba(76,82,62,0.17);
}

.cadernoGabriela::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-8px;
  height:10px;
  border-radius:0 0 8px 8px;
  background:#E7DEC9;
  border-top:1px solid rgba(93,85,70,.18);
}

.canetaGabriela{
  position:absolute;
  width:76px;
  height:4px;
  right:17px;
  bottom:48px;
  border-radius:99px;
  background:#C59B65;
  transform:rotate(-17deg);
}

.brilhoGabriela{
  position:absolute;
  color:#D7B77B;
  opacity:.75;
  font-size:13px;
}

.brilhoGabriela.b1{right:11px; top:28px;}
.brilhoGabriela.b2{right:38px; top:66px;}

/* Lista de cards */
.botoes-lista{
  gap:9px !important;
}

.botao-wrap{
  border-radius:18px;
}

.check-concluido{
  top:50% !important;
  left:13px !important;
  transform:translateY(-50%);
  font-size:13px !important;
}

.botao{
  min-height:66px !important;
  height:auto !important;
  border-radius:18px !important;
  background:rgba(255,255,255,0.94) !important;
  border:1px solid rgba(232,225,212,0.92) !important;
  color:var(--gabi-texto) !important;
  box-shadow:0 7px 18px rgba(76,82,62,0.08) !important;
  padding:10px 42px 10px 74px !important;
  display:flex !important;
  flex-direction:column !important;
  justify-content:center !important;
  align-items:flex-start !important;
  text-align:left !important;
  position:relative !important;
  overflow:hidden;
}

.botao:hover{
  transform:translateY(-1px);
  background:#FFFDF8 !important;
  box-shadow:0 10px 22px rgba(76,82,62,0.12) !important;
}

.botao::before{
  content:"";
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border-radius:50%;
  background:#F4F0E7;
  border:1px solid rgba(232,225,212,0.78);
  box-shadow:0 5px 12px rgba(76,82,62,0.06);
}

.botao::after{
  content:"›";
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-54%);
  color:#6F7E63;
  font-size:31px;
  line-height:1;
  font-weight:300;
}

#wrap-bloco1 .botao::before{content:"♡"; color:#6D805F; font-size:24px; display:flex; align-items:center; justify-content:center;}
#wrap-bloco2 .botao::before{content:"✧"; color:#6D805F; font-size:26px; display:flex; align-items:center; justify-content:center;}
#wrap-bloco4 .botao::before{content:"♨"; color:#6D805F; font-size:22px; display:flex; align-items:center; justify-content:center;}
#wrap-bloco6 .botao::before{content:"✐"; color:#6D805F; font-size:24px; display:flex; align-items:center; justify-content:center;}
#wrap-bloco7 .botao::before{content:"☕"; color:#6D805F; font-size:22px; display:flex; align-items:center; justify-content:center;}
#wrap-bloco8 .botao::before{content:"☷"; color:#6D805F; font-size:22px; display:flex; align-items:center; justify-content:center;}

.nome-botao{
  color:#2F332D !important;
  text-align:left !important;
  font-size:16px !important;
  line-height:1.22 !important;
  font-weight:500 !important;
  letter-spacing:-0.2px;
}

.descricao-menu-visual{
  margin-top:4px;
  color:#77786F;
  font-size:11.5px;
  line-height:1.25;
  text-align:left;
}

.proxima-tarefa,
.alerta{
  text-align:left !important;
  margin-top:3px !important;
  color:rgba(81,100,72,0.72) !important;
  font-size:10.5px !important;
  line-height:1.25 !important;
}

.botao-wrap.concluido .botao{
  opacity:.72;
}

/* Lista por horário ajustada para combinar */
.horario-lista{
  gap:10px !important;
}

.horario-grupo,
.horario-card{
  border-radius:18px !important;
  border-color:rgba(232,225,212,0.92) !important;
  box-shadow:0 7px 18px rgba(76,82,62,0.06);
}

.horario-card{
  background:#FFFDF8 !important;
}

/* Rodapé de ações como cards */
.footerMiniAction{
  display:grid !important;
  grid-template-columns:1fr 1fr !important;
  gap:10px !important;
  margin-top:10px !important;
  padding-bottom:8px;
}

.futureBtn{
  min-height:64px !important;
  border-radius:18px !important;
  background:rgba(250,248,241,0.94) !important;
  border:1px solid rgba(216,207,191,0.95) !important;
  color:#40513B !important;
  font-size:13px !important;
  text-align:left !important;
  padding:12px 14px !important;
  box-shadow:0 6px 16px rgba(76,82,62,0.06);
  position:relative;
}

.futureBtn::after{
  content:"›";
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-52%);
  font-size:24px;
  color:#6F7E63;
}

.futureBtn:first-child::before{
  content:"⚙";
  margin-right:8px;
  color:#6D805F;
}

.futureBtn:last-child::before{
  content:"♡";
  margin-right:8px;
  color:#B8807B;
}

/* Modal recebe acabamento mais próximo do novo visual */
.modal{
  border-radius:24px !important;
  border:1px solid rgba(232,225,212,0.95);
  background:#FFFDF8 !important;
  box-shadow:0 16px 40px rgba(0,0,0,0.18) !important;
}

.modalTitle{
  color:#40513B !important;
}

.save{
  background:var(--gabi-salvia) !important;
}

.save:hover{
  background:var(--gabi-salvia-escuro) !important;
}

.cancel,
.futureBtn:hover,
.fecharModal,
.ordem-auto-btn,
.ordem-botoes button{
  background:#F1EEE6 !important;
}

/* Barra inferior conectada ao index */
.bottomNavGabriela{
  position:fixed;
  left:50%;
  bottom:12px;
  transform:translateX(-50%);
  width:min(420px, calc(100% - 24px));
  height:70px;
  background:rgba(255,253,248,0.96);
  border:1px solid rgba(232,225,212,0.92);
  border-radius:28px;
  box-shadow:0 12px 28px rgba(76,82,62,0.14);
  display:grid;
  grid-template-columns:1fr 1fr 68px 1fr 1fr;
  gap:2px;
  align-items:center;
  padding:8px 10px;
  z-index:800;
}

.navItemGabriela{
  border:none;

function abrirModalFuturasEdicoes(){
  document.getElementById("futurasEdicoesTexto").value =
    localStorage.getItem(CHAVE_FUTURAS_EDICOES_BLOCOS_GAIA) || "";
  document.getElementById("modalFuturasEdicoes").classList.add("show");
}

function fecharModalFuturasEdicoes(){
  document.getElementById("modalFuturasEdicoes").classList.remove("show");
}

function salvarFuturasEdicoes(){
  localStorage.setItem(
    CHAVE_FUTURAS_EDICOES_BLOCOS_GAIA,
    document.getElementById("futurasEdicoesTexto").value
  );
  fecharModalFuturasEdicoes();
}

function pad2(numero){
  return String(numero).padStart(2, "0");
}

function atualizarLinhaTempo(){
  const agora = new Date();
  const diasCurtos = ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"];

  document.getElementById("linhaTempoHora").textContent = `${pad2(agora.getHours())}:${pad2(agora.getMinutes())}`;
  document.getElementById("linhaTempoDia").textContent = `• ${diasCurtos[agora.getDay()]}`;
  document.getElementById("linhaTempoData").textContent = `• ${pad2(agora.getDate())}/${pad2(agora.getMonth()+1)}`;
}

window.addEventListener("load", () => {
  atualizarLinhaTempo();
  setInterval(atualizarLinhaTempo, 1000);
});
</script>


<script>
(function atualizarDataHoraPadraoGabriela(){
  function pad2(numero){
    return String(numero).padStart(2, "0");
  }

  function preencherDataHora(){
    const agora = new Date();
    const diasCurtos = ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"];

    const hora = pad2(agora.getHours()) + ":" + pad2(agora.getMinutes());
    const dia = "• " + diasCurtos[agora.getDay()];
    const data = "• " + pad2(agora.getDate()) + "/" + pad2(agora.getMonth() + 1);

    document.querySelectorAll("[data-hora-padrao]").forEach(el => el.textContent = hora);
    document.querySelectorAll("[data-dia-padrao]").forEach(el => el.textContent = dia);
    document.querySelectorAll("[data-data-padrao]").forEach(el => el.textContent = data);

    const horaAntiga = document.getElementById("linhaTempoHora");
    const diaAntigo = document.getElementById("linhaTempoDia");
    const dataAntiga = document.getElementById("linhaTempoData");

    if(horaAntiga) horaAntiga.textContent = hora;
    if(diaAntigo) diaAntigo.textContent = dia;
    if(dataAntiga) dataAntiga.textContent = data;
  }

  preencherDataHora();
  setInterval(preencherDataHora, 1000);
})();
</script>
