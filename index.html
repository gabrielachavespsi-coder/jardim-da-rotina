<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jardim da Rotina</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f4f7f1">
<link rel="apple-touch-icon" href="icon-512.png">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;

/* 🌸 FUNDO COM FLORES */
background-image: url('margaridas.jpg');
background-size: cover;
background-position: center;
background-repeat: no-repeat;

display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CAMADA SUAVE POR CIMA */
.overlay{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:24px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
width:280px;

display:flex;
flex-direction:column;
gap:10px;
}

h1{
color:#3d6f4c;
font-weight:300;
font-size:28px;
letter-spacing: 1px;
margin:0;
line-height:1.2;
}

.subtitulo{
font-size:12px;
color:#6f8a75;
margin-top:2px;
line-height:1.2;
}

.botao{
padding:14px;
border-radius:16px;
cursor:pointer;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
font-size:14px;
}

.botao:hover{
transform:scale(1.03);
}

/* CORES */
.rotina{ background:#fff8e8; }
.saude{ background:#fff8e8; }
.alimentacao{ background:#fff8e8; }

</style>
</head>

<body>

<div class="overlay">

<h1>Jardim da Rotina</h1>
<div class="subtitulo">Florescendo hábitos com amor</div>

<div class="botao rotina" onclick="location.href='rotina.html'">
🌸 Rotina
</div>

<div class="botao saude" onclick="location.href='saude.html'">
🩺 Saúde
</div>

<div class="botao alimentacao" onclick="location.href='alimentacao.html'">
🥗 Alimentação
</div>

</div>

</body>
</html>
