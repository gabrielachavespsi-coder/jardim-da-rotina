<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Mercado</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins', sans-serif;
  background-image:url("margaridas.jpg");
  background-size:cover;
  background-position:center;
  margin:0;
  display:flex;
  justify-content:center;
  padding:18px;
  box-sizing:border-box;
}

.card{
  width:min(420px,100%);
  background:rgba(255,255,255,0.9);
  border-radius:22px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  gap:16px;
  box-sizing:border-box;
  overflow:visible;
}

.topbar{
  display:grid;
  grid-template-columns:34px 1fr auto;
  align-items:center;
  gap:10px;
}

.topCenter{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-width:0;
}

.backBtn{
  border:none;
  background:rgba(61,111,76,0.12);
  color:#3d6f4c;
  width:34px;
  height:34px;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  line-height:1;
  font-family:'Poppins', sans-serif;
}

.titleIcon{
  font-size:18px;
  line-height:1;
  flex:0 0 auto;
}

.title{
  font-size:18px;
  color:#3d6f4c;
  margin:0;
  font-weight:400;
  line-height:1.1;
  white-space:nowrap;
}

.topActions{
  display:flex;
  align-items:center;
  gap:8px;
  justify-self:end;
}

.summaryBtn{
  border:none;
  background:rgba(61,111,76,0.12);
  color:#3d6f4c;
  border-radius:12px;
  padding:9px 12px;
  font-size:12px;
  cursor:pointer;
  font-family:'Poppins', sans-serif;
  white-space:nowrap;
}

.addBtn{
  border:none;
  background:rgba(61,111,76,0.12);
  color:#3d6f4c;
  width:34px;
  height:34px;
  border-radius:12px;
  font-size:20px;
  cursor:pointer;
  line-height:1;
  font-family:'Poppins', sans-serif;
  flex:0 0 auto;
}

.listBox{
  background:rgba(255,255,255,0.72);
  border-radius:16px;
  padding:12px;
  box-sizing:border-box;
  overflow:visible;
}

.filtrosTopoLista{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:12px;
}

.mesAnoAtualWrap,
.multiFiltroWrap{
  width:100%;
}

.mesAnoAtualSelect{
  width:100%;
  border:1px solid #b8d8bf;
  background:#dff1df;
  color:#3d6f4c;
  border-radius:14px;
  padding:10px 12px;
  font-size:14px;
  font-weight:500;
  font-family:'Poppins', sans-serif;
  box-sizing:border-box;
  outline:none;
}

.multiFiltroWrap{
  position:relative;
  width:100%;
  z-index:50;
}

.multiFiltroBtn{
  width:100%;
  border:1px solid #b8d8bf;
  background:#dff1df;
  color:#3d6f4c;
  border-radius:14px;
  padding:10px 38px 10px 12px;
  font-size:13px;
  font-weight:400;
  font-family:'Poppins', sans-serif;
  text-align:left;
  cursor:pointer;
  box-sizing:border-box;
  position:relative;
  min-height:42px;
}

.multiFiltroBtn::after{
  content:"▾";
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  color:#3d6f4c;
}

.multiFiltroDropdown{
  display:none;
  position:absolute;
  top:100%;
  left:0;
  right:0;
  margin-top:4px;
  background:#dff1df;
  border:1px solid #b8d8bf;
  border-radius:14px;
  padding:10px 12px;
  box-sizing:border-box;
  z-index:999;
  box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.multiFiltroDropdown.show{
  display:block;
}

.multiFiltroTopo{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-bottom:8px;
  flex-wrap:wrap;
}

.multiFiltroLimpar,
.multiFiltroMarcar{
  border:none;
  background:rgba(61,111,76,0.12);
  color:#3d6f4c;
  border-radius:10px;
  padding:5px 10px;
  font-size:11px;
  font-family:'Poppins', sans-serif;
  cursor:pointer;
}

.multiFiltroLista{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:8px 10px;
  align-items:start;
}

.multiFiltroOption{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:#3d6f4c;
  padding:2px 0;
  cursor:pointer;
  line-height:1.1;
  box-sizing:border-box;
  min-width:0;
}

.multiFiltroOption input{
  width:auto;
  margin:0;
  accent-color:#3d6f4c;
  flex:0 0 auto;
}

.multiFiltroOption.linhaInteira{
  grid-column:1 / -1;
  white-space:nowrap;
}

.secaoLista + .secaoLista{
  margin-top:14px;
}

.secaoTitulo{
  text-align:center;
  color:#3d6f4c;
  font-size:14px;
  font-weight:500;
  margin-bottom:2px;
}

.secaoSubtitulo{
  text-align:center;
  color:#8aa08f;
  font-size:11.5px;
  font-weight:400;
  margin:0 0 8px;
  line-height:1.3;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:12px;
  background:#fff;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  box-sizing:border-box;
}

.itemTexto{
  display:flex;
  flex-direction:column;
  min-width:0;
  flex:1;
}

.nome{
  font-size:13px;
  font-weight:600;
  color:#5f5f5f;
  line-height:1.4;
  word-break:break-word;
}

.detalhe{
  font-size:13px;
  color:#5f5f5f;
  margin-top:2px;
  line-height:1.4;
  word-break:break-word;
}

.empty{
  text-align:center;
  color:#666;
  font-size:13px;
  padding:10px 0 4px;
}

.footerMiniAction{
  display:flex;
  justify-content:center;
  margin-top:2px;
}

.futureBtn{
  border:none;
  background:rgba(61,111,76,0.12);
  color:#3d6f4c;
  border-radius:999px;
  padding:7px 12px;
  font-size:11px;
  cursor:pointer;
  font-family:'Poppins', sans-serif;
}

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
  box-sizing:border-box;
  z-index:999;
}

.modalOverlay.show{
  display:flex;
}

.modal{
  background:#fff;
  padding:18px;
  border-radius:20px;
  width:min(360px, 100%);
  max-height:calc(100vh - 32px);
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-sizing:border-box;
  box-shadow:0 10px 30px rgba(0,0,0,0.22);
}

.modalHeader{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
}

.modalTitle{
  font-size:18px;
  color:#3d6f4c;
  margin:0;
  font-weight:500;
  line-height:1.3;
}

.dataHoraTopo{
  font-size:11px;
  color:#777;
  text-align:right;
  line-height:1.35;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label,
.col label{
  font-size:13px;
  color:#444;
  font-weight:400;
  line-height:1.2;
}

.row{
  display:flex;
  gap:8px;
  width:100%;
}

.col{
  display:flex;
  flex-direction:column;
  gap:6px;
  flex:1;
  min-width:0;
}

.col.small{
  flex:0 0 calc(50% - 4px);
}

input, select, textarea{
  padding:11px 12px;
  border-radius:12px;
  border:1px solid #d5d5d5;
  font-size:13px;
  font-weight:400;
  line-height:1.2;
  font-family:'Poppins', sans-serif;
  box-sizing:border-box;
  width:100%;
  outline:none;
  background:#fff;
  color:#5f5f5f;
}

select{
  font-size:13px;
  font-weight:400;
  line-height:1.2;
  color:#5f5f5f;
}

textarea{
  resize:vertical;
  min-height:140px;
}

.semanasMulti{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.semanasLinha{
  display:none;
  flex-wrap:wrap;
  gap:6px 10px;
  background:#fff;
  border:1px solid #d5d5d5;
  border-radius:12px;
  padding:8px 10px;
}

.semanasLinha.show{
  display:flex;
}

.checkSemana{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  color:#5f5f5f;
  line-height:1.1;
  flex:0 0 calc(50% - 5px);
}

.checkSemana input{
  width:auto;
  margin:0;
  accent-color:#3d6f4c;
}

.moneyWrap{
  display:flex;
  align-items:center;
  border:1px solid #d5d5d5;
  border-radius:12px;
  overflow:hidden;
}

.moneyPrefix{
  background:#f2f2f2;
  color:#555;
  font-size:14px;
  padding:11px 10px;
  border-right:1px solid #d5d5d5;
  white-space:nowrap;
}

.moneyWrap input{
  border:none;
  border-radius:0;
  flex:1;
  font-size:13px;
  font-weight:400;
  line-height:1.2;
  color:#5f5f5f;
}

.modalBtns{
  display:flex;
  gap:8px;
  margin-top:6px;
  flex-wrap:wrap;
}

.modalBtns button{
  flex:1;
  min-width:0;
  padding:9px 10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:'Poppins', sans-serif;
  font-size:12.5px;
  min-height:48px;
}

.cancel{
  background:#efefef;
  color:#333;
}

.save{
  background:#3d6f4c;
  color:white;
}

.saveMore{
  background:rgba(61,111,76,0.15);
  color:#2f5d3d;
}

.danger{
  background:#f5d7d7;
  color:#8a3030;
}

.localActions,
.alimentoActions{
  display:flex;
  gap:8px;
}

.localActions button,
.alimentoActions button{
  flex:1;
  padding:6px 8px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:'Poppins', sans-serif;
  font-size:11.5px;
  min-height:34px;
}

.deleteLocalBtn,
.deleteAlimentoBtn{
  background:#f5d7d7;
  color:#8a3030;
}

.resumoFiltros{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.resumoFiltroBtn{
  flex:1;
  min-width:0;
  border:none;
  border-radius:12px;
  padding:9px 10px;
  font-size:12px;
  cursor:pointer;
  font-family:'Poppins', sans-serif;
  background:#efefef;
  color:#555;
}

.resumoFiltroBtn.ativo{
  background:rgba(61,111,76,0.15);
  color:#2f5d3d;
}

.resumoMesSelect,
.resumoSemanaSelect{
  display:none;
}

.resumoMesSelect.show,
.resumoSemanaSelect.show{
  display:block;
}

.resumoLista{
  max-height:320px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:4px;
}

.resumoItem{
  background:#f8f8f8;
  border-radius:12px;
  padding:10px 12px;
}

.resumoLinha{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:nowrap;
  white-space:nowrap;
  overflow:hidden;
}

.resumoNome{
  font-size:13px;
  font-weight:600;
  color:#5f5f5f;
  overflow:hidden;
  text-overflow:ellipsis;
}

.resumoDetalheInline{
  font-size:13px;
  color:#5f5f5f;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* =========================================================
   VISUAL SYSTEM — ALIMENTAÇÃO SUBPÁGINAS
   ========================================================= */
:root{
  --alim-fundo:#F8F7F1;
  --alim-card:#FFFDF8;
  --alim-card-2:#F4F3EA;
  --alim-salvia:#7F9271;
  --alim-salvia-escuro:#516448;
  --alim-texto:#2F332D;
  --alim-suave:#77786F;
  --alim-borda:#E8E1D4;
  --alim-rosa:#E8C8BF;
  --alim-sombra:0 10px 24px rgba(76,82,62,0.10);
}

html, body{ min-height:100%; }

body.alimentacao-subvisual{
  align-items:flex-start !important;
  padding:14px 12px 96px !important;
  background:
    radial-gradient(circle at 14% 4%, rgba(232,243,226,0.75), transparent 32%),
    radial-gradient(circle at 95% 16%, rgba(243,236,221,0.80), transparent 30%),

body.alimentacao-subvisual .card{

  border-radius:30px !important;

  position:absolute;

body.alimentacao-subvisual .backBtn{

body.alimentacao-subvisual .titleIcon{

}

body.alimentacao-subvisual .title{

body.alimentacao-subvisual .summaryBtn,
body.alimentacao-subvisual .addBtn,

  background:rgba(255,255,255,0.64) !important;

body.alimentacao-subvisual select,
body.alimentacao-subvisual input,

body.alimentacao-subvisual .multiFiltroBtn,
body.alimentacao-subvisual .filtroSelect,

body.alimentacao-subvisual .resumoItem,

  padding:12px 13px !important;

body.alimentacao-subvisual .nome{

body.alimentacao-subvisual .secaoTitulo,
body.alimentacao-subvisual .modalTitle,

  color:#40513B !important;
}

  color:#77786F !important;
}

  display:grid !important;
  grid-template-columns:1fr !important;
  gap:10px !important;
  margin-top:10px !important;
  padding-bottom:8px;
}

body.alimentacao-subvisual .futureBtn{

  display:flex !important;

  border:1px solid rgba(232,225,212,0.95);

  background:#EAF3E8 !important;
  color:#516448 !important;
}

body.alimentacao-subvisual .cancel{
  background:#F1EEE6 !important;
  color:#40513B !important;
}

  background:#F2D9D5 !important;

    gap:8px !important;
  }

  body.alimentacao-subvisual .title{
    font-size:18px !important;
  }

  body.alimentacao-subvisual .summaryBtn{
    padding:9px 9px !important;
    font-size:11px !important;
  }

  body.alimentacao-subvisual .addBtn{

    height:36px !important;

body.alimentacao-subvisual{
  align-items:flex-start !important;

<script>
const CHAVE = "alimentos_lista_mercado";
const CHAVE_LOCAIS = "alimentos_locais";
const CHAVE_ALIMENTOS_BASE = "alimentos_base_lista_mercado";
const CHAVE_FUTURAS_EDICOES_LISTA_MERCADO = "futuras_edicoes_lista_mercado";
const CHAVE_HISTORICO_MESES = "historico_lista_mercado_meses";
const CHAVE_ULTIMO_MES_VISTO = "ultimo_mes_visto_lista_mercado";

let editandoId = null;
let filtroResumoAtual = "mes";
let mesPrincipalSelecionado = getMesKeyAtual();

function getDados(){
  try{
    return JSON.parse(localStorage.getItem(CHAVE)) || [];
  }catch{
    return [];
  }
}

function salvarDados(dados){
  localStorage.setItem(CHAVE, JSON.stringify(dados));
}

function getHistoricoMeses(){
  try{
    return JSON.parse(localStorage.getItem(CHAVE_HISTORICO_MESES)) || [];
  }catch{
    return [];
  }
}

function salvarHistoricoMeses(historico){
  localStorage.setItem(CHAVE_HISTORICO_MESES, JSON.stringify(historico));
}

function getMesKeyAtual(data = new Date()){
  const ano = data.getFullYear();
  const mes = String(data.getMonth() + 1).padStart(2, "0");
  return `${ano}-${mes}`;
}

function keyParaLabelMMYYYY(key){
  const [ano, mes] = key.split("-");
  return `${mes}/${ano}`;
}

function clonarDados(dados){
  return JSON.parse(JSON.stringify(dados || []));
}

function garantirHistoricoMensal(){
  const mesAtual = getMesKeyAtual();
  const ultimoMesVisto = localStorage.getItem(CHAVE_ULTIMO_MES_VISTO);

  if(!ultimoMesVisto){
    localStorage.setItem(CHAVE_ULTIMO_MES_VISTO, mesAtual);
    return;
  }

  if(ultimoMesVisto !== mesAtual){
    let historico = getHistoricoMeses();
    const jaExiste = historico.some(item => item.monthKey === ultimoMesVisto);

    if(!jaExiste){
      historico.push({
        monthKey: ultimoMesVisto,
        monthLabel: keyParaLabelMMYYYY(ultimoMesVisto),
        items: clonarDados(getDados()),
        archivedAt: new Date().toISOString()
      });
    }

    historico.sort((a,b) => b.monthKey.localeCompare(a.monthKey));
    historico = historico.slice(0, 6);
    salvarHistoricoMeses(historico);
    localStorage.setItem(CHAVE_ULTIMO_MES_VISTO, mesAtual);
  }
}

function montarOpcoesMesResumo(){
  const select = document.getElementById("resumoMesSelect");
  const opcoes = getOpcoesMesDisponiveis();

  select.innerHTML = opcoes.map(opcao =>
    `<option value="${escapeHtml(opcao.key)}">${escapeHtml(opcao.label)}</option>`
  ).join("");
}

function getOpcoesMesDisponiveis(){
  const historico = getHistoricoMeses().sort((a,b) => b.monthKey.localeCompare(a.monthKey));
  const mesAtual = getMesKeyAtual();

  return [
    { key: mesAtual, label: keyParaLabelMMYYYY(mesAtual) },
    ...historico
      .filter(item => item.monthKey !== mesAtual)
      .map(item => ({ key: item.monthKey, label: item.monthLabel }))
  ];
}

function montarSelectMesPrincipal(){
  const select = document.getElementById("mesAnoAtual");
  const opcoes = getOpcoesMesDisponiveis();

  if(!opcoes.some(opcao => opcao.key === mesPrincipalSelecionado)){
    mesPrincipalSelecionado = opcoes[0]?.key || getMesKeyAtual();
  }

  select.innerHTML = opcoes.map(opcao =>
    `<option value="${escapeHtml(opcao.key)}">${escapeHtml(opcao.label)}</option>`
  ).join("");
  select.value = mesPrincipalSelecionado;
}

function aoTrocarMesPrincipal(){
  mesPrincipalSelecionado = document.getElementById("mesAnoAtual").value;
  render();
}

function getDadosDoMesPrincipalSelecionado(){
  const mesAtual = getMesKeyAtual();

  if(mesPrincipalSelecionado === mesAtual){
    return getDados();
  }

  const historico = getHistoricoMeses();
  const registro = historico.find(item => item.monthKey === mesPrincipalSelecionado);
  return registro ? (registro.items || []) : [];
}

function getFiltrosVisualizacaoSelecionados(){
  const valores = [...document.querySelectorAll('#multiFiltroDropdown input:checked')]
    .map(input => input.value);

  return valores.length ? valores : ["mes"];
}

function toggleMultiFiltroDropdown(){
  document.getElementById("multiFiltroDropdown").classList.toggle("show");
}

function atualizarMultiFiltro(){
  const selecionados = getFiltrosVisualizacaoSelecionados();
  const botao = document.getElementById("multiFiltroBtn");

  const mapaLabels = {
    mes: "Mês",
    1: "1ª semana",

function formatarDataHoraAgora(){
  const agora = new Date();
  const data = agora.toLocaleDateString("pt-BR");
  const hora = agora.toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"});
  return `${data} • ${hora}`;
}

function getNomeDiaSemanaSemFeira(data){
  const dias = ["domingo", "segunda", "terça", "quarta", "quinta", "sexta", "sábado"];
  return dias[data.getDay()];
}

function formatarDataDDMM(data){
  const dia = String(data.getDate()).padStart(2, "0");
  const mes = String(data.getMonth() + 1).padStart(2, "0");
  return `${dia}/${mes}`;
}

function montarTituloPeriodoMes(){
  const [ano, mes] = mesPrincipalSelecionado.split("-").map(Number);
  const primeiroDia = new Date(ano, mes - 1, 1);
  const ultimoDia = new Date(ano, mes, 0);

  const texto = `de ${formatarDataDDMM(primeiroDia)} (${getNomeDiaSemanaSemFeira(primeiroDia)}) a ${formatarDataDDMM(ultimoDia)} (${getNomeDiaSemanaSemFeira(ultimoDia)})`;
  document.getElementById("tituloMesPeriodo").textContent = texto;
}

function getPeriodoSemanaDoMes(ano, mes, numeroSemana){
  const ultimoDiaMes = new Date(ano, mes, 0);
  const inicio = new Date(ano, mes - 1, 1 + ((numeroSemana - 1) * 7));
  let fim = new Date(ano, mes - 1, 7 + ((numeroSemana - 1) * 7));

  if(inicio > ultimoDiaMes){
    return null;
  }

  if(fim > ultimoDiaMes){
    fim = ultimoDiaMes;
  }

  return { inicio, fim };
}

function montarTitulosPeriodosSemanas(){
  const [ano, mes] = mesPrincipalSelecionado.split("-").map(Number);

  for(let semana = 1; semana <= 5; semana++){
    const el = document.getElementById(`tituloSemana${semana}Periodo`);
    if(!el) continue;

    const periodo = getPeriodoSemanaDoMes(ano, mes, semana);

    if(!periodo){
      el.textContent = "";
      continue;
    }

    el.textContent = `de ${formatarDataDDMM(periodo.inicio)} (${getNomeDiaSemanaSemFeira(periodo.inicio)}) a ${formatarDataDDMM(periodo.fim)} (${getNomeDiaSemanaSemFeira(periodo.fim)})`;
  }
}

    .sort((a,b)=>a.localeCompare(b, "pt-BR", {sensitivity:"base"}));

  salvarLocais(locais);

  select.innerHTML = `<option value="">Selecione</option>`;

  locais.forEach(local=>{
    select.innerHTML += `<option value="${escapeHtml(local)}">${escapeHtml(local)}</option>`;
  });

  select.value = valorAtual || "";
}

function salvarNovoLocal(){
  const input = document.getElementById("novoLocalInput");
  const novoLocal = input.value.trim();

  if(!novoLocal){
    alert("Digite o local.");
    return;
  }

  if(["farmácia","mercado"].includes(novoLocal.toLowerCase())){
    alert("Esse local não está disponível nessa lista.");
    return;
  }

  let locais = getLocais().filter(local => !["farmácia","mercado"].includes(String(local).toLowerCase()));
  const jaExiste = locais.some(item => item.toLowerCase() === novoLocal.toLowerCase());

  if(!jaExiste){
    locais.push(novoLocal);
    locais.sort((a,b)=>a.localeCompare(b, "pt-BR", {sensitivity:"base"}));
    salvarLocais(locais);
  }

  preencherSelectLocais(novoLocal);
  document.getElementById("localSelect").value = novoLocal;

function normalizarPrecoValor(valor){
  let texto = String(valor ?? "").replace(/\s+/g, "");
  if(!texto) return "";

  texto = texto.replace(/\./g, ",");
  texto = texto.replace(/[^\d,]/g, "");

  if(texto.includes(",")){
    const partes = texto.split(",");
    const inteiro = (partes.shift() || "0").replace(/^0+(?=\d)/, "") || "0";
    const decimalBruto = partes.join("");
    const decimal = (decimalBruto + "00").slice(0, 2);
    return `${inteiro},${decimal}`;
  }

  const inteiro = texto.replace(/^0+(?=\d)/, "") || "0";
  return `${inteiro},00`;
}

function coletarDadosFormulario(){
  return {
    nome: document.getElementById("alimentoSelect").value.trim(),
    tipoFrequencia: document.getElementById("tipoFrequencia").value,
    semanasSelecionadas: getSemanasSelecionadas(),
    quantidadeBase: document.getElementById("quantidadeBase").value,
    pesoBase: document.getElementById("pesoBase").value,
    preco: normalizarPrecoValor(document.getElementById("preco").value.trim()),
    local: document.getElementById("localSelect").value
  };
}

function validarFormulario(dadosFormulario){
  if(!dadosFormulario.nome){
    alert("Selecione o alimento.");
    return false;
  }

  if(!dadosFormulario.tipoFrequencia){
    alert("Selecione a frequência de compra.");
    return false;
  }

  if(dadosFormulario.tipoFrequencia === "semanas" && !dadosFormulario.semanasSelecionadas.length){
    alert("Selecione pelo menos uma semana.");
    return false;
  }

  if(!dadosFormulario.local){
    alert("Selecione um local.");
    return false;
  }

  return true;
}

function salvarCadastro(){
  const formulario = coletarDadosFormulario();
  if(!validarFormulario(formulario)) return;

  const dados = getDados();

  if(editandoId !== null){
    const index = dados.findIndex(item => item.id === editandoId);
    if(index !== -1){
      dados[index] = {
        ...dados[index],
        ...formulario
      };
    }
  }else{
    dados.push({
      id: Date.now(),
      ...formulario,
      comprado:false,
      quantidadeComprada:"",
      dataCompraISO:"",
      dataCompraTexto:"",
      criadoEm:new Date().toISOString()
    });
  }

  salvarDados(dados);
  fecharModalCadastro();
  render();
}

function itemEstaNaSemana(item, numeroSemana){
  if(item.tipoFrequencia === "mes_todas_semanas"){
    return true;
  }

  return item.tipoFrequencia === "semanas"
    && Array.isArray(item.semanasSelecionadas)
    && item.semanasSelecionadas.includes(String(numeroSemana));
}

  if(tipo === "mes"){
    document.getElementById("filtroResumoMes").classList.add("ativo");
    wrapMes.classList.add("show");
    wrapSemana.classList.remove("show");
  }else{
    document.getElementById("filtroResumoSemana").classList.add("ativo");
    wrapMes.classList.add("show");
    wrapSemana.classList.add("show");
  }

  renderResumoMercado();
}

function renderResumoMercado(){
  let dados = getDadosDoMesResumoSelecionado().sort((a,b) => {
    const localA = (a.local || "").localeCompare((b.local || ""), "pt-BR", {sensitivity:"base"});
    if(localA !== 0) return localA;
    return (a.nome || "").localeCompare((b.nome || ""), "pt-BR", {sensitivity:"base"});
  });

  if(filtroResumoAtual === "mes"){
    dados = dados.filter(item => itemEhMes(item));
  }else{
    const semanaSelecionada = document.getElementById("resumoSemanaSelect").value;
    dados = dados.filter(item => itemEstaNaSemana(item, semanaSelecionada));
  }

  const container = document.getElementById("resumoMercadoLista");

  if(!dados.length){
    container.innerHTML = `<div class="empty">Nenhum alimento cadastrado ainda.</div>`;
  }else{
    container.innerHTML = dados.map(item => `
      <div class="resumoItem">
        <div class="resumoLinha">
          <span class="resumoNome">${escapeHtml(item.nome)}</span>
          <span class="resumoDetalheInline">${escapeHtml(item.local || "Sem local")}</span>
          <span class="resumoDetalheInline">R$ ${escapeHtml(item.preco || "0,00")}</span>
        </div>
      </div>
    `).join("");
  }
}

function escapeHtml(texto){
  return String(texto ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function renderListaEm(containerId, dados){
  const lista = document.getElementById(containerId);
  lista.innerHTML = "";

  if(!dados.length){
    lista.innerHTML = `<div class="empty">Nenhum alimento cadastrado ainda.</div>`;
    return;
  }

  dados.forEach(item => {
    const quantidadePeso = item.quantidadeBase && item.pesoBase
      ? `${escapeHtml(item.quantidadeBase)} ${escapeHtml(item.pesoBase)} • `
      : "";

    lista.innerHTML += `
      <div class="item" onclick="abrirModalEditarCadastro(${item.id})">
        <div class="itemTexto">
          <div class="nome">${escapeHtml(item.nome)}</div>
          <div class="detalhe">${quantidadePeso}R$ ${escapeHtml(item.preco || "0,00")} • ${escapeHtml(item.local || "")}</div>
        </div>
      </div>
    `;
  });
}

function render(){
  montarSelectMesPrincipal();

  const filtrosSelecionados = getFiltrosVisualizacaoSelecionados();
  const mostrarTodas = filtrosSelecionados.includes("mes_todas");
  const dados = getDadosDoMesPrincipalSelecionado().sort((a,b) => a.nome.localeCompare(b.nome, "pt-BR", {sensitivity:"base"}));

  montarTituloPeriodoMes();
  montarTitulosPeriodosSemanas();

  exibirOuOcultarSecao("secaoMes", mostrarTodas || filtrosSelecionados.includes("mes"));
  exibirOuOcultarSecao("secaoSemana1", mostrarTodas || filtrosSelecionados.includes("1"));
  exibirOuOcultarSecao("secaoSemana2", mostrarTodas || filtrosSelecionados.includes("2"));
  exibirOuOcultarSecao("secaoSemana3", mostrarTodas || filtrosSelecionados.includes("3"));
  exibirOuOcultarSecao("secaoSemana4", mostrarTodas || filtrosSelecionados.includes("4"));
  exibirOuOcultarSecao("secaoSemana5", mostrarTodas || filtrosSelecionados.includes("5"));

  renderListaEm("listaMes", dados.filter(item => itemEhMes(item)));
  renderListaEm("listaSemana1", dados.filter(item => itemEstaNaSemana(item, 1)));
  renderListaEm("listaSemana2", dados.filter(item => itemEstaNaSemana(item, 2)));
  renderListaEm("listaSemana3", dados.filter(item => itemEstaNaSemana(item, 3)));
  renderListaEm("listaSemana4", dados.filter(item => itemEstaNaSemana(item, 4)));
  renderListaEm("listaSemana5", dados.filter(item => itemEstaNaSemana(item, 5)));
}
