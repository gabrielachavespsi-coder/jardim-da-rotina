<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lista de Desejos da Maya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --verde-principal:#E6F2E5;
  --verde-hover:#D6EAD4;
  --verde-texto:#3F6F4F;
  --verde-escuro:#5C9D5C;

  --fundo:#F6F7F5;
  --card:#FFFFFF;

  --texto-principal:#2F2F2F;
  --texto-secundario:#6B6B6B;
  --borda:#E3E5E1;

  --fonte:'Poppins',sans-serif;

  --titulo:20px;
  --botao:15px;

  --sombra-suave:0 4px 12px rgba(0,0,0,0.05);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  font-family:var(--fonte);
  background:var(--fundo);
  color:var(--texto-principal);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:16px;
}

.pagina{
  width:100%;
  max-width:420px;
}

.card{
  width:100%;
  background:var(--card);
  border-radius:24px;
  padding:22px 16px 18px;
  box-shadow:var(--sombra-suave);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.topo{
  display:grid;
  grid-template-columns:40px 1fr 58px;
  align-items:start;
  gap:8px;
  margin-bottom:6px;
}

.botao-voltar{
  border:none;
  background:#E9ECE7;
  color:var(--texto-principal);
  border-radius:12px;
  width:40px;
  height:40px;
  cursor:pointer;
  font-size:18px;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  padding:0;
  transition:0.2s ease;
}

.botao-voltar:hover{
  background:#dde3d9;
}

.botao-voltar span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  transform:translateY(-1px);
}

.topCenter{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:0;
  padding-top:2px;
}

.titleIndex{
  color:var(--texto-principal);
  font-weight:500;
  font-size:var(--titulo);
  margin:0;
  line-height:1.2;
  text-align:center;
}

.subtitulo{
  font-size:11px;
  color:var(--texto-secundario);
  margin-top:2px;
  text-align:center;
}

.dataTopo{
  min-height:40px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
  text-align:right;
  color:var(--texto-secundario);
  line-height:1.1;
  padding-top:1px;
}

.horaTopo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  white-space:nowrap;
  margin-bottom:2px;
}

.dataTopoLinha{
  font-size:11px;
  white-space:nowrap;
}

.box{
  border-radius:16px;
  background:#F8FAF7;
  border:1px solid var(--borda);
  padding:14px;
  color:var(--texto-principal);
  line-height:1.6;
}

.boxTitle{
  font-size:14px;
  color:var(--verde-texto);
  text-align:center;
  margin-bottom:10px;
  font-family:var(--fonte);
  font-weight:500;
}

.saldoBox{
  text-align:center;
}

.saldoLabel{
  font-size:12px;
  color:var(--texto-secundario);
  margin-bottom:4px;
}

.saldoValor{
  font-size:24px;
  line-height:1.2;
  color:var(--verde-texto);
  font-weight:600;
}

.listHeader{
  display:grid;
  grid-template-columns:34px 1fr 34px;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}

.listHeaderSpacer{
  width:34px;
  height:34px;
}

.addBtn{
  border:none;
  background:#E9ECE7;
  color:var(--verde-texto);
  width:34px;
  height:34px;
  border-radius:10px;
  font-size:20px;
  cursor:pointer;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  transition:0.2s ease;
}

.addBtn:hover{
  background:#dde3d9;
}

.wishList{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.wishItem{
  width:100%;
  border:none;
  background:var(--verde-principal);
  color:var(--verde-texto);
  border-radius:16px;
  padding:14px 16px;
  font-size:var(--botao);
  font-family:var(--fonte);
  cursor:pointer;
  transition:0.2s ease;
  display:block;
  box-shadow:none;
}

.wishItem:hover{
  background:var(--verde-hover);
}

.wishNome{
  font-size:14px;
  color:var(--verde-texto);
  text-align:center;
  line-height:1.35;
  font-weight:500;
  word-break:break-word;
}

.wishInfo{
  margin-top:6px;
  font-size:11px;
  color:rgba(63,111,79,0.76);
  text-align:center;
  line-height:1.45;
}

.progressoBox{
  margin-top:10px;
  text-align:center;
}

.progressoTexto{
  font-size:11px;
  color:rgba(63,111,79,0.76);
  text-align:center;
  line-height:1.35;
  margin-bottom:6px;
}

.barraExterna{
  width:100%;
  height:10px;
  background:#dfe8dc;
  border-radius:999px;
  overflow:hidden;
}

.barraInterna{
  height:100%;
  width:0%;
  background:var(--verde-escuro);
  border-radius:999px;
  transition:width 0.3s ease;
}

.wishActions{
  display:none;
  margin-top:12px;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
}

.wishActions.show{
  display:flex;
}

.actionBtn{
  border:none;
  padding:8px 12px;
  border-radius:12px;
  cursor:pointer;
  font-size:12px;
  font-family:var(--fonte);
  background:#ffffff;
  color:var(--verde-texto);
  transition:0.2s ease;
}

.actionBtn:hover{
  opacity:0.95;
}

.actionBtn.primary{
  background:rgba(255,255,255,0.96);
  color:#2f5d3d;
}

.actionBtn.danger{
  background:#f5d7d7;
  color:#8a3030;
}

.actionBtn:disabled{
  opacity:0.45;
  cursor:not-allowed;
}

.empty{
  font-size:12.5px;
  color:var(--texto-secundario);
  text-align:center;
  padding:4px 0;
}

.footerBtn{
  width:100%;
  border:none;
  background:var(--verde-principal);
  color:var(--verde-texto);
  border-radius:16px;
  padding:14px 16px;
  font-size:14px;
  font-family:var(--fonte);
  cursor:pointer;
  transition:0.2s ease;
  display:block;
  text-align:center;
}

.footerBtn:hover{
  background:var(--verde-hover);
}

.atendidosPanel{
  display:none;
  flex-direction:column;
  gap:12px;
  margin-top:12px;
}

.atendidosPanel.show{
  display:flex;
}

.footerMiniAction{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:4px;
  flex-wrap:wrap;
}

.futureBtn{
  border:none;
  background:#E9ECE7;
  color:var(--texto-secundario);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
  transition:0.2s ease;
}

.futureBtn:hover{
  background:#dde3d9;
  color:var(--texto-principal);
}

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
  z-index:999;
}

.modalOverlay.show{
  display:flex;
}

.modal{
  background:#fff;
  padding:18px;
  border-radius:20px;
  width:min(360px, 100%);
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
}

.modalTitle{
  font-size:18px;
  color:var(--texto-principal);
  text-align:center;
  font-weight:500;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:13px;
  color:var(--texto-principal);
  font-family:var(--fonte);
  font-weight:500;
}

.field input{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  outline:none;
  color:var(--texto-principal);
  background:#fff;
}

textarea{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  height:260px;
  resize:none;
}

.field input:focus,
textarea:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
}

.modalActions,
.modalBtns{
  display:flex;
  gap:8px;
}

.modalBtn,
.modalBtns button{
  flex:1;
  padding:11px 12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:12.5px;
  transition:0.2s ease;
}

.modalBtn.cancel,
.cancel{
  background:#efefef;
  color:#333;
}

.modalBtn.cancel:hover,
.cancel:hover{
  background:#e7e7e7;
}

.modalBtn.save,
.save{
  background:var(--verde-escuro);
  color:white;
}

.modalBtn.save:hover,
.save:hover{
  background:#4f8a4f;
}

@media (max-width: 390px){
  body{
    padding:14px;
  }

  .card{
    padding:20px 14px 16px;
  }

  .titleIndex{
    font-size:19px;
  }

  .topo{
    grid-template-columns:40px 1fr 54px;
  }

  .horaTopo{
    font-size:13px;
  }

  .dataTopoLinha{
    font-size:10.5px;
  }
}
</style>
</head>
<body>

<div class="pagina">
  <div class="card">

    <div class="topo">
      <button class="botao-voltar" onclick="location.href='maya-menu.html'"><span>←</span></button>

      <div class="topCenter">
        <h1 class="titleIndex">✨ Lista de Desejos</h1>
<div class="subtitulo">Cada conquista te aproxima dos seus sonhos 💫</div>
      </div>

      <div class="dataTopo" aria-label="Data e hora atuais">
        <div id="linhaTempoHora" class="horaTopo"></div>
        <div id="linhaTempoDia" class="dataTopoLinha"></div>
        <div id="linhaTempoData" class="dataTopoLinha"></div>
      </div>
    </div>

    <div class="box saldoBox">
      <div class="saldoLabel">Saldo</div>
      <div class="saldoValor" id="saldoAtual">R$ 0,00</div>
    </div>

    <div class="box">
      <div class="listHeader">
        <div class="listHeaderSpacer"></div>
        <div class="boxTitle">💫 Desejos cadastrados</div>
        <button class="addBtn" onclick="abrirModalNovo()">+</button>
      </div>

      <div id="listaDesejos" class="wishList"></div>
    </div>

    <div class="box">
      <button class="footerBtn" onclick="alternarAtendidos()">🌟 Desejos Atendidos</button>

      <div id="painelAtendidos" class="atendidosPanel">
        <div id="listaAtendidos" class="wishList"></div>
      </div>
    </div>

    <div class="footerMiniAction">
      <button class="futureBtn" onclick="abrirModalFuturasEdicoes()">futuras edições</button>
    </div>

  </div>
</div>

<div class="modalOverlay" id="modalOverlay">
  <div class="modal">
    <h2 class="modalTitle" id="modalTitulo">Novo desejo</h2>

    <div class="field">
      <label for="campoDesejo">Desejo</label>
      <input type="text" id="campoDesejo" maxlength="100" placeholder="Ex.: Boneca, passeio, livro..." />
    </div>

    <div class="field">
      <label for="campoLocal">Local (se tiver)</label>
      <input type="text" id="campoLocal" maxlength="100" placeholder="Ex.: Shopping, livraria..." />
    </div>

    <div class="field">
      <label for="campoData">Quero alcançar essa Meta até o dia</label>
      <input type="date" id="campoData" />
    </div>

    <div class="field">
      <label for="campoValor">Valor</label>
      <input type="text" id="campoValor" inputmode="numeric" placeholder="R$ 0,00" />
    </div>

    <div class="modalActions">
      <button class="modalBtn cancel" onclick="fecharModal()">Cancelar</button>
      <button class="modalBtn save" onclick="salvarDesejo()">Concluir</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalFuturasEdicoes">
  <div class="modal">
    <h2 class="modalTitle">Futuras edições</h2>

    <div class="field">
      <label>Ideias de melhorias futuras</label>
      <textarea id="futurasEdicoesTexto" placeholder="Escreva aqui suas ideias para melhorar essa tela..."></textarea>
    </div>

    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalFuturasEdicoes()">Cancelar</button>
      <button class="save" onclick="salvarFuturasEdicoes()">Concluir</button>
    </div>
  </div>
</div>

<script>
const CHAVE_DESEJOS = "mayaListaDesejos";
const CHAVE_ATENDIDOS = "mayaDesejosAtendidos";
const CHAVE_FUTURAS_EDICOES_LISTA_DE_DESEJOS = "futuras_edicoes_maya_lista_de_desejos";

let editandoId = null;

function lerJSON(chave) {
  try {
    return JSON.parse(localStorage.getItem(chave)) || [];
  } catch {
    return [];
  }
}

function salvarJSON(chave, valor) {
  localStorage.setItem(chave, JSON.stringify(valor));
}

function gerarId() {
  return "id_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
}

function formatarMoeda(numero) {
  return Number(numero || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function formatarData(dataISO) {
  if (!dataISO) return "—";
  const [ano, mes, dia] = dataISO.split("-");
  if (!ano || !mes || !dia) return "—";
  return `${dia}/${mes}/${ano}`;
}

function mascaraMoeda(input) {
  let valor = input.value.replace(/\D/g, "");
  valor = (Number(valor) / 100).toFixed(2) + "";
  valor = valor.replace(".", ",");
  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  input.value = "R$ " + valor;
}

function extrairNumeroMoeda(texto) {
  if (!texto) return 0;
  return Number(
    texto.replace(/[R$\s.]/g, "").replace(",", ".")
  ) || 0;
}

function obterSaldoAtualMaya() {
  return Number(localStorage.getItem("mayaSaldoAtual")) || 0;
}

function atualizarSaldo() {
  const saldo = obterSaldoAtualMaya();
  document.getElementById("saldoAtual").textContent = formatarMoeda(saldo);
}

function calcularPercentualConquista(valorDesejo, saldoAtual) {
  if (!valorDesejo || valorDesejo <= 0) return 0;
  const percentual = (saldoAtual / valorDesejo) * 100;
  return Math.max(0, Math.min(100, percentual));
}

function abrirModalNovo() {
  editandoId = null;
  document.getElementById("modalTitulo").textContent = "Novo desejo";
  document.getElementById("campoDesejo").value = "";
  document.getElementById("campoLocal").value = "";
  document.getElementById("campoData").value = "";
  document.getElementById("campoValor").value = "";
  document.getElementById("modalOverlay").classList.add("show");
}

function abrirModalEditar(id) {
  const desejos = lerJSON(CHAVE_DESEJOS);
  const item = desejos.find(d => d.id === id);
  if (!item) return;

  editandoId = id;
  document.getElementById("modalTitulo").textContent = "Editar desejo";
  document.getElementById("campoDesejo").value = item.desejo || "";
  document.getElementById("campoLocal").value = item.local || "";
  document.getElementById("campoData").value = item.data || "";
  document.getElementById("campoValor").value = formatarMoeda(item.valor || 0);
  document.getElementById("modalOverlay").classList.add("show");
}

function fecharModal() {
  document.getElementById("modalOverlay").classList.remove("show");
}

function salvarDesejo() {
  const desejo = document.getElementById("campoDesejo").value.trim();
  const local = document.getElementById("campoLocal").value.trim();
  const data = document.getElementById("campoData").value;
  const valorTexto = document.getElementById("campoValor").value.trim();
  const valor = extrairNumeroMoeda(valorTexto);

  if (!desejo) {
    alert("Preencha o campo Desejo.");
    return;
  }

  if (!valor || valor <= 0) {
    alert("Preencha um valor válido.");
    return;
  }

  const desejos = lerJSON(CHAVE_DESEJOS);

  if (editandoId) {
    const indice = desejos.findIndex(d => d.id === editandoId);
    if (indice !== -1) {
      desejos[indice] = {
        ...desejos[indice],
        desejo,
        local,
        data,
        valor
      };
    }
  } else {
    desejos.push({
      id: gerarId(),
      desejo,
      local,
      data,
      valor,
      criadoEm: new Date().toISOString()
    });
  }

  salvarJSON(CHAVE_DESEJOS, desejos);
  fecharModal();
  renderizarDesejos();
}

function excluirDesejo(id) {
  const confirmar = confirm("Deseja excluir este desejo?");
  if (!confirmar) return;

  let desejos = lerJSON(CHAVE_DESEJOS);
  desejos = desejos.filter(d => d.id !== id);
  salvarJSON(CHAVE_DESEJOS, desejos);
  renderizarDesejos();
}

function utilizarDesejo(id) {
  const desejos = lerJSON(CHAVE_DESEJOS);
  const atendidos = lerJSON(CHAVE_ATENDIDOS);
  const saldo = obterSaldoAtualMaya();

  const item = desejos.find(d => d.id === id);
  if (!item) return;

  if (saldo < item.valor) {
    alert("A Maya ainda não atingiu a pontuação/valor necessário para utilizar este desejo.");
    return;
  }

  const confirmar = confirm(`Confirmar utilização do desejo "${item.desejo}"?`);
  if (!confirmar) return;

  const restantes = desejos.filter(d => d.id !== id);

  atendidos.push({
    ...item,
    utilizadoEm: new Date().toISOString()
  });

  salvarJSON(CHAVE_DESEJOS, restantes);
  salvarJSON(CHAVE_ATENDIDOS, atendidos);

  renderizarDesejos();
  renderizarAtendidos();
}

function alternarAtendidos() {
  document.getElementById("painelAtendidos").classList.toggle("show");
  renderizarAtendidos();
}

function criarCardDesejo(item) {
  const saldo = obterSaldoAtualMaya();
  const liberado = saldo >= item.valor;
  const percentual = calcularPercentualConquista(item.valor, saldo);

  const card = document.createElement("div");
  card.className = "wishItem";

  const nome = document.createElement("div");
  nome.className = "wishNome";
  nome.textContent = item.desejo;

  const info = document.createElement("div");
  info.className = "wishInfo";
  info.innerHTML = `
    <div>Local: ${item.local || "—"}</div>
    <div>Alcançar meta até: ${item.data ? formatarData(item.data) : "—"}</div>
    <div>Valor: ${formatarMoeda(item.valor || 0)}</div>
  `;

  const progresso = document.createElement("div");
  progresso.className = "progressoBox";
  progresso.innerHTML = `
    <div class="progressoTexto">${percentual.toFixed(0)}% conquistado</div>
    <div class="barraExterna">
      <div class="barraInterna" style="width:${percentual}%;"></div>
    </div>
  `;

  const actions = document.createElement("div");
  actions.className = "wishActions";
  actions.innerHTML = `
    <button class="actionBtn" type="button">Editar</button>
    <button class="actionBtn primary" type="button" ${liberado ? "" : "disabled"}>Utilizar</button>
    <button class="actionBtn danger" type="button">Excluir</button>
  `;

  const [btnEditar, btnUtilizar, btnExcluir] = actions.querySelectorAll("button");

  btnEditar.onclick = (e) => {
    e.stopPropagation();
    abrirModalEditar(item.id);
  };

  btnUtilizar.onclick = (e) => {
    e.stopPropagation();
    utilizarDesejo(item.id);
  };

  btnExcluir.onclick = (e) => {
    e.stopPropagation();
    excluirDesejo(item.id);
  };

  card.addEventListener("click", () => {
    document.querySelectorAll(".wishActions.show").forEach(el => {
      if (el !== actions) el.classList.remove("show");
    });
    actions.classList.toggle("show");
  });

  card.appendChild(nome);
  card.appendChild(info);
  card.appendChild(progresso);
  card.appendChild(actions);

  return card;
}

function renderizarDesejos() {
  atualizarSaldo();

  const container = document.getElementById("listaDesejos");
  container.innerHTML = "";

  const desejos = lerJSON(CHAVE_DESEJOS)
    .sort((a, b) => a.desejo.localeCompare(b.desejo, "pt-BR", { sensitivity: "base" }));

  if (desejos.length === 0) {
    container.innerHTML = `<div class="empty">Nenhum desejo cadastrado ainda.</div>`;
    return;
  }

  desejos.forEach(item => {
    container.appendChild(criarCardDesejo(item));
  });
}

function renderizarAtendidos() {
  const container = document.getElementById("listaAtendidos");
  container.innerHTML = "";

  const atendidos = lerJSON(CHAVE_ATENDIDOS)
    .sort((a, b) => new Date(b.utilizadoEm) - new Date(a.utilizadoEm));

  if (atendidos.length === 0) {
    container.innerHTML = `<div class="empty">Nenhum desejo atendido ainda.</div>`;
    return;
  }

  atendidos.forEach(item => {
    const card = document.createElement("div");
    card.className = "wishItem";
    card.style.cursor = "default";
    card.innerHTML = `
      <div class="wishNome">${item.desejo}</div>
      <div class="wishInfo">
        <div>Local: ${item.local || "—"}</div>
        <div>Alcançar meta até: ${item.data ? formatarData(item.data) : "—"}</div>
        <div>Valor: ${formatarMoeda(item.valor || 0)}</div>
        <div><strong>Utilizado em:</strong> ${new Date(item.utilizadoEm).toLocaleDateString("pt-BR")}</div>
      </div>
    `;
    container.appendChild(card);
  });
}

function abrirModalFuturasEdicoes(){
  document.getElementById("futurasEdicoesTexto").value =
    localStorage.getItem(CHAVE_FUTURAS_EDICOES_LISTA_DE_DESEJOS) || "";
  document.getElementById("modalFuturasEdicoes").classList.add("show");
}

function fecharModalFuturasEdicoes(){
  document.getElementById("modalFuturasEdicoes").classList.remove("show");
}

function salvarFuturasEdicoes(){
  localStorage.setItem(
    CHAVE_FUTURAS_EDICOES_LISTA_DE_DESEJOS,
    document.getElementById("futurasEdicoesTexto").value
  );
  fecharModalFuturasEdicoes();
}

function pad2(numero){
  return String(numero).padStart(2, "0");
}

function atualizarLinhaTempo(){
  const agora = new Date();
  const diasCurtos = ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"];

  document.getElementById("linhaTempoHora").textContent = `${pad2(agora.getHours())}:${pad2(agora.getMinutes())}`;
  document.getElementById("linhaTempoDia").textContent = `• ${diasCurtos[agora.getDay()]}`;
  document.getElementById("linhaTempoData").textContent = `• ${pad2(agora.getDate())}/${pad2(agora.getMonth()+1)}`;
}

document.getElementById("campoValor").addEventListener("input", function() {
  mascaraMoeda(this);
});

window.addEventListener("load", () => {
  atualizarLinhaTempo();
  setInterval(atualizarLinhaTempo, 1000);
});

renderizarDesejos();
renderizarAtendidos();
</script>
