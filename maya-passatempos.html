<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passatempos Tranquilos</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; }

    body{
      font-family: Arial, sans-serif;
      background-image: url("margaridas.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 18px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .card{
      width: min(420px, 100%);
      background: rgba(255,255,255,0.88);
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      padding: 22px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .back{
      border: none;
      background: rgba(0,0,0,0.06);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
    }

    .title{
      margin: 0;
      font-size: 20px;
      color: #3d6f4c;
      font-weight: 400;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    .subtitle{
      font-size: 13px;
      color: rgba(0,0,0,0.58);
      text-align: center;
      line-height: 1.45;
      font-family: 'Poppins', sans-serif;
    }

    .options{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .optionBtn{
      border:none;
      cursor:pointer;
      padding: 14px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.7);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      font-size: 15px;
      color:#2e3a46;
      font-family: 'Poppins', sans-serif;
      text-align:center;
      line-height:1.35;
    }

    .optionBtn.active{
      background: rgba(223, 241, 224, 0.80);
      outline: 2px solid rgba(61,111,76,0.22);
      color:#2f5a3a;
    }

    .newBox{
      display:none;
      flex-direction:column;
      gap:10px;
      background: rgba(255,255,255,0.65);
      border-radius:16px;
      padding:12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .newBox.show{
      display:flex;
    }

    .input{
      width:100%;
      box-sizing:border-box;
      border:1px solid rgba(0,0,0,0.12);
      border-radius:12px;
      padding:12px;
      font-size:14px;
      font-family:'Poppins', sans-serif;
      outline:none;
    }

    .row{
      display:flex;
      gap:8px;
    }

    .miniBtn{
      flex:1;
      border:none;
      cursor:pointer;
      padding:11px 10px;
      border-radius:12px;
      background: rgba(0,0,0,0.06);
      color:#2e3a46;
      font-size:13px;
      font-family:'Poppins', sans-serif;
    }

    .selectedBox{
      background: rgba(255,255,255,0.65);
      border-radius:16px;
      padding:12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      text-align:center;
      font-family:'Poppins', sans-serif;
      font-size:13px;
      color: rgba(0,0,0,0.62);
      line-height:1.5;
    }

    .finalBtn{
      border:none;
      cursor:pointer;
      padding: 13px 10px;
      border-radius: 14px;
      background: rgba(61,111,76,0.14);
      color:#2f5a3a;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      font-family: 'Poppins', sans-serif;
      width: 100%;
    }

    .finalBtn:disabled{
      opacity:0.55;
      cursor:not-allowed;
    }

    .message{
      text-align:center;
      font-size:12px;
      color:#986464;
      min-height:16px;
      font-family:'Poppins', sans-serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <button class="back" onclick="goBack()">← Voltar</button>
      <h1 class="title">Passatempos tranquilos</h1>
      <span style="width:76px;"></span>
    </div>

    <div class="subtitle">
      Escolha 1 ou 2 opções e depois clique em “Escolher”.
    </div>

    <div id="options" class="options"></div>

    <div id="newBox" class="newBox">
      <input id="newActivityInput" class="input" type="text" placeholder="Digite uma nova atividade" />
      <div class="row">
        <button class="miniBtn" onclick="addNewActivity()">Adicionar</button>
        <button class="miniBtn" onclick="closeNewBox()">Cancelar</button>
      </div>
    </div>

    <div id="selectedBox" class="selectedBox">Nenhuma opção escolhida ainda.</div>
    <div id="message" class="message"></div>

    <button id="chooseBtn" class="finalBtn" onclick="chooseActivities()" disabled>Escolher</button>
  </div>

<script>
const STORAGE_KEY = "jardim_rotina_maya_v8";

  const DEFAULT_OPTIONS = [
    "Quebra-cabeça",
    "Desenhar",
    "Colorir",
    "Ler histórias",
    "Atividade manual",
    "Conversar",
    "30 min de um filme calmo"
  ];

  let store = loadStore();
  let cycleDayKey = getCycleDayKey();
  let selected = [];

  function pad(n){
    return String(n).padStart(2, "0");
  }

  function dateToKey(date){
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

function getCycleDayKey(date = new Date()){
  return dateToKey(new Date(date));
}

  function loadStore(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return { days: {}, customCalmOptions: [] };
      const parsed = JSON.parse(raw);
      if(!parsed.days) parsed.days = {};
      if(!parsed.customCalmOptions) parsed.customCalmOptions = [];
      return parsed;
    }catch(e){
      return { days: {}, customCalmOptions: [] };
    }
  }

  function saveStore(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
  }

  function getDayState(key){
    if(!store.days[key]){
      store.days[key] = {
        done: {},
        calmActivities: [],
        updatedAt: null,
        completed: false,
        completedAt: null,
        validation: {
          morningRule: null,
          nightRule: null
        }
      };
    }

    if(!Array.isArray(store.days[key].calmActivities)){
      store.days[key].calmActivities = [];
    }

    if(!store.days[key].done){
      store.days[key].done = {};
    }

    return store.days[key];
  }

  function getAllOptions(){
    const custom = Array.isArray(store.customCalmOptions) ? store.customCalmOptions : [];
    return [...DEFAULT_OPTIONS, ...custom];
  }

  function openNewBox(){
    document.getElementById("newBox").classList.add("show");
    document.getElementById("message").textContent = "";
    setTimeout(() => {
      document.getElementById("newActivityInput").focus();
    }, 50);
  }

  function closeNewBox(){
    document.getElementById("newBox").classList.remove("show");
    document.getElementById("newActivityInput").value = "";
    document.getElementById("message").textContent = "";
  }

  function addNewActivity(){
    const input = document.getElementById("newActivityInput");
    const message = document.getElementById("message");
    const value = input.value.trim();

    if(!value){
      message.textContent = "Digite uma atividade para adicionar.";
      return;
    }

    const exists = getAllOptions().some(item => item.toLowerCase() === value.toLowerCase());
    if(exists){
      message.textContent = "Essa atividade já existe.";
      return;
    }

    store.customCalmOptions.push(value);
    saveStore();
    input.value = "";
    closeNewBox();
    render();
  }

  function toggleOption(option){
    const message = document.getElementById("message");
    message.textContent = "";

    const index = selected.indexOf(option);

    if(index >= 0){
      selected.splice(index, 1);
    }else{
      if(selected.length >= 2){
        message.textContent = "Você pode escolher até 2 opções.";
        return;
      }
      selected.push(option);
    }

    updateSelectedBox();
    renderOptions();
    updateChooseButton();
  }

  function updateSelectedBox(){
    const box = document.getElementById("selectedBox");
    if(!selected.length){
      box.textContent = "Escolhido: em aberto";
      return;
    }

    box.textContent = `Escolhido: ${selected.join(" + ")}`;
  }

function updateChooseButton(){
  document.getElementById("chooseBtn").disabled = selected.length === 0 || selected.length > 2;
}

  function renderOptions(){
    const container = document.getElementById("options");
    container.innerHTML = "";

    getAllOptions().forEach(option => {
      const btn = document.createElement("button");
      btn.className = "optionBtn" + (selected.includes(option) ? " active" : "");
      btn.textContent = option;
      btn.onclick = () => toggleOption(option);
      container.appendChild(btn);
    });

    const newBtn = document.createElement("button");
    newBtn.className = "optionBtn";
    newBtn.textContent = "Novo";
    newBtn.onclick = () => openNewBox();
    container.appendChild(newBtn);
  }

  function chooseActivities(){
    if(selected.length > 2) return;

    const ds = getDayState(cycleDayKey);
    ds.calmActivities = [...selected];
    ds.done["n4"] = selected.length > 0;
    ds.updatedAt = Date.now();

    saveStore();

    const params = new URLSearchParams(window.location.search);
    const from = params.get("from");

    if(from === "gabriela"){
      location.href = "gabriela-menu.html";
    } else {
      location.href = "maya-rotina.html#night";
    }
  }

  function goBack(){
    const params = new URLSearchParams(window.location.search);
    const from = params.get("from");

    if(from === "gabriela"){
      location.href = "gabriela-menu.html";
    } else {
      location.href = "maya-rotina.html#night";
    }
  }

  function render(){
    const ds = getDayState(cycleDayKey);
    selected = Array.isArray(ds.calmActivities) ? [...ds.calmActivities] : [];
    renderOptions();
    updateSelectedBox();
    updateChooseButton();
  }

  render();
</script>
</body>
</html>
