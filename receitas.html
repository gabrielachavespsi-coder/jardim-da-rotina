<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receitas</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>body{font-family:'Poppins',sans-serif;background:#F6F7F5;margin:0;display:flex;justify-content:center;padding:18px;box-sizing:border-box;color:#5f5f5f}.card{width:min(420px,100%);background:#fff;border-radius:22px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.2);display:flex;flex-direction:column;gap:16px;box-sizing:border-box}.topbar{display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:10px}.topCenter{display:flex;align-items:center;justify-content:center;gap:8px;min-width:0}.backBtn,.addBtn,.summaryBtn,.futureBtn,.chipBtn,.miniBtn{border:none;background:rgba(61,111,76,.12);color:#3d6f4c;cursor:pointer;font-family:'Poppins',sans-serif}.backBtn,.addBtn{width:34px;height:34px;border-radius:12px;font-size:18px;line-height:1}.addBtn{font-size:20px}.summaryBtn{border-radius:12px;padding:9px 12px;font-size:12px;white-space:nowrap}.titleIcon{font-size:18px;line-height:1;flex:0 0 auto}.title{font-size:18px;color:#3d6f4c;margin:0;font-weight:400;line-height:1.1;white-space:nowrap}.topActions{display:flex;align-items:center;gap:8px;justify-self:end}.listBox{background:rgba(255,255,255,.72);border-radius:16px;padding:12px;box-sizing:border-box}.filtrosTopoLista{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}select,input,textarea{padding:11px 12px;border-radius:12px;border:1px solid #d5d5d5;font-size:13px;font-family:'Poppins',sans-serif;box-sizing:border-box;width:100%;outline:none;background:#fff;color:#5f5f5f}textarea{resize:vertical;min-height:110px}.filtroSelect,.periodoSelect{border:1px solid #b8d8bf;background:#dff1df;color:#3d6f4c;border-radius:14px;font-weight:500}.item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:12px;margin-top:10px;cursor:pointer;box-sizing:border-box}.itemTexto{display:flex;flex-direction:column;min-width:0;flex:1}.nome{font-size:13px;font-weight:600;color:#5f5f5f;line-height:1.4;word-break:break-word}.detalhe{font-size:12.5px;color:#5f5f5f;margin-top:2px;line-height:1.4;word-break:break-word}.empty{text-align:center;color:#666;font-size:13px;padding:10px 0 4px}.footerMiniAction{display:flex;justify-content:center;margin-top:2px}.futureBtn{border-radius:999px;padding:7px 12px;font-size:11px}.modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;justify-content:center;align-items:center;padding:16px;box-sizing:border-box;z-index:999}.modalOverlay.show{display:flex}.modal{background:#fff;padding:18px;border-radius:20px;width:min(360px,100%);max-height:calc(100vh - 32px);overflow:auto;display:flex;flex-direction:column;gap:10px;box-sizing:border-box;box-shadow:0 10px 30px rgba(0,0,0,.22)}.modalHeader{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}.modalTitle{font-size:18px;color:#3d6f4c;margin:0;font-weight:500;line-height:1.3}.dataHoraTopo{font-size:11px;color:#777;text-align:right;line-height:1.35}.field{display:flex;flex-direction:column;gap:6px}.field label,.col label{font-size:13px;color:#444;font-weight:400;line-height:1.2}.row{display:flex;gap:8px;width:100%}.col{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}.modalBtns{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}.modalBtns button{flex:1;min-width:0;padding:9px 10px;border:none;border-radius:12px;cursor:pointer;font-family:'Poppins',sans-serif;font-size:12.5px;min-height:44px}.cancel{background:#efefef;color:#333}.save{background:#3d6f4c;color:#fff}.danger{background:#f5d7d7;color:#8a3030}.saveMore{background:rgba(61,111,76,.15);color:#2f5d3d}.ingredientesBox,.preparoBox{background:#f8f8f8;border-radius:12px;padding:10px 12px;font-size:12.5px;line-height:1.5;color:#5f5f5f;white-space:pre-wrap}.secaoLista+.secaoLista{margin-top:14px}.secaoTitulo{text-align:center;color:#3d6f4c;font-size:14px;font-weight:500;margin-bottom:2px}.secaoSubtitulo{text-align:center;color:#8aa08f;font-size:11.5px;margin:0 0 8px;line-height:1.3}.refeicaoTitulo{font-size:12px;color:#3d6f4c;margin:10px 0 4px;font-weight:500}.checkboxBox{background:#fff;border:1px solid #d5d5d5;border-radius:12px;padding:9px 10px;display:grid;grid-template-columns:1fr 1fr;gap:7px 10px;box-sizing:border-box}.checkboxBox.oneCol{grid-template-columns:1fr}.checkOption{display:flex;align-items:center;gap:6px;font-size:12px;color:#5f5f5f;line-height:1.25}.checkOption input{width:auto;margin:0;accent-color:#3d6f4c}.campoAjuda{font-size:10.5px;color:#777;margin-top:-2px;line-height:1.35}.miniBtn{border-radius:10px;padding:7px 10px;font-size:11.5px}.resumoLista{max-height:330px;overflow:auto;display:flex;flex-direction:column;gap:8px}.resumoItem{background:#f8f8f8;border-radius:12px;padding:10px 12px}.resumoLinha{display:flex;gap:8px;flex-wrap:wrap}.resumoNome{font-size:13px;font-weight:600;color:#5f5f5f}.resumoDetalheInline{font-size:12.5px;color:#5f5f5f}@media(max-width:390px){.title{font-size:17px}.summaryBtn{padding:8px 9px}.row{flex-direction:column}.checkboxBox{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="card">
  <div class="topbar">
    <button class="backBtn" onclick="location.href='alimentacao.html'">←</button>
    <div class="topCenter"><span class="titleIcon">🍲</span><h1 class="title">Receitas</h1></div>
    <div class="topActions"><button class="summaryBtn" onclick="abrirListaIngredientes()">Lista</button><button class="addBtn" onclick="abrirModalNovo()">+</button></div>
  </div>
  <div class="listBox">
    <div class="filtrosTopoLista">
      <select class="filtroSelect" id="culinariaFiltro" onchange="render()"><option value="todas">Tipos de Culinárias</option></select>
      <select class="filtroSelect" id="categoriaFiltro" onchange="render()"><option value="todas">Horário da Refeição</option></select>
      <input id="buscaInput" oninput="render()" placeholder="Buscar receita...">
    </div>
    <div id="listaReceitas"></div>
  </div>
  <div class="footerMiniAction"><button class="futureBtn" onclick="abrirModalFuturasEdicoes()">futuras edições</button></div>
</div>

<div class="modalOverlay" id="modalCadastro"><div class="modal">
  <div class="modalHeader"><h2 class="modalTitle" id="tituloCadastro">Nova receita</h2><div class="dataHoraTopo" id="dataHoraCadastro"></div></div>
  <div class="field"><label>Nome da receita</label><input id="nomeInput" placeholder="Ex.: Panqueca de banana"></div>
  <div class="field"><label>Culinária</label><div id="culinariasBox" class="checkboxBox"></div></div>
  <div class="field"><label>Categoria</label><div id="categoriasBox" class="checkboxBox"></div></div>
  <div class="row"><div class="col"><label>Rendimento</label><input id="rendimentoInput" placeholder="Ex.: 2 porções"></div><div class="col"><label>Tempo</label><input id="tempoInput" placeholder="Ex.: 30 min"></div></div>
  <div class="field"><label>Ingredientes</label><textarea id="ingredientesInput" placeholder="Um ingrediente por linha"></textarea></div>
  <div class="field"><label>Modo de preparo</label><textarea id="preparoInput" placeholder="Escreva o passo a passo"></textarea></div>
  <div class="modalBtns"><button class="cancel" onclick="fecharModalCadastro()">Cancelar</button><button class="danger" id="btnExcluir" onclick="excluirItemEditando()" style="display:none;">Excluir</button><button class="saveMore" onclick="salvarCadastroEMaisNovo()">Concluir + Novo</button><button class="save" onclick="salvarCadastro()">Concluir</button></div>
</div></div>

<div class="modalOverlay" id="modalDetalhe"><div class="modal"><h2 class="modalTitle" id="detalheTitulo">Receita</h2><div id="detalheMeta" class="detalhe"></div><div class="field"><label>Ingredientes</label><div id="detalheIngredientes" class="ingredientesBox"></div></div><div class="field"><label>Modo de preparo</label><div id="detalhePreparo" class="preparoBox"></div></div><div class="modalBtns"><button class="cancel" onclick="fecharDetalhe()">Fechar</button><button class="save" id="btnEditarDetalhe">Editar</button></div></div></div>
<div class="modalOverlay" id="modalListaIngredientes"><div class="modal"><h2 class="modalTitle">Ingredientes das receitas</h2><div id="listaIngredientesConteudo" class="ingredientesBox"></div><div class="modalBtns"><button class="cancel" onclick="fecharListaIngredientes()">Fechar</button></div></div></div>
<div class="modalOverlay" id="modalFuturasEdicoes"><div class="modal"><h2 class="modalTitle">Futuras edições</h2><div class="field"><label>Ideias de melhorias futuras</label><textarea id="futurasEdicoesTexto" placeholder="Escreva aqui suas ideias para melhorar essa tela..."></textarea></div><div class="modalBtns"><button class="cancel" onclick="fecharModalFuturasEdicoes()">Cancelar</button><button class="save" onclick="salvarFuturasEdicoes()">Concluir</button></div></div></div>
<script>
const CHAVE="receitas_cadastradas"; const CHAVE_FUTURAS="futuras_edicoes_receitas"; let editandoId=null; let detalheId=null;
const CULINARIAS=['Árabe','Asiática','Ayurveda','Brasileira','Indiana','Italiana','Japonesa','Macrobiótica','Mesopotâmica','Mexicana'];
const CATEGORIAS=['Café da manhã','Almoço','Lanche','Jantar','Ceia','Sobremesa','Molhos e bases'];
function getDados(){try{return JSON.parse(localStorage.getItem(CHAVE))||[]}catch{return[]}} function salvarDados(d){localStorage.setItem(CHAVE,JSON.stringify(d))}
function dataHora(){const a=new Date();return `${a.toLocaleDateString('pt-BR')} • ${a.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`}
function escapeHtml(t){return String(t??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function garantirArray(v){if(Array.isArray(v))return v.filter(Boolean); if(v)return [v]; return []}
function montarCheckboxes(containerId, opcoes, classe){document.getElementById(containerId).innerHTML=opcoes.map(op=>`<label class="checkOption"><input type="checkbox" class="${classe}" value="${escapeHtml(op)}"> ${escapeHtml(op)}</label>`).join('')}
function getMarcados(classe){return [...document.querySelectorAll('.'+classe+':checked')].map(i=>i.value)}
function marcar(classe, valores){const set=new Set(garantirArray(valores)); document.querySelectorAll('.'+classe).forEach(i=>i.checked=set.has(i.value))}
function montarFiltros(){const cf=document.getElementById('culinariaFiltro'); cf.innerHTML='<option value="todas">Tipos de Culinárias</option>'+CULINARIAS.map(c=>`<option>${escapeHtml(c)}</option>`).join(''); const cat=document.getElementById('categoriaFiltro'); cat.innerHTML='<option value="todas">Horário da Refeição</option>'+CATEGORIAS.map(c=>`<option>${escapeHtml(c)}</option>`).join('')}
function abrirModalNovo(){editandoId=null;document.getElementById('tituloCadastro').textContent='Nova receita';document.getElementById('dataHoraCadastro').textContent=dataHora();['nomeInput','tempoInput','rendimentoInput','ingredientesInput','preparoInput'].forEach(id=>document.getElementById(id).value='');marcar('culinariaCheck',[]);marcar('categoriaCheck',[]);document.getElementById('btnExcluir').style.display='none';document.getElementById('modalCadastro').classList.add('show')}
function abrirModalEditar(id){const item=getDados().find(i=>i.id===id); if(!item)return; editandoId=id;document.getElementById('tituloCadastro').textContent='Editar receita';document.getElementById('dataHoraCadastro').textContent=dataHora();document.getElementById('nomeInput').value=item.nome||'';marcar('culinariaCheck',item.culinarias||item.culinaria||[]);marcar('categoriaCheck',item.categorias||item.categoria||[]);document.getElementById('tempoInput').value=item.tempo||'';document.getElementById('rendimentoInput').value=item.rendimento||'';document.getElementById('ingredientesInput').value=item.ingredientes||'';document.getElementById('preparoInput').value=item.preparo||'';document.getElementById('btnExcluir').style.display='block';document.getElementById('modalCadastro').classList.add('show')}
function fecharModalCadastro(){document.getElementById('modalCadastro').classList.remove('show')}
function coletar(){return{nome:document.getElementById('nomeInput').value.trim(),culinarias:getMarcados('culinariaCheck'),categorias:getMarcados('categoriaCheck'),tempo:document.getElementById('tempoInput').value.trim(),rendimento:document.getElementById('rendimentoInput').value.trim(),ingredientes:document.getElementById('ingredientesInput').value.trim(),preparo:document.getElementById('preparoInput').value.trim()}}
function validar(d){if(!d.nome){alert('Escreva o nome da receita.');return false} if(!d.culinarias.length){alert('Selecione pelo menos uma culinária.');return false} if(!d.categorias.length){alert('Selecione pelo menos uma categoria.');return false} return true}
function salvarCadastro(){const f=coletar(); if(!validar(f))return; let dados=getDados(); if(editandoId!==null){const idx=dados.findIndex(i=>i.id===editandoId); if(idx>=0)dados[idx]={...dados[idx],...f}}else{dados.push({id:Date.now(),...f,criadoEm:new Date().toISOString()})} salvarDados(dados); fecharModalCadastro(); render()}
function salvarCadastroEMaisNovo(){const f=coletar(); if(!validar(f))return; let dados=getDados(); if(editandoId!==null){const idx=dados.findIndex(i=>i.id===editandoId); if(idx>=0)dados[idx]={...dados[idx],...f}; editandoId=null}else{dados.push({id:Date.now(),...f,criadoEm:new Date().toISOString()})} salvarDados(dados); ['nomeInput','tempoInput','rendimentoInput','ingredientesInput','preparoInput'].forEach(id=>document.getElementById(id).value=''); marcar('culinariaCheck',[]); marcar('categoriaCheck',[]); render()}
function excluirItemEditando(){if(editandoId===null)return; if(!confirm('Deseja excluir esta receita?'))return; salvarDados(getDados().filter(i=>i.id!==editandoId)); fecharModalCadastro(); render()}
function abrirDetalhe(id){const item=getDados().find(i=>i.id===id); if(!item)return; detalheId=id; const cats=garantirArray(item.categorias||item.categoria).join(', '); const culs=garantirArray(item.culinarias||item.culinaria).join(', '); document.getElementById('detalheTitulo').textContent=item.nome;document.getElementById('detalheMeta').textContent=`${culs||'Sem culinária'} • ${cats||'Sem categoria'}${item.rendimento?' • '+item.rendimento:''}${item.tempo?' • '+item.tempo:''}`;document.getElementById('detalheIngredientes').textContent=item.ingredientes||'Sem ingredientes cadastrados.';document.getElementById('detalhePreparo').textContent=item.preparo||'Sem modo de preparo cadastrado.';document.getElementById('btnEditarDetalhe').onclick=()=>{fecharDetalhe(); abrirModalEditar(id)};document.getElementById('modalDetalhe').classList.add('show')}
function fecharDetalhe(){document.getElementById('modalDetalhe').classList.remove('show')}
function render(){const cul=document.getElementById('culinariaFiltro').value; const cat=document.getElementById('categoriaFiltro').value; const busca=document.getElementById('buscaInput').value.toLowerCase().trim(); let dados=getDados().sort((a,b)=>(a.nome||'').localeCompare(b.nome||'', 'pt-BR',{sensitivity:'base'})); if(cul!=='todas')dados=dados.filter(i=>garantirArray(i.culinarias||i.culinaria).includes(cul)); if(cat!=='todas')dados=dados.filter(i=>garantirArray(i.categorias||i.categoria).includes(cat)); if(busca)dados=dados.filter(i=>`${i.nome} ${garantirArray(i.culinarias||i.culinaria).join(' ')} ${garantirArray(i.categorias||i.categoria).join(' ')} ${i.ingredientes} ${i.preparo}`.toLowerCase().includes(busca)); const lista=document.getElementById('listaReceitas'); if(!dados.length){lista.innerHTML='<div class="empty">Nenhuma receita cadastrada ainda.</div>';return} lista.innerHTML=dados.map(i=>{const cats=garantirArray(i.categorias||i.categoria).join(', '); const culs=garantirArray(i.culinarias||i.culinaria).join(', '); return `<div class="item" onclick="abrirDetalhe(${i.id})"><div class="itemTexto"><div class="nome">${escapeHtml(i.nome)}</div><div class="detalhe">${escapeHtml(culs||'Sem culinária')} • ${escapeHtml(cats||'Sem categoria')}${i.rendimento?' • '+escapeHtml(i.rendimento):''}${i.tempo?' • '+escapeHtml(i.tempo):''}</div></div></div>`}).join('')}
function abrirListaIngredientes(){const dados=getDados(); const texto=dados.flatMap(r=>String(r.ingredientes||'').split('\\n').map(i=>i.trim()).filter(Boolean)).join('\\n'); document.getElementById('listaIngredientesConteudo').textContent=texto||'Nenhum ingrediente cadastrado ainda.'; document.getElementById('modalListaIngredientes').classList.add('show')}
function fecharListaIngredientes(){document.getElementById('modalListaIngredientes').classList.remove('show')}
function abrirModalFuturasEdicoes(){document.getElementById('futurasEdicoesTexto').value=localStorage.getItem(CHAVE_FUTURAS)||'';document.getElementById('modalFuturasEdicoes').classList.add('show')} function fecharModalFuturasEdicoes(){document.getElementById('modalFuturasEdicoes').classList.remove('show')} function salvarFuturasEdicoes(){localStorage.setItem(CHAVE_FUTURAS,document.getElementById('futurasEdicoesTexto').value);fecharModalFuturasEdicoes()}
montarFiltros(); montarCheckboxes('culinariasBox',CULINARIAS,'culinariaCheck'); montarCheckboxes('categoriasBox',CATEGORIAS,'categoriaCheck'); render();
</script>
</body>
</html>
