<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exames</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root{
  --verde-principal:#E6F2E5;
  --verde-hover:#D6EAD4;
  --verde-texto:#3F6F4F;
  --verde-escuro:#5C9D5C;

  --fundo:#F6F7F5;
  --card:#FFFFFF;

  --texto-principal:#2F2F2F;
  --texto-secundario:#6B6B6B;
  --borda:#E3E5E1;

  --fonte:'Poppins',sans-serif;

  --titulo:20px;
  --botao:15px;

  --sombra-suave:0 4px 12px rgba(0,0,0,0.05);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  font-family:var(--fonte);
  background:var(--fundo);
  color:var(--texto-principal);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.pagina{
  width:100%;
  max-width:420px;
}

.card{
  width:100%;
  background:var(--card);
  border-radius:24px;
  padding:22px 16px 18px;
  box-shadow:var(--sombra-suave);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.topo{
  display:grid;
  grid-template-columns:40px 1fr 58px;
  align-items:start;
  gap:8px;
  margin-bottom:6px;
}

.botao-voltar{
  border:none;
  background:#E9ECE7;
  color:var(--texto-principal);
  border-radius:12px;
  width:40px;
  height:40px;
  cursor:pointer;
  font-size:18px;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  padding:0;
  transition:0.2s ease;
}

.botao-voltar:hover{
  background:#dde3d9;
}

.botao-voltar span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  transform:translateY(-1px);
}

.topCenter{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:0;
  padding-top:2px;
}

.titleIndex{
  color:var(--texto-principal);
  font-weight:500;
  font-size:var(--titulo);
  margin:0;
  line-height:1.2;
  text-align:center;
}

.subtitulo{
  font-size:11px;
  color:var(--texto-secundario);
  margin-top:2px;
  text-align:center;
  white-space:nowrap;
}

.dataTopo{
  min-height:40px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
  text-align:right;
  color:var(--texto-secundario);
  line-height:1.1;
  padding-top:1px;
}

.horaTopo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  white-space:nowrap;
  margin-bottom:2px;
}

.dataTopoLinha{
  font-size:11px;
  white-space:nowrap;
}

.botoes-lista{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.botao{
  width:100%;
  border:none;
  background:var(--verde-principal);
  color:var(--verde-texto);
  border-radius:16px;
  padding:0 16px;
  font-size:var(--botao);
  font-family:var(--fonte);
  cursor:pointer;
  transition:0.2s ease;
  min-height:84px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.botao:hover{
  background:var(--verde-hover);
}

.conteudo-botao{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  transform:translateY(1px);
}

.nome-botao{
  font-size:14px;
  color:var(--verde-texto);
  text-align:center;
  line-height:1.35;
  font-weight:500;
  margin:0;
}

.proxima-tarefa{
  margin-top:4px;
  font-size:11px;
  color:rgba(63,111,79,0.72);
  text-align:center;
  line-height:1.3;
  margin-bottom:0;
}

.horario-proxima{
  display:none;
}

.footerMiniAction{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:4px;
  flex-wrap:wrap;
}

.futureBtn{
  border:none;
  background:#E9ECE7;
  color:var(--texto-secundario);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
  transition:0.2s ease;
}

.futureBtn:hover{
  background:#dde3d9;
  color:var(--texto-principal);
}

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
  z-index:999;
}

.modalOverlay.show{
  display:flex;
}

.modal{
  background:#fff;
  padding:18px;
  border-radius:20px;
  width:min(360px, 100%);
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
}

.modalTitle{
  font-size:18px;
  color:var(--texto-principal);
  text-align:center;
  font-weight:500;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:13px;
  color:var(--texto-principal);
  font-family:var(--fonte);
  font-weight:500;
}

textarea{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  height:260px;
  resize:none;
}

textarea:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
  outline:none;
}

.modalBtns{
  display:flex;
  gap:8px;
}

.modalBtns button{
  flex:1;
  padding:11px 12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:12.5px;
  transition:0.2s ease;
}

.cancel{
  background:#efefef;
  color:#333;
}

.cancel:hover{
  background:#e7e7e7;
}

.save{
  background:var(--verde-escuro);
  color:white;
}

.save:hover{
  background:#4f8a4f;
}

@media (max-width: 390px){
  body{
    padding:14px;
  }

  .card{
    padding:20px 14px 16px;
  }

  .titleIndex{
    font-size:19px;
  }

  .topo{
    grid-template-columns:40px 1fr 54px;
  }

  .horaTopo{
    font-size:13px;
  }

  .dataTopoLinha{
    font-size:10.5px;
  }

  .subtitulo{
    font-size:10.5px;
  }
}


.lista-registros{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.registro{
  background:var(--verde-principal);
  border:none;
  border-radius:16px;
  padding:13px 14px;
  cursor:pointer;
  transition:0.2s ease;
  text-align:left;
  font-family:var(--fonte);
}
.registro:hover{ background:var(--verde-hover); }
.registroTitulo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  line-height:1.35;
  text-align:center;
}
.registroDescricao{
  margin-top:4px;
  font-size:11px;
  color:rgba(63,111,79,0.72);
  line-height:1.35;
  text-align:center;
}
.empty{
  background:#F8FAF7;
  border:1px solid var(--borda);
  border-radius:16px;
  padding:16px 14px;
  text-align:center;
  color:var(--texto-secundario);
  font-size:13px;
  line-height:1.55;
}
input, select{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  outline:none;
  color:var(--texto-principal);
}
input:focus, select:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.modalHeader{
  display:flex;
  justify-content:flex-end;
}
.fecharModal{
  background:#E9ECE7;
  border:none;
  width:32px;
  height:32px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  color:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}
.addTopBtn{
  border:none;
  background:#E9ECE7;
  color:var(--verde-texto);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
}
.modal{
  max-height:85vh;
  overflow-y:auto;
}

</style>
</head>
<body>

<div class="pagina">
  <div class="card">
    <div class="topo">
      <button class="botao-voltar" onclick="location.href='saude.html'"><span>←</span></button>
      <div class="topCenter">
        <h1 class="titleIndex">🧪 Exames</h1>
        <p class="subtitulo">guardar resultados</p>
      </div>
      <div class="dataTopo" aria-label="Data e hora atuais">
        <div id="linhaTempoHora" class="horaTopo"></div>
        <div id="linhaTempoDia" class="dataTopoLinha"></div>
        <div id="linhaTempoData" class="dataTopoLinha"></div>
      </div>
    </div>

    <div style="display:flex; justify-content:center;">
      <button class="addTopBtn" onclick="abrirModalNovo()">+ acrescentar</button>
    </div>

    <div id="listaRegistros" class="lista-registros"></div>

    <div class="footerMiniAction">
      <button class="futureBtn" onclick="abrirModalFuturasEdicoes()">futuras edições</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalCadastro">
  <div class="modal">
    <div class="modalHeader">
      <button class="fecharModal" onclick="fecharModalCadastro()">✕</button>
    </div>
    <h2 class="modalTitle" id="tituloCadastro">Novo registro</h2>
    <div class="field">
      <label>Exame</label>
      <input id="nome" type="text" placeholder="Ex.: Hemograma, TSH, ultrassom">
    </div>
<div class="field">
      <label>Data</label>
      <input id="data" type="date">
    </div>
<div class="field">
      <label>Local</label>
      <input id="local" type="text" placeholder="Laboratório ou clínica">
    </div>
<div class="field">
      <label>Resultado / Status</label>
      <input id="resultado" type="text" placeholder="Ex.: aguardando, normal, levar ao médico">
    </div>
<div class="field">
      <label>Observações</label>
      <textarea id="observacoes" style="height:90px;" placeholder="Anote preparo, senha, link, resultado..."></textarea>
    </div>
    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalCadastro()">Cancelar</button>
      <button class="cancel" id="btnExcluir" onclick="excluirRegistroAtual()" style="display:none;">Excluir</button>
      <button class="save" onclick="salvarCadastro()">Concluir</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalFuturasEdicoes">
  <div class="modal">
    <h2 class="modalTitle">Futuras edições</h2>
    <div class="field">
      <label>Ideias de melhorias futuras</label>
      <textarea id="futurasEdicoesTexto" placeholder="Escreva aqui suas ideias para melhorar essa tela..."></textarea>
    </div>
    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalFuturasEdicoes()">Cancelar</button>
      <button class="save" onclick="salvarFuturasEdicoes()">Concluir</button>
    </div>
  </div>
</div>

<script>
const CHAVE_DADOS = "saude_exames";
const CHAVE_FUTURAS_EDICOES = "futuras_edicoes_saude_exames";
let editandoId = null;

function getDados(){
  try{ return JSON.parse(localStorage.getItem(CHAVE_DADOS)) || []; }
  catch(e){ return []; }
}

function salvarDados(dados){
  localStorage.setItem(CHAVE_DADOS, JSON.stringify(dados));
}

function escapeHtml(texto){
  return String(texto ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function descricaoItem(item){
  const partes = [item.data, item.local, item.resultado].filter(Boolean);
  return partes.join(" • ") || (item.observacoes || "sem detalhes");
}

function abrirModalNovo(){
  editandoId = null;
  document.getElementById("tituloCadastro").textContent = "Novo registro";
  document.getElementById("btnExcluir").style.display = "none";
  document.getElementById("nome").value = "";
  document.getElementById("data").value = "";
  document.getElementById("local").value = "";
  document.getElementById("resultado").value = "";
  document.getElementById("observacoes").value = "";
  document.getElementById("modalCadastro").classList.add("show");
}

function abrirModalEditar(id){
  const item = getDados().find(registro => registro.id === id);
  if(!item) return;
  editandoId = id;
  document.getElementById("tituloCadastro").textContent = "Editar registro";
  document.getElementById("btnExcluir").style.display = "block";
  document.getElementById("nome").value = item.nome || "";
  document.getElementById("data").value = item.data || "";
  document.getElementById("local").value = item.local || "";
  document.getElementById("resultado").value = item.resultado || "";
  document.getElementById("observacoes").value = item.observacoes || "";
  document.getElementById("modalCadastro").classList.add("show");
}

function fecharModalCadastro(){
  document.getElementById("modalCadastro").classList.remove("show");
}

function salvarCadastro(){
  const item = {
      id: editandoId || Date.now(),
      nome: document.getElementById("nome").value.trim(),
      data: document.getElementById("data").value.trim(),
      local: document.getElementById("local").value.trim(),
      resultado: document.getElementById("resultado").value.trim(),
      observacoes: document.getElementById("observacoes").value.trim(),
      atualizadoEm: new Date().toISOString()
  };

  if(!item.nome){
    alert("Preencha o campo principal.");
    return;
  }

  let dados = getDados();

  if(editandoId){
    dados = dados.map(registro => registro.id === editandoId ? item : registro);
  }else{
    dados.push(item);
  }

  salvarDados(dados);
  fecharModalCadastro();
  renderizarLista();
}

function excluirRegistroAtual(){
  if(!editandoId) return;
  if(!confirm("Deseja excluir este registro?")) return;
  const dados = getDados().filter(item => item.id !== editandoId);
  salvarDados(dados);
  fecharModalCadastro();
  renderizarLista();
}

function renderizarLista(){
  const lista = document.getElementById("listaRegistros");
  const dados = getDados();

  if(!dados.length){
    lista.innerHTML = '<div class="empty">Nenhum registro cadastrado ainda.</div>';
    return;
  }

  lista.innerHTML = dados.map(item => `
    <button class="registro" onclick="abrirModalEditar(${item.id})">
      <div class="registroTitulo">${escapeHtml(item.nome)}</div>
      <div class="registroDescricao">${escapeHtml(descricaoItem(item))}</div>
    </button>
  `).join("");
}

function abrirModalFuturasEdicoes(){
  document.getElementById("futurasEdicoesTexto").value =
    localStorage.getItem(CHAVE_FUTURAS_EDICOES) || "";
  document.getElementById("modalFuturasEdicoes").classList.add("show");
}

function fecharModalFuturasEdicoes(){
  document.getElementById("modalFuturasEdicoes").classList.remove("show");
}

function salvarFuturasEdicoes(){
  localStorage.setItem(
    CHAVE_FUTURAS_EDICOES,
    document.getElementById("futurasEdicoesTexto").value
  );
  fecharModalFuturasEdicoes();
}

function pad2(numero){ return String(numero).padStart(2, "0"); }

function atualizarLinhaTempo(){
  const agora = new Date();
  const diasCurtos = ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"];
  document.getElementById("linhaTempoHora").textContent = `${pad2(agora.getHours())}:${pad2(agora.getMinutes())}`;
  document.getElementById("linhaTempoDia").textContent = `• ${diasCurtos[agora.getDay()]}`;
  document.getElementById("linhaTempoData").textContent = `• ${pad2(agora.getDate())}/${pad2(agora.getMonth()+1)}`;
}

window.addEventListener("load", () => {
  atualizarLinhaTempo();
  setInterval(atualizarLinhaTempo, 1000);
  renderizarLista();
});
</script>
</body>
</html>
