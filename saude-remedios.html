<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remédios</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root{
  --verde-principal:#E6F2E5;
  --verde-hover:#D6EAD4;
  --verde-texto:#3F6F4F;
  --verde-escuro:#5C9D5C;

  --fundo:#F6F7F5;
  --card:#FFFFFF;

  --texto-principal:#2F2F2F;
  --texto-secundario:#6B6B6B;
  --borda:#E3E5E1;

  --fonte:'Poppins',sans-serif;

  --titulo:20px;
  --botao:15px;

  --sombra-suave:0 4px 12px rgba(0,0,0,0.05);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  font-family:var(--fonte);
  background:var(--fundo);
  color:var(--texto-principal);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.pagina{
  width:100%;
  max-width:420px;
}

.card{
  width:100%;
  background:var(--card);
  border-radius:24px;
  padding:22px 16px 18px;
  box-shadow:var(--sombra-suave);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.topo{
  display:grid;
  grid-template-columns:40px 1fr 58px;
  align-items:start;
  gap:8px;
  margin-bottom:6px;
}

.botao-voltar{
  border:none;
  background:#E9ECE7;
  color:var(--texto-principal);
  border-radius:12px;
  width:40px;
  height:40px;
  cursor:pointer;
  font-size:18px;
  font-family:var(--fonte);
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  padding:0;
  transition:0.2s ease;
}

.botao-voltar:hover{
  background:#dde3d9;
}

.botao-voltar span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  transform:translateY(-1px);
}

.topCenter{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:0;
  padding-top:2px;
}

.titleIndex{
  color:var(--texto-principal);
  font-weight:500;
  font-size:var(--titulo);
  margin:0;
  line-height:1.2;
  text-align:center;
}

.subtitulo{
  font-size:11px;
  color:var(--texto-secundario);
  margin-top:2px;
  text-align:center;
  white-space:nowrap;
}

.dataTopo{
  min-height:40px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
  text-align:right;
  color:var(--texto-secundario);
  line-height:1.1;
  padding-top:1px;
}

.horaTopo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  white-space:nowrap;
  margin-bottom:2px;
}

.dataTopoLinha{
  font-size:11px;
  white-space:nowrap;
}

.botoes-lista{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.botao{
  width:100%;
  border:none;
  background:var(--verde-principal);
  color:var(--verde-texto);
  border-radius:16px;
  padding:0 16px;
  font-size:var(--botao);
  font-family:var(--fonte);
  cursor:pointer;
  transition:0.2s ease;
  min-height:84px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.botao:hover{
  background:var(--verde-hover);
}

.conteudo-botao{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  transform:translateY(1px);
}

.nome-botao{
  font-size:14px;
  color:var(--verde-texto);
  text-align:center;
  line-height:1.35;
  font-weight:500;
  margin:0;
}

.proxima-tarefa{
  margin-top:4px;
  font-size:11px;
  color:rgba(63,111,79,0.72);
  text-align:center;
  line-height:1.3;
  margin-bottom:0;
}

.horario-proxima{
  display:none;
}

.footerMiniAction{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:4px;
  flex-wrap:wrap;
}

.futureBtn{
  border:none;
  background:#E9ECE7;
  color:var(--texto-secundario);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
  transition:0.2s ease;
}

.futureBtn:hover{
  background:#dde3d9;
  color:var(--texto-principal);
}

.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  justify-content:center;
  align-items:center;
  padding:16px;
  z-index:999;
}

.modalOverlay.show{
  display:flex;
}

.modal{
  background:#fff;
  padding:18px;
  border-radius:20px;
  width:min(360px, 100%);
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
}

.modalTitle{
  font-size:18px;
  color:var(--texto-principal);
  text-align:center;
  font-weight:500;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:13px;
  color:var(--texto-principal);
  font-family:var(--fonte);
  font-weight:500;
}

textarea{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  height:260px;
  resize:none;
}

textarea:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
  outline:none;
}

.modalBtns{
  display:flex;
  gap:8px;
}

.modalBtns button{
  flex:1;
  padding:11px 12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:12.5px;
  transition:0.2s ease;
}

.cancel{
  background:#efefef;
  color:#333;
}

.cancel:hover{
  background:#e7e7e7;
}

.save{
  background:var(--verde-escuro);
  color:white;
}

.save:hover{
  background:#4f8a4f;
}

@media (max-width: 390px){
  body{
    padding:14px;
  }

  .card{
    padding:20px 14px 16px;
  }

  .titleIndex{
    font-size:19px;
  }

  .topo{
    grid-template-columns:40px 1fr 54px;
  }

  .horaTopo{
    font-size:13px;
  }

  .dataTopoLinha{
    font-size:10.5px;
  }

  .subtitulo{
    font-size:10.5px;
  }
}


.lista-registros{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.registro{
  background:var(--verde-principal);
  border:none;
  border-radius:16px;
  padding:13px 14px;
  cursor:pointer;
  transition:0.2s ease;
  text-align:left;
  font-family:var(--fonte);
}
.registro:hover{ background:var(--verde-hover); }
.registroTitulo{
  font-size:14px;
  color:var(--verde-texto);
  font-weight:500;
  line-height:1.35;
  text-align:center;
}
.registroDescricao{
  margin-top:4px;
  font-size:11px;
  color:rgba(63,111,79,0.72);
  line-height:1.35;
  text-align:center;
}
.empty{
  background:#F8FAF7;
  border:1px solid var(--borda);
  border-radius:16px;
  padding:16px 14px;
  text-align:center;
  color:var(--texto-secundario);
  font-size:13px;
  line-height:1.55;
}
input, select{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--borda);
  font-size:13px;
  font-family:var(--fonte);
  box-sizing:border-box;
  width:100%;
  outline:none;
  color:var(--texto-principal);
}
input:focus, select:focus{
  border-color:var(--verde-escuro);
  box-shadow:0 0 0 3px rgba(127,183,126,0.12);
}
.selectActions{
  display:flex;
  gap:8px;
}
.selectActions button{
  flex:1;
  border:none;
  border-radius:12px;
  padding:8px 10px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:11.5px;
  background:#E9ECE7;
  color:var(--verde-texto);
}
.selectActions button.dangerMini{
  background:#f5d7d7;
  color:#8a3030;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.modalHeader{
  display:flex;
  justify-content:flex-end;
}
.fecharModal{
  background:#E9ECE7;
  border:none;
  width:32px;
  height:32px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  color:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}
.addTopBtn{
  border:none;
  background:#E9ECE7;
  color:var(--verde-texto);
  border-radius:12px;
  padding:9px 14px;
  font-size:12px;
  cursor:pointer;
  font-family:var(--fonte);
}
.modal{
  max-height:85vh;
  overflow-y:auto;
}

.configLista{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:4px;
}
.configItem{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:6px;
  align-items:center;
  background:#F8FAF7;
  border:1px solid var(--borda);
  border-radius:12px;
  padding:9px 10px;
}
.configNome{
  font-size:12px;
  color:var(--texto-principal);
  line-height:1.35;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.configActionsBtn{
  border:none;
  border-radius:10px;
  padding:8px 9px;
  cursor:pointer;
  font-family:var(--fonte);
  font-size:11px;
  transition:0.2s ease;
  background:#efefef;
  color:#333;
}
.configActionsBtn:hover{
  background:#e7e7e7;
}
.configActionsBtn.danger{
  background:#f5d7d7;
  color:#8a3030;
}
.configTextoAjuda{
  font-size:11px;
  color:var(--texto-secundario);
  line-height:1.45;
  text-align:center;
}

</style>
</head>
<body>

<div class="pagina">
  <div class="card">
    <div class="topo">
      <button class="botao-voltar" onclick="location.href='saude.html'"><span>←</span></button>
      <div class="topCenter">
        <h1 class="titleIndex">💊 Remédios</h1>
        <p class="subtitulo">organizar medicações</p>
      </div>
      <div class="dataTopo" aria-label="Data e hora atuais">
        <div id="linhaTempoHora" class="horaTopo"></div>
        <div id="linhaTempoDia" class="dataTopoLinha"></div>
        <div id="linhaTempoData" class="dataTopoLinha"></div>
      </div>
    </div>

    <div style="display:flex; justify-content:center;">
      <button class="addTopBtn" onclick="abrirModalNovo()">+ acrescentar</button>
    </div>

    <div id="listaRegistros" class="lista-registros"></div>

    <div class="footerMiniAction">
      <button class="futureBtn" onclick="abrirModalConfiguracaoRemedios()">configuração</button>
      <button class="futureBtn" onclick="abrirModalFuturasEdicoes()">futuras edições</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalCadastro">
  <div class="modal">
    <div class="modalHeader">
      <button class="fecharModal" onclick="fecharModalCadastro()">✕</button>
    </div>
    <h2 class="modalTitle" id="tituloCadastro">Novo registro</h2>
    <div class="field">
      <label>Remédio</label>
      <select id="nome"></select>
    </div>
    <div class="selectActions">
      <button type="button" onclick="abrirModalNovoRemedio()">Novo remédio</button>
      <button type="button" class="dangerMini" onclick="excluirRemedioSelecionado()">Excluir remédio</button>
    </div>

    <div class="row">
      <div class="field">
        <label>Dosagem</label>
        <input id="dosagem" type="text" placeholder="Ex.: 50 mg">
      </div>
      <div class="field">
        <label>Quantidade</label>
        <input id="quantidade" type="text" placeholder="Ex.: 1 comprimido">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Horário 1</label>
        <input id="horario1" type="time">
      </div>
      <div class="field">
        <label>Horário 2</label>
        <input id="horario2" type="time">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Horário 3</label>
        <input id="horario3" type="time">
      </div>
      <div class="field">
        <label>Horário 4</label>
        <input id="horario4" type="time">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Data de início</label>
        <input id="inicio" type="date">
      </div>
      <div class="field">
        <label>Data de fim</label>
        <input id="fim" type="date">
      </div>
    </div>
<div class="field">
      <label>Observações</label>
      <textarea id="observacoes" style="height:90px;" placeholder="Anote orientação médica, reação, pausa..."></textarea>
    </div>
    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalCadastro()">Cancelar</button>
      <button class="cancel" id="btnExcluir" onclick="excluirRegistroAtual()" style="display:none;">Excluir</button>
      <button class="save" onclick="salvarCadastro()">Concluir</button>
    </div>
  </div>
</div>


<div class="modalOverlay" id="modalNovoRemedio">
  <div class="modal" style="width:min(300px,100%);">
    <h2 class="modalTitle">Novo remédio</h2>
    <div class="field">
      <label>Nome do remédio</label>
      <input id="novoRemedioInput" type="text" placeholder="Ex.: Levotiroxina, Vitamina D...">
    </div>
    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalNovoRemedio()">Cancelar</button>
      <button class="save" onclick="salvarNovoRemedio()">Ok</button>
    </div>
  </div>
</div>


<div class="modalOverlay" id="modalConfiguracaoRemedios">
  <div class="modal">
    <div class="modalHeader">
      <button class="fecharModal" onclick="fecharModalConfiguracaoRemedios()">✕</button>
    </div>
    <h2 class="modalTitle">Configuração dos remédios</h2>
    <div class="configTextoAjuda">Edite ou retire remédios da lista de seleção. Isso não apaga os registros já cadastrados na página.</div>
    <div id="listaConfigRemedios" class="configLista"></div>
  </div>
</div>

<div class="modalOverlay" id="modalEditarRemedioLista">
  <div class="modal" style="width:min(300px,100%);">
    <h2 class="modalTitle">Editar remédio</h2>
    <div class="field">
      <label>Nome do remédio</label>
      <input id="editarRemedioListaInput" type="text" placeholder="Nome do remédio">
    </div>
    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalEditarRemedioLista()">Cancelar</button>
      <button class="save" onclick="salvarEdicaoRemedioLista()">Concluir</button>
    </div>
  </div>
</div>

<div class="modalOverlay" id="modalFuturasEdicoes">
  <div class="modal">
    <h2 class="modalTitle">Futuras edições</h2>
    <div class="field">
      <label>Ideias de melhorias futuras</label>
      <textarea id="futurasEdicoesTexto" placeholder="Escreva aqui suas ideias para melhorar essa tela..."></textarea>
    </div>
    <div class="modalBtns">
      <button class="cancel" onclick="fecharModalFuturasEdicoes()">Cancelar</button>
      <button class="save" onclick="salvarFuturasEdicoes()">Concluir</button>
    </div>
  </div>
</div>

<script>
const CHAVE_DADOS = "saude_remedios";
const CHAVE_REMEDIOS_BASE = "saude_remedios_base";
const CHAVE_FUTURAS_EDICOES = "futuras_edicoes_saude_remedios";
let editandoId = null;

function getDados(){
  try{ return JSON.parse(localStorage.getItem(CHAVE_DADOS)) || []; }
  catch(e){ return []; }
}

function salvarDados(dados){
  localStorage.setItem(CHAVE_DADOS, JSON.stringify(dados));
}


function getListaSalva(chave, padrao = []){
  try{
    const lista = JSON.parse(localStorage.getItem(chave));
    if(Array.isArray(lista)) return lista;
  }catch(e){}
  localStorage.setItem(chave, JSON.stringify(padrao));
  return padrao;
}

function salvarLista(chave, lista){
  const unica = [...new Set((lista || []).map(item => String(item || "").trim()).filter(Boolean))]
    .sort((a,b) => a.localeCompare(b, "pt-BR", {sensitivity:"base"}));
  localStorage.setItem(chave, JSON.stringify(unica));
  return unica;
}

function getRemediosBase(){
  const salvos = getListaSalva(CHAVE_REMEDIOS_BASE, []);
  const usados = getDados().map(item => item.nome).filter(Boolean);
  return salvarLista(CHAVE_REMEDIOS_BASE, [...salvos, ...usados]);
}

function preencherSelectRemedios(valorAtual = ""){
  const select = document.getElementById("nome");
  const lista = getRemediosBase();
  const valor = String(valorAtual || "").trim();
  const opcoes = valor && !lista.includes(valor) ? [...lista, valor].sort((a,b)=>a.localeCompare(b,"pt-BR",{sensitivity:"base"})) : lista;

  select.innerHTML = `<option value="">Selecione ou cadastre</option>` +
    opcoes.map(item => `<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`).join("");
  select.value = valor;
}

function abrirModalNovoRemedio(){
  document.getElementById("novoRemedioInput").value = "";
  document.getElementById("modalNovoRemedio").classList.add("show");
  setTimeout(() => document.getElementById("novoRemedioInput").focus(), 80);
}

function fecharModalNovoRemedio(){
  document.getElementById("modalNovoRemedio").classList.remove("show");
}

function salvarNovoRemedio(){
  const input = document.getElementById("novoRemedioInput");
  const nome = input.value.trim();

  if(!nome){
    alert("Digite o nome do remédio.");
    return;
  }

  const lista = salvarLista(CHAVE_REMEDIOS_BASE, [...getRemediosBase(), nome]);
  preencherSelectRemedios(nome);
  fecharModalNovoRemedio();
}

function excluirRemedioSelecionado(){
  const select = document.getElementById("nome");
  const valor = select.value;

  if(!valor){
    alert("Selecione um remédio para excluir da lista.");
    return;
  }

  if(!confirm(`Deseja excluir "${valor}" da lista de remédios?`)) return;

  const lista = getRemediosBase().filter(item => item.toLowerCase() !== valor.toLowerCase());
  salvarLista(CHAVE_REMEDIOS_BASE, lista);
  preencherSelectRemedios("");
}

let remedioListaEdicaoAtual = "";

function abrirModalConfiguracaoRemedios(){
  renderizarListaConfiguracaoRemedios();
  document.getElementById("modalConfiguracaoRemedios").classList.add("show");
}

function fecharModalConfiguracaoRemedios(){
  document.getElementById("modalConfiguracaoRemedios").classList.remove("show");
}

function renderizarListaConfiguracaoRemedios(){
  const lista = document.getElementById("listaConfigRemedios");
  const remedios = getRemediosBase();

  if(!remedios.length){
    lista.innerHTML = '<div class="empty">Nenhum remédio salvo na lista ainda.</div>';
    return;
  }

  lista.innerHTML = "";
  remedios.forEach(nome => {
    const linha = document.createElement("div");
    linha.className = "configItem";

    const texto = document.createElement("div");
    texto.className = "configNome";
    texto.textContent = nome;

    const btnEditar = document.createElement("button");
    btnEditar.className = "configActionsBtn";
    btnEditar.textContent = "editar";
    btnEditar.onclick = () => abrirModalEditarRemedioLista(nome);

    const btnRetirar = document.createElement("button");
    btnRetirar.className = "configActionsBtn danger";
    btnRetirar.textContent = "retirar";
    btnRetirar.onclick = () => retirarRemedioDaListaConfig(nome);

    linha.appendChild(texto);
    linha.appendChild(btnEditar);
    linha.appendChild(btnRetirar);
    lista.appendChild(linha);
  });
}

function abrirModalEditarRemedioLista(nome){
  remedioListaEdicaoAtual = nome;
  document.getElementById("editarRemedioListaInput").value = nome;
  document.getElementById("modalEditarRemedioLista").classList.add("show");
  setTimeout(() => document.getElementById("editarRemedioListaInput").focus(), 80);
}

function fecharModalEditarRemedioLista(){
  remedioListaEdicaoAtual = "";
  document.getElementById("modalEditarRemedioLista").classList.remove("show");
}

function salvarEdicaoRemedioLista(){
  const antigo = remedioListaEdicaoAtual;
  const novo = document.getElementById("editarRemedioListaInput").value.trim();

  if(!antigo) return;
  if(!novo){
    alert("Digite o nome do remédio.");
    return;
  }

  let lista = getRemediosBase().map(item => item === antigo ? novo : item);
  salvarLista(CHAVE_REMEDIOS_BASE, lista);

  preencherSelectRemedios(document.getElementById("nome")?.value === antigo ? novo : document.getElementById("nome")?.value || "");
  fecharModalEditarRemedioLista();
  renderizarListaConfiguracaoRemedios();
}

function retirarRemedioDaListaConfig(nome){
  if(!confirm(`Deseja retirar "${nome}" da lista de remédios?`)) return;

  const lista = getRemediosBase().filter(item => item.toLowerCase() !== nome.toLowerCase());
  salvarLista(CHAVE_REMEDIOS_BASE, lista);
  preencherSelectRemedios("");
  renderizarListaConfiguracaoRemedios();
}

function formatarDataBR(dataISO){
  if(!dataISO) return "";
  const [ano, mes, dia] = String(dataISO).split("-");
  if(!ano || !mes || !dia) return dataISO;
  return `${dia}/${mes}/${String(ano).slice(-2)}`;
}

function getHorariosFormulario(){
  return ["horario1", "horario2", "horario3", "horario4"]
    .map(id => document.getElementById(id).value.trim())
    .filter(Boolean);
}

function preencherHorariosFormulario(horarios = []){
  const lista = Array.isArray(horarios) ? horarios : [];
  ["horario1", "horario2", "horario3", "horario4"].forEach((id, index) => {
    document.getElementById(id).value = lista[index] || "";
  });
}

function escapeHtml(texto){
  return String(texto ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function descricaoItem(item){
  const horarios = Array.isArray(item.horarios) && item.horarios.length
    ? item.horarios.join(", ")
    : (item.frequencia || "");

  const periodo = [formatarDataBR(item.inicio), formatarDataBR(item.fim)]
    .filter(Boolean)
    .join(" até " );

  const partes = [item.dosagem, item.quantidade, horarios, periodo].filter(Boolean);
  return partes.join(" • ") || (item.observacoes || "sem detalhes");
}

function abrirModalNovo(){
  editandoId = null;
  document.getElementById("tituloCadastro").textContent = "Novo registro";
  document.getElementById("btnExcluir").style.display = "none";
  preencherSelectRemedios("");
  document.getElementById("dosagem").value = "";
  document.getElementById("quantidade").value = "";
  preencherHorariosFormulario([]);
  document.getElementById("inicio").value = "";
  document.getElementById("fim").value = "";
  document.getElementById("observacoes").value = "";
  document.getElementById("modalCadastro").classList.add("show");
}

function abrirModalEditar(id){
  const item = getDados().find(registro => registro.id === id);
  if(!item) return;
  editandoId = id;
  document.getElementById("tituloCadastro").textContent = "Editar registro";
  document.getElementById("btnExcluir").style.display = "block";
  preencherSelectRemedios(item.nome || "");
  document.getElementById("dosagem").value = item.dosagem || "";
  document.getElementById("quantidade").value = item.quantidade || "";
  preencherHorariosFormulario(Array.isArray(item.horarios) ? item.horarios : (item.frequencia ? [item.frequencia] : []));
  document.getElementById("inicio").value = item.inicio || "";
  document.getElementById("fim").value = item.fim || "";
  document.getElementById("observacoes").value = item.observacoes || "";
  document.getElementById("modalCadastro").classList.add("show");
}

function fecharModalCadastro(){
  document.getElementById("modalCadastro").classList.remove("show");
}

function salvarCadastro(){
  const item = {
      id: editandoId || Date.now(),
      nome: document.getElementById("nome").value.trim(),
      dosagem: document.getElementById("dosagem").value.trim(),
      quantidade: document.getElementById("quantidade").value.trim(),
      horarios: getHorariosFormulario(),
      inicio: document.getElementById("inicio").value.trim(),
      fim: document.getElementById("fim").value.trim(),
      observacoes: document.getElementById("observacoes").value.trim(),
      atualizadoEm: new Date().toISOString()
  };

  if(!item.nome){
    alert("Preencha o campo principal.");
    return;
  }

  let dados = getDados();

  if(editandoId){
    dados = dados.map(registro => registro.id === editandoId ? item : registro);
  }else{
    dados.push(item);
  }

  if(item.nome){
    salvarLista(CHAVE_REMEDIOS_BASE, [...getRemediosBase(), item.nome]);
  }

  salvarDados(dados);
  fecharModalCadastro();
  renderizarLista();
}

function excluirRegistroAtual(){
  if(!editandoId) return;
  if(!confirm("Deseja excluir este registro?")) return;
  const dados = getDados().filter(item => item.id !== editandoId);
  salvarDados(dados);
  fecharModalCadastro();
  renderizarLista();
}

function renderizarLista(){
  const lista = document.getElementById("listaRegistros");
  const dados = getDados();

  if(!dados.length){
    lista.innerHTML = '<div class="empty">Nenhum registro cadastrado ainda.</div>';
    return;
  }

  lista.innerHTML = dados.map(item => `
    <button class="registro" onclick="abrirModalEditar(${item.id})">
      <div class="registroTitulo">${escapeHtml(item.nome)}</div>
      <div class="registroDescricao">${escapeHtml(descricaoItem(item))}</div>
    </button>
  `).join("");
}

function abrirModalFuturasEdicoes(){
  document.getElementById("futurasEdicoesTexto").value =
    localStorage.getItem(CHAVE_FUTURAS_EDICOES) || "";
  document.getElementById("modalFuturasEdicoes").classList.add("show");
}

function fecharModalFuturasEdicoes(){
  document.getElementById("modalFuturasEdicoes").classList.remove("show");
}

function salvarFuturasEdicoes(){
  localStorage.setItem(
    CHAVE_FUTURAS_EDICOES,
    document.getElementById("futurasEdicoesTexto").value
  );
  fecharModalFuturasEdicoes();
}

function pad2(numero){ return String(numero).padStart(2, "0"); }

function atualizarLinhaTempo(){
  const agora = new Date();
  const diasCurtos = ["dom", "seg", "ter", "qua", "qui", "sex", "sáb"];
  document.getElementById("linhaTempoHora").textContent = `${pad2(agora.getHours())}:${pad2(agora.getMinutes())}`;
  document.getElementById("linhaTempoDia").textContent = `• ${diasCurtos[agora.getDay()]}`;
  document.getElementById("linhaTempoData").textContent = `• ${pad2(agora.getDate())}/${pad2(agora.getMonth()+1)}`;
}

window.addEventListener("load", () => {
  atualizarLinhaTempo();
  setInterval(atualizarLinhaTempo, 1000);
  preencherSelectRemedios("");
  renderizarLista();
});
</script>
